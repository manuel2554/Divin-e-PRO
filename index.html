    function makeNoiseTexture(THREE, { size = 256, contrast = 0.6 } = {}) {
      const c = document.createElement("canvas"); c.width = c.height = size;
      const ctx = c.getContext("2d", { willReadFrequently: true });
      const img = ctx.createImageData(size, size);
      for (let i = 0; i < img.data.length; i += 4) {
        const v = Math.floor(120 + (Math.random() - 0.5) * 255 * contrast);
        img.data[i] = v; img.data[i + 1] = v; img.data[i + 2] = v; img.data[i + 3] = 255;
      }
      ctx.putImageData(img, 0, 0);
      const tex = new THREE.CanvasTexture(c);
      tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(3, 3); tex.needsUpdate = true;
      return tex;
    }
    function fitCameraToObject(THREE, camera, object, offset = 1.4) {
      const box = new THREE.Box3().setFromObject(object);
      if (box.isEmpty()) return;
      const size = new THREE.Vector3(); const center = new THREE.Vector3();
      box.getSize(size); box.getCenter(center);
      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * (Math.PI / 180);
      const cameraZ = Math.abs((maxDim / 2) / Math.tan(fov / 2)) * offset;
      camera.position.set(center.x, center.y + maxDim * 0.20, center.z + cameraZ);
      camera.lookAt(center); camera.updateProjectionMatrix();
    }

    // =========================
    // 3D Viewer Mejorado
    // =========================
    function BurgerViewer3D({ heightClass = "h-[280px] md:h-[440px]", modelUrl, showUI = true, burgerConfig = null }) {
      const mountRef = useRef(null);
      const reqRef = useRef(null);
      const stateRef = useRef({ THREE: null, scene: null, camera: null, renderer: null, root: null, stack: null, animatables: [], matCache: null });
      const [err, setErr] = useState(null);
      const [autoRotate, setAutoRotate] = useState(true);
      
      const yawRef = useRef(0);
      const pitchRef = useRef(-0.12);
      const draggingRef = useRef(false);
      const lastRef = useRef({ x: 0, y: 0 });
      const autoRotateRef = useRef(true);
      useEffect(() => { autoRotateRef.current = autoRotate; }, [autoRotate]);

      // 1. Setup inicial del motor (una sola vez)
      useEffect(() => {
        try {
          const THREE = window.THREE;
          if (!THREE) throw new Error("Three.js no se cargó.");
          const mount = mountRef.current;
          if (!mount) return;

          const getSize = () => {
            const r = mount.getBoundingClientRect();
            return { w: Math.max(1, Math.floor(r.width)), h: Math.max(1, Math.floor(r.height)) };
          };
          
          const isMobileDevice = window.innerWidth < 640;
          // Desactivamos antialias en móviles y pedimos alto rendimiento
          const renderer = new THREE.WebGLRenderer({ antialias: !isMobileDevice, alpha: true, powerPreference: "high-performance" });
          renderer.setPixelRatio(isMobileDevice ? 1 : Math.min(window.devicePixelRatio || 1, 2));
          renderer.outputColorSpace = THREE.SRGBColorSpace;
          renderer.toneMapping = THREE.ACESFilmicToneMapping;
          renderer.toneMappingExposure = 1.2;
          
          // Desactivamos sombras en móviles para ganar muchísima velocidad
          renderer.shadowMap.enabled = !isMobileDevice; 
          if (!isMobileDevice) renderer.shadowMap.type = THREE.PCFSoftShadowMap;
          const { w, h } = getSize();
          renderer.setSize(w, h);
          renderer.domElement.style.width = "100%";
          renderer.domElement.style.height = "100%";
          renderer.domElement.style.display = "block";
          renderer.domElement.style.touchAction = "none";
          mount.appendChild(renderer.domElement);

          const scene = new THREE.Scene();
          scene.fog = new THREE.Fog(0x0a0a0f, 8, 18);
          const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 100);

          scene.add(new THREE.AmbientLight(0xffffff, 0.16));
          scene.add(new THREE.HemisphereLight(0xf5efe6, 0x07070a, 0.60));
          const key = new THREE.SpotLight(0xffffff, 2.3, 30, Math.PI / 6, 0.35, 1.2);
          key.position.set(4.5, 6.0, 3.2); key.castShadow = true; key.shadow.mapSize.set(1024, 1024);
          scene.add(key);
          const rim = new THREE.DirectionalLight(0xc7a35c, 0.85); rim.position.set(-4.0, 2.2, -3.2); scene.add(rim);
          const fill = new THREE.DirectionalLight(0xe6d3a3, 0.55); fill.position.set(-4.2, 2.2, 2.5); scene.add(fill);

          const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), new THREE.ShadowMaterial({ opacity: 0.20 }));
          ground.rotation.x = -Math.PI / 2; ground.position.y = -1.25; ground.receiveShadow = true;
          scene.add(ground);

          const root = new THREE.Group();
          root.position.set(0, -0.2, 0); 
          scene.add(root);
          const stack = new THREE.Group();
          root.add(stack);

          const el = renderer.domElement;
          const onDown = (e) => { draggingRef.current = true; lastRef.current = { x: e.clientX, y: e.clientY }; el.setPointerCapture?.(e.pointerId); };
          const onMove = (e) => {
            if (!draggingRef.current) return;
            const dx = e.clientX - lastRef.current.x; const dy = e.clientY - lastRef.current.y;
            lastRef.current = { x: e.clientX, y: e.clientY };
            yawRef.current += dx * 0.008; pitchRef.current += dy * 0.006;
            pitchRef.current = Math.max(-0.75, Math.min(0.35, pitchRef.current));
          };
          const onUp = (e) => { draggingRef.current = false; try { el.releasePointerCapture?.(e.pointerId); } catch {} };
          el.addEventListener("pointerdown", onDown, { passive: true });
          el.addEventListener("pointermove", onMove, { passive: true });
          window.addEventListener("pointerup", onUp, { passive: true });

          const onResize = () => { const { w: nw, h: nh } = getSize(); camera.aspect = nw / nh; camera.updateProjectionMatrix(); renderer.setSize(nw, nh); };
          window.addEventListener("resize", onResize);

          const bunNoise = makeNoiseTexture(THREE, { contrast: 0.45 });
          const meatNoise = makeNoiseTexture(THREE, { contrast: 0.65 });
          const matCache = {
            bun: new THREE.MeshPhysicalMaterial({ color: 0xc7a35c, roughness: 0.55, bumpMap: bunNoise, bumpScale: 0.08 }),
            meat: new THREE.MeshStandardMaterial({ color: 0x341b12, roughness: 0.92, bumpMap: meatNoise, bumpScale: 0.14 }),
            cheese: new THREE.MeshPhysicalMaterial({ color: 0xf2c24f, roughness: 0.38, clearcoat: 0.25 }),
            green: new THREE.MeshStandardMaterial({ color: 0x3f8f5a, roughness: 0.85 }),
            red: new THREE.MeshStandardMaterial({ color: 0xb33b2e, roughness: 0.68 }),
            generic: new THREE.MeshStandardMaterial({ color: 0x8a6a4c, roughness: 0.9 })
          };

          stateRef.current = { THREE, scene, camera, renderer, root, stack, animatables: [], matCache };

          const animate = () => {
            reqRef.current = requestAnimationFrame(animate);
            if (stateRef.current.root) {
              if (autoRotateRef.current && !draggingRef.current) yawRef.current += 0.0032;
              stateRef.current.root.rotation.y = yawRef.current;
              stateRef.current.root.rotation.x = pitchRef.current;
            }
            const time = performance.now() * 0.001;
            stateRef.current.animatables.forEach(item => {
              if (time > item.startTime) {
                const diff = item.targetY - item.mesh.position.y;
                item.velocity += diff * 0.25; 
                item.velocity *= 0.65; 
                item.mesh.position.y += item.velocity;
              }
            });
            renderer.render(scene, camera);
          };
          animate();

          return () => {
            window.removeEventListener("resize", onResize);
            el.removeEventListener("pointerdown", onDown); el.removeEventListener("pointermove", onMove); window.removeEventListener("pointerup", onUp);
            cancelAnimationFrame(reqRef.current);
            renderer.dispose();
            if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
            stateRef.current = { animatables: [] };
          };
        } catch (e) { setErr(e?.message || String(e)); }
      }, []);

      // 2. Manejador dinámico de ingredientes
      useEffect(() => {
        const st = stateRef.current;
        if (!st.THREE || !st.stack) return;
        const { THREE, stack, camera, matCache } = st;

        while (stack.children.length) stack.remove(stack.children[0]);
        st.animatables = [];

        const fallbackConfig = [{ type: 'bunBottom' }, { type: 'meat' }, { type: 'cheese' }, { type: 'lettuce' }, { type: 'tomato' }, { type: 'bunTop' }];
        const currentConfig = burgerConfig || fallbackConfig;

        if (modelUrl && THREE.GLTFLoader) {
          const loader = new THREE.GLTFLoader();
          loader.load(modelUrl, (gltf) => {
            const model = gltf.scene;
            model.traverse((o) => { if (o.isMesh) { o.castShadow = true; o.receiveShadow = true; } });
            model.scale.setScalar(1.2);
            model.position.y = 5;
            st.animatables.push({ mesh: model, targetY: 0, startTime: performance.now() * 0.001, velocity: 0 });
            stack.add(model);
            
            model.position.y = 0; 
            fitCameraToObject(THREE, camera, stack, 1.4);
            model.position.y = 5; 
          }, undefined, () => buildProcedural(currentConfig));
        } else {
          buildProcedural(currentConfig);
        }

        function buildProcedural(config) {
          let currentY = -0.5; 
          const anims = [];
          const now = performance.now() * 0.001;

          config.forEach((item, idx) => {
            let mesh, thickness;
            if (item.type === 'bunBottom') { mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.92, 1.02, 0.26, 64), matCache.bun); thickness = 0.26; }
            else if (item.type === 'meat') { mesh = new THREE.Mesh(new THREE.CylinderGeometry(1.04, 1.04, 0.28, 64), matCache.meat); thickness = 0.28; }
            else if (item.type === 'cheese') { mesh = new THREE.Mesh(new THREE.CylinderGeometry(1.07, 1.07, 0.08, 64), matCache.cheese); thickness = 0.08; }
            else if (item.type === 'lettuce') { mesh = new THREE.Mesh(new THREE.TorusGeometry(0.78, 0.12, 14, 90), matCache.green); mesh.rotation.x = Math.PI / 2; thickness = 0.15; }
            else if (item.type === 'tomato') {
              mesh = new THREE.Group();
              for (let i = 0; i < 3; i++) {
                const t = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, 0.06, 48), matCache.red);
                t.position.set(Math.cos(i * 2.2) * 0.45, 0, Math.sin(i * 2.2) * 0.45);
                mesh.add(t);
              }
              thickness = 0.06;
            } else if (item.type === 'bunTop') { mesh = new THREE.Mesh(new THREE.SphereGeometry(0.95, 64, 48, 0, Math.PI * 2, 0, Math.PI / 1.9), matCache.bun); mesh.scale.set(1.0, 0.62, 1.0); thickness = 0.4; }
            else { mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 0.05, 32), matCache.generic); thickness = 0.05; }

            if (mesh) {
              mesh.traverse((m) => { if(m.isMesh){ m.castShadow = true; m.receiveShadow = true; }});
              stack.add(mesh);
              const targetY = currentY + thickness / 2;
              mesh.position.y = targetY; 
              anims.push({ mesh, targetY, startTime: now + idx * 0.15, velocity: 0 });
              currentY += thickness;
            }
          });

          fitCameraToObject(THREE, camera, stack, 1.4);
          anims.forEach(a => { a.mesh.position.y = a.targetY + 6; });
          st.animatables = anims;
        }
      }, [modelUrl, burgerConfig]);

      if (err) return (<div className={`${heightClass} w-full rounded-2xl border border-divineLine bg-black/20 p-4`}><div className="text-xs tracking-[0.28em] text-divineGold/90">3D</div><div className="mt-2 text-sm text-divineCream/70">{err}</div></div>);

      return (
        <div className="relative w-full">
          {showUI && <div className="absolute left-3 top-3 z-10 rounded-full border border-divineLine2 bg-black/35 px-4 py-2 text-xs font-bold tracking-[0.2em] text-divineCream/90 backdrop-blur">360° (ARRASTRA)</div>}
          {showUI && (
            <div className="absolute bottom-3 left-3 z-10 flex gap-2">
              <button onClick={() => setAutoRotate((s) => !s)} className="btn-ghost py-3 px-5 text-sm font-bold" type="button">{autoRotate ? "PAUSAR" : "AUTO"}</button>
              <button onClick={() => { yawRef.current = 0; pitchRef.current = -0.12; }} className="btn-ghost py-3 px-5 text-sm font-bold" type="button">REINICIAR</button>
            </div>
          )}
          <div ref={mountRef} className={`${heightClass} w-full bg-gradient-to-b from-transparent to-[#0A1128]/80`}></div>
        </div>
      );
    }

           setCodigoAplicado("");

      // Cálculos Dinámicos
      const deliveryCost = Number(selectedZone?.cost || 0);

      // Variables dinámicas desde ajustes

      const handleInput = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

        } else {
          cleanText = text.replace(/[-.\s]/g, '');
        }
        if (navigator.clipboard) {
          navigator.clipboard.writeText(cleanText);
          window.showToast("Copiado: " + cleanText, "📋");
        }
      };

      const handleCheckout = async () => {
        setLoading(true);
        const newOrderId = "#DIV-" + Math.floor(1000 + Math.random() * 9000);
        
        const { error } = await supabaseClient.from('orders').insert([{
            tracking_code: newOrderId, customer_name: formData.name, phone: formData.phone,
            address: formData.address, notes: formData.notes, items: items, 
            total_usd: finalTotal, bcv_rate: bcvRate,
            payment_ref: `${paymentMethod.toUpperCase()} - ${formData.ref || "Capture adjunto"}`, 
            status: 'Pendiente'
        }]);

        if (error) {
          alert("Error conectando con la base de datos.");
          setLoading(false); return;
        }

        // --- SISTEMA DE LEALTAD: DESCONTAR INVENTARIO USADO AL FINALIZAR ---
        try {
          const usedRewards = items.filter(item => item.isReward).map(item => item.instanceId);
          if (usedRewards.length > 0) {
             const cleanPhone = formData.phone.replace(/\D/g, '');
             const { data: client } = await supabaseClient.from('clientes').select('inventario').eq('telefono', cleanPhone).single();
             if (client && client.inventario) {
                const newInv = client.inventario.filter(i => !usedRewards.includes(i.instanceId));
                await supabaseClient.from('clientes').update({ inventario: newInv }).eq('telefono', cleanPhone);
             }
          }
        } catch (e) {
          console.log("Error silencioso en inventario", e);
        }
        // --------------------------------------------------------------------

        let orderText = `🍔 *NUEVO PEDIDO* ${newOrderId}\n\n👤 *Cliente:* ${formData.name}\n📞 *Teléfono:* ${formData.phone}\n📍 *Dirección:* ${formData.address}\n🛵 *Método:* ${selectedZone.name}\n`;
        if(formData.notes) orderText += `📝 *Nota:* ${formData.notes}\n`;
        orderText += `\n🛒 *PEDIDO:*\n`;
        items.forEach(it => {
          orderText += `• ${it.qty}x ${it.name} - $${(it.price * it.qty).toFixed(2)}\n`;
          if (it.meta) Object.entries(it.meta).forEach(([k, v]) => { orderText += `  _${k}:_ ${Array.isArray(v) ? v.join(", ") : String(v)}\n`; });
        });
        
        if (deliveryCost > 0) orderText += `\n🛵 *Costo Delivery:* $${deliveryCost.toFixed(2)}`;
        if (descuentoAplicado > 0) orderText += `\n🎟️ *Cupón (${codigoAplicado}):* -$${descuentoAplicado.toFixed(2)}`;
        orderText += `\n💰 *Total USD:* $${finalTotal.toFixed(2)}`;
        if (paymentMethod === 'pagomovil' && bcvRate) orderText += `\n🇻🇪 *Total BCV:* ${(finalTotal * bcvRate).toFixed(2)} Bs`;
        
        orderText += `\n💳 *Vía de Pago:* ${paymentMethod.toUpperCase()}`;
        orderText += `\n🧾 *Referencia:* ${formData.ref || "Envió Capture"}`;

        try {
          await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ chat_id: chatId, text: orderText, parse_mode: "Markdown" }) });
          if (receiptFile) {
            const fd = new FormData(); fd.append('chat_id', chatId); fd.append('photo', receiptFile); fd.append('caption', `📷 Capture del pedido: ${newOrderId}`);
            await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: fd });
          }
        } catch (e) { console.log("Telegram falló"); }
        setOrderId(newOrderId); setStep(3); onClearCart(); setLoading(false);
      };

      const handleRemoveItem = (id) => onQty(id, 0);

      return (
        <motion.div className="fixed inset-0 z-50" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} aria-modal="true" role="dialog">
          <div className="absolute inset-0 bg-[#0A1128]/80 backdrop-blur-sm" onClick={close}></div>
          <motion.aside initial={{ x: 24, opacity: 0 }} animate={{ x: 0, opacity: 1 }} exit={{ x: 24, opacity: 0 }} transition={{ duration: 0.28, ease: [0.2, 0.8, 0.2, 1] }} className="absolute right-0 top-0 h-full w-[92vw] max-w-md border-l border-divineLine2 bg-divineInk shadow-divine flex flex-col" onClick={(e) => e.stopPropagation()}>
            <div className="flex-1 overflow-y-auto scroll-smooth-ios p-6 pb-10" style={{ paddingBottom: "calc(2.5rem + env(safe-area-inset-bottom))" }}>
              <div className="flex items-start justify-between border-b border-divineLine2/30 pb-4 mb-4">
                <div><div className="text-xs font-bold tracking-[0.3em] text-divineGold/90 mb-1">{BRAND_NAME.toUpperCase()}</div><h3 className="text-2xl font-bold">{step === 0 ? "Tu Pedido" : step === 1 ? "Tus Datos" : step === 2 ? "Realizar Pago" : "Confirmado"}</h3></div>
                {step !== 3 && <button onClick={close} className="btn-ghost py-2 px-4 font-bold" type="button">CERRAR</button>}
              </div>

              {step === 0 && (
                <>
                  {faltante > 0 && items.length > 0 && (
                    <div className="bg-gradient-to-r from-divineGold/20 to-transparent border-l-4 border-divineGold p-4 rounded-r-2xl mb-6 animate-pulse">
                      <div className="text-[11px] font-black text-divineGold tracking-widest uppercase">
                        ✨ NIVEL DIVINÉE A LA VISTA
                      </div>
                      <div className="text-[10px] text-divineCream/60 mt-1 font-bold">
                        Estás a solo <span className="text-white">{money(faltante)}</span> de completar la experiencia con un postre.
                      </div>
                    </div>
                  )}
                  <div className="mt-4 space-y-4">
                    {items.length === 0 ? (<div className="rounded-2xl border-2 border-dashed border-divineLine2 bg-[#060A17] p-6 text-base font-semibold text-divineCream/70 text-center py-12">Tu carrito está vacío. ¡Agrega algo delicioso!</div>) : (
                      items.map((it) => (
                        <div key={it.uniqueId || it.id} className="rounded-2xl border border-divineLine2 bg-[#0A1128] p-4 relative overflow-hidden shadow-inner">
                          <button onClick={() => handleRemoveItem(it.uniqueId || it.id)} className="absolute top-3 right-3 p-2 text-red-500/70 hover:text-red-400 hover:bg-red-500/10 rounded-full transition bg-black/40" title="Eliminar producto">
                             <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fillRule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/></svg>
                          </button>
                          <div className="flex items-start justify-between gap-3 pr-10">
                             <div>
                               <div className="text-lg font-bold">{it.name}</div>
                               <div className="mt-1 text-sm font-semibold text-divineCream/70">{money(it.price)} c/u</div>
                               {it.meta && (<div className="mt-2 text-xs text-divineGold/80 bg-divineGold/10 p-2 rounded-lg border border-divineGold/20">{Object.entries(it.meta).map(([k,v]) => <div key={k}>{k}: {Array.isArray(v) ? v.join(", ") : String(v)}</div>)}</div>)}
                             </div>
                             <div className="text-lg font-black text-divineGold">{money(it.price * it.qty)}</div>
                          </div>
                          <div className="mt-4 flex items-center gap-3 bg-[#060A17] w-fit p-1 rounded-xl border border-divineLine2">
                            <button className="w-10 h-10 flex items-center justify-center rounded-lg bg-black/40 text-divineCream hover:bg-divineLine2 transition text-xl font-bold" onClick={() => onQty(it.uniqueId || it.id, it.qty - 1)} type="button">−</button>
                            <div className="min-w-[2rem] text-center text-lg font-bold">{it.qty}</div>
                            <button className="w-10 h-10 flex items-center justify-center rounded-lg bg-divineGold text-black hover:brightness-110 transition text-xl font-bold" onClick={() => onQty(it.uniqueId || it.id, it.qty + 1)} type="button">+</button>
                          </div>
                        </div>
                      ))
                    )}
                  </div>
                  {items.length > 0 && (
                    <div className="mt-6 space-y-4">
                      <div className="flex gap-2 mb-4">
                        <input type="text" value={inputCupon} onChange={(e)=>setInputCupon(e.target.value)} placeholder="Código Promocional" className="flex-1 bg-[#060A17] border-2 border-divineLine2 rounded-xl px-4 py-3 text-sm text-divineCream outline-none focus:border-pink-400 transition uppercase tracking-widest" />
                        <button onClick={aplicarCupon} className="bg-divineLine2/30 hover:bg-pink-500/20 text-pink-400 border-2 border-transparent hover:border-pink-500/50 px-4 rounded-xl font-bold text-xs transition" type="button">APLICAR</button>
                      </div>

                      <div className="rounded-2xl border-2 border-divineGold/40 bg-[#0A1128] p-5 shadow-glow">
                        {descuentoAplicado > 0 && (
                          <div className="flex items-center justify-between mb-2 text-pink-400 border-b border-divineLine2/30 pb-2">
                             <span className="text-xs font-bold uppercase tracking-widest">Cupón {codigoAplicado}</span>
                             <span className="font-bold">-{money(descuentoAplicado)}</span>
                          </div>
                        )}
                        <div className="flex items-center justify-between mb-4">
                           <span className="text-base text-divineCream/90 font-bold">SUBTOTAL</span>
                           <div className="text-right"><div className="text-2xl font-black text-divineGold">{money(total - descuentoAplicado)}</div></div>
                        </div>
                        <button className="w-full btn-primary py-4 text-sm" onClick={() => setStep(1)} type="button">PROCESAR COMPRA →</button>
                      </div>
                      <button onClick={onClearCart} className="w-full py-4 text-xs font-bold tracking-widest text-red-500/80 hover:text-red-400 hover:bg-red-500/10 border border-transparent hover:border-red-500/30 rounded-xl transition">VACIAR CARRITO</button>
                    </div>
                  )}
                </>
              )}

              {step === 1 && (
                <div className="mt-4 space-y-5">
                  <div><label className="text-xs font-bold tracking-[0.2em] text-divineGold mb-2 block">NOMBRE Y APELLIDO</label><input type="text" name="name" value={formData.name} onChange={handleInput} className="w-full bg-[#060A17] border-2 border-divineLine2 rounded-xl px-4 py-4 text-base font-bold text-divineCream outline-none focus:border-divineGold transition" /></div>
                  <div><label className="text-xs font-bold tracking-[0.2em] text-divineGold mb-2 block">NÚMERO DE TELÉFONO</label><input type="tel" name="phone" value={formData.phone} onChange={handleInput} className="w-full bg-[#060A17] border-2 border-divineLine2 rounded-xl px-4 py-4 text-base font-bold text-divineCream outline-none focus:border-divineGold transition" /></div>
                  
                  <div>
                    <label className="text-xs font-bold tracking-[0.2em] text-divineGold mb-2 block">MÉTODO DE ENTREGA</label>
                    <select value={deliveryZoneId} onChange={(e) => setDeliveryZoneId(e.target.value)} className="w-full bg-[#060A17] border-2 border-divineLine2 rounded-xl px-4 py-4 text-base font-bold text-divineCream outline-none focus:border-divineGold transition appearance-none">
                      {deliveryZonesList.map(zone => (
                        <option key={zone.id} value={zone.id}>{zone.name} (+{money(zone.cost)})</option>
                      ))}
                    </select>
                  </div>

                  {deliveryZoneId !== 'retiro' && (
                    <div><label className="text-xs font-bold tracking-[0.2em] text-divineGold mb-2 block">DIRECCIÓN EXACTA</label><textarea name="address" value={formData.address} onChange={handleInput} rows={2} className="w-full bg-[#060A17] border-2 border-divineLine2 rounded-xl px-4 py-4 text-base font-bold text-divineCream outline-none focus:border-divineGold transition" placeholder="Sector, calle, casa/apto..."></textarea></div>
                  )}
                  
                  <div><label className="text-xs font-bold tracking-[0.2em] text-divineCream/60 mb-2 block">NOTA ADICIONAL (OPCIONAL)</label><input type="text" name="notes" value={formData.notes} onChange={handleInput} className="w-full bg-[#060A17] border-2 border-divineLine2 rounded-xl px-4 py-4 text-base font-medium text-divineCream outline-none focus:border-divineGold transition" placeholder="Alergias, sin cebolla..." /></div>
                  
                  <div className="pt-6 flex gap-4"><button className="btn-ghost flex-1 py-4 font-bold text-sm" onClick={() => setStep(0)}>← ATRÁS</button><button className="btn-primary flex-1 py-4 font-bold text-sm" onClick={() => setStep(2)} disabled={!formData.name || !formData.phone || (deliveryZoneId !== 'retiro' && !formData.address)} style={{opacity: (!formData.name || !formData.phone || (deliveryZoneId !== 'retiro' && !formData.address)) ? 0.5 : 1}}>PAGAR →</button></div>
                </div>
              )}

              {step === 2 && (
                <div className="mt-2 space-y-5">
                  <div className="rounded-3xl border-2 border-divineGold/50 bg-[#0A1128] p-6 shadow-glow">
                    <div className="text-center pb-4 border-b-2 border-divineLine2">
                      <div className="text-sm font-bold tracking-[0.2em] text-divineCream/80 mb-2">TOTAL A PAGAR</div>
                      <div className="text-4xl font-extrabold text-divineGold">{money(finalTotal)} <span className="text-lg font-bold text-divineCream/50">USD</span></div>
                      <div className="text-sm font-semibold text-divineCream/70 mt-2">Pedido: {money(total)} {deliveryCost > 0 && `| Delivery: ${money(deliveryCost)}`}</div>
                    </div>
                    
                    {/* Selector de Método de Pago */}
                    <div className="pt-5">
                       <label className="text-xs font-bold tracking-[0.2em] text-divineGold mb-3 block">MÉTODO DE PAGO</label>
                       <div className="grid grid-cols-3 gap-3">
                         <button onClick={() => setPaymentMethod('pagomovil')} className={`py-3 rounded-xl text-[11px] font-black tracking-widest transition border-2 ${paymentMethod === 'pagomovil' ? 'bg-divineGold/20 border-divineGold text-divineGold' : 'bg-black/30 border-divineLine2 text-divineCream/50'}`}>PAGO MÓVIL</button>
                         <button onClick={() => setPaymentMethod('zelle')} className={`py-3 rounded-xl text-[11px] font-black tracking-widest transition border-2 ${paymentMethod === 'zelle' ? 'bg-[#741bd1]/20 border-[#741bd1] text-[#b366ff]' : 'bg-black/30 border-divineLine2 text-divineCream/50'}`}>ZELLE</button>
                         <button onClick={() => setPaymentMethod('binance')} className={`py-3 rounded-xl text-[11px] font-black tracking-widest transition border-2 ${paymentMethod === 'binance' ? 'bg-[#fcd535]/20 border-[#fcd535] text-[#fcd535]' : 'bg-black/30 border-divineLine2 text-divineCream/50'}`}>BINANCE</button>
                       </div>
                    </div>
                    
                    <div className="bg-[#060A17] rounded-2xl p-5 mt-5 border border-divineLine2/50 shadow-inner">
                      {paymentMethod === 'pagomovil' && (
                        <div className="space-y-4">
                          <div className="flex justify-between items-center"><span className="text-sm font-bold text-divineCream/70 block">Monto Bs:</span><span className="font-black text-divineGold text-2xl">{bcvRate ? moneyVES(finalTotal, bcvRate) : 'Calculando...'}</span></div>
                          <div className="h-[2px] bg-divineLine2/30 my-2"></div>
                          <div><span className="text-xs font-bold text-divineCream/50 block mb-1">Banco</span><span className="font-extrabold tracking-wider text-lg">{catalog?.settings?.banco || "PROVINCIAL (0108)"}</span></div>
                          <div>
                            <span className="text-xs font-bold text-divineCream/50 block mb-1">Teléfono</span>
                            <div className="flex items-center gap-3 bg-black/40 p-2 rounded-xl border border-divineLine2">
                               <span className="font-extrabold tracking-wider text-lg flex-1 pl-2">{catalog?.settings?.telefonoPago || "0412 683 5635"}</span>
                               <button onClick={()=>copyToClipboard(catalog?.settings?.telefonoPago || "0412 683 5635")} className="p-3 rounded-lg bg-divineGold/20 text-divineGold hover:bg-divineGold hover:text-black transition" title="Copiar"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                            </div>
                          </div>
                          <div>
                            <span className="text-xs font-bold text-divineCream/50 block mb-1">Cédula o RIF</span>
                            <div className="flex items-center gap-3 bg-black/40 p-2 rounded-xl border border-divineLine2">
                               <span className="font-extrabold tracking-wider text-lg flex-1 pl-2 uppercase">{catalog?.settings?.cedulaPago || "V-30158858"}</span>
                               <button onClick={()=>copyToClipboard(catalog?.settings?.cedulaPago || "V-30158858")} className="p-3 rounded-lg bg-divineGold/20 text-divineGold hover:bg-divineGold hover:text-black transition" title="Copiar"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                            </div>
                          </div>
                        </div>
                      )}
                      {paymentMethod === 'zelle' && (
                        <div className="space-y-4">
                          <div>
                             <span className="text-xs font-bold text-[#b366ff]/70 block mb-2">Correo Zelle</span>
                             <div className="flex items-center gap-3 bg-black/40 p-2 rounded-xl border border-[#741bd1]/50">
                                <span className="font-bold tracking-wider text-white text-base break-all flex-1 pl-2">{catalog?.settings?.zelleEmail || "tu_correo@zelle.com"}</span>
                                <button onClick={()=>copyToClipboard(catalog?.settings?.zelleEmail || "tu_correo@zelle.com", true)} className="shrink-0 p-3 rounded-lg bg-[#741bd1]/30 text-[#b366ff] hover:bg-[#741bd1] hover:text-white transition" title="Copiar"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                             </div>
                          </div>
                          <div className="text-xs font-semibold text-divineCream/70 border-t border-divineLine2/30 pt-3 text-center bg-[#741bd1]/10 p-3 rounded-lg">Por favor, indica tu nombre exacto de Zelle en la referencia abajo.</div>
                        </div>
                      )}
                      {paymentMethod === 'binance' && (
                        <div className="space-y-4">
                          <div>
                             <span className="text-xs font-bold text-[#fcd535]/70 block mb-2">Binance Pay ID</span>
                             <div className="flex items-center gap-3 bg-black/40 p-2 rounded-xl border border-[#fcd535]/50">
                                <span className="font-bold tracking-wider text-white text-lg flex-1 pl-2">{catalog?.settings?.binanceId || "123456789"}</span>
                                <button onClick={()=>copyToClipboard(catalog?.settings?.binanceId || "123456789")} className="shrink-0 p-3 rounded-lg bg-[#fcd535]/20 text-[#fcd535] hover:bg-[#fcd535] hover:text-black transition" title="Copiar"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                             </div>
                          </div>
                          <div>
                             <span className="text-xs font-bold text-[#fcd535]/70 block mb-2">Binance Email</span>
                             <div className="flex items-center gap-3 bg-black/40 p-2 rounded-xl border border-[#fcd535]/50">
                                <span className="font-bold tracking-wider text-white text-base break-all flex-1 pl-2">{catalog?.settings?.binanceEmail || "tu_correo@binance.com"}</span>
                                <button onClick={()=>copyToClipboard(catalog?.settings?.binanceEmail || "tu_correo@binance.com", true)} className="shrink-0 p-3 rounded-lg bg-[#fcd535]/20 text-[#fcd535] hover:bg-[#fcd535] hover:text-black transition" title="Copiar"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg></button>
                             </div>
                          </div>
                        </div>
                      )}
                    </div>
                  </div>
                  <div><label className="text-xs font-bold tracking-[0.2em] text-divineGold mb-2 block">NÚMERO DE REFERENCIA</label><input type="text" name="ref" value={formData.ref} onChange={handleInput} className="mt-1 w-full bg-[#060A17] border-2 border-divineGold/60 rounded-xl px-4 py-4 text-xl font-black text-divineCream outline-none focus:border-divineGold transition text-center tracking-widest placeholder:font-medium placeholder:text-sm" placeholder="O nombre del titular..." /></div>
                  <div><label className="text-xs font-bold tracking-[0.2em] text-divineCream/60 mb-2 block">O SUBE EL CAPTURE DEL PAGO</label><input type="file" accept="image/*" onChange={(e) => setReceiptFile(e.target.files[0])} className="mt-1 w-full bg-[#060A17] border-2 border-divineLine2 rounded-xl px-4 py-4 text-sm font-bold text-divineCream file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-black file:bg-divineGold file:text-black hover:file:bg-divineGold2" /></div>
                  <div className="pt-6 flex gap-4"><button className="btn-ghost flex-1 py-4 font-bold text-sm" onClick={() => setStep(1)} disabled={loading}>← ATRÁS</button><button className="btn-primary flex-1 py-4 font-bold text-sm" onClick={handleCheckout} disabled={(!formData.ref && !receiptFile) || loading} style={{opacity: ((!formData.ref && !receiptFile) || loading) ? 0.5 : 1}}>{loading ? "PROCESANDO..." : "ENVIAR PEDIDO"}</button></div>
                </div>
              )}

              {step === 3 && (
                <div className="mt-12 flex flex-col items-center text-center space-y-6">
                  <div className="w-20 h-20 rounded-full border-4 border-divineGold text-divineGold flex items-center justify-center text-4xl shadow-glow">✓</div>
                  <h3 className="text-3xl font-black">¡Pedido Recibido!</h3>
                  
                  {/* CAJA DE MENSAJE MOTIVACIONAL VIP */}
                  <div className="bg-gradient-to-br from-divineGold/10 to-transparent border-l-4 border-divineGold p-5 rounded-2xl shadow-glow relative overflow-hidden w-full">
                    <div className="absolute -right-2 -top-2 text-divineGold/10 text-6xl">✨</div>
                    <p className="text-sm font-bold text-divineGold italic tracking-wide relative z-10 leading-relaxed">
                      "{(
                        [
                          "El buen gusto no es casualidad, es una elección. Gracias por exigir la excelencia hoy.",
                          "Acabas de asegurar la mejor decisión de tu día. Prepárate para un nivel de sabor que redefine los estándares.",
                          "La grandeza toma tiempo, pero tu orden ya está en la parrilla. Bienvenido al círculo que no se conforma.",
                          "No es solo comida, es una declaración de intenciones. Gracias por pertenecer a la élite de Divinée.",
                          "Has desbloqueado un momento de auténtico lujo. Relájate, nosotros nos encargamos de que sea inolvidable."
                        ]
                      )[Math.floor(Math.random() * 5)]}"
                    </p>
                  </div>

                  <p className="text-sm text-divineCream/80 font-medium">Estamos verificando tu pago para encender los fogones.</p>
                  <div className="w-full mt-4 p-8 rounded-3xl border-2 border-divineLine2 bg-[#0A1128] shadow-inner relative overflow-hidden">
                    <div className="absolute top-0 right-0 bg-blue-500/20 text-blue-400 text-[10px] font-bold px-3 py-1 rounded-bl-xl border-l border-b border-blue-500/30 tracking-widest">
                       ⏱️ ENTREGA EST.: {catalog?.settings_v2?.deliveryEta || "35-45 MIN"}
                    </div>
                    <div className="text-sm font-bold tracking-[0.3em] text-divineCream/60 mb-3 mt-2">CÓDIGO DE RASTREO</div>
                    <div className="text-4xl font-black tracking-widest text-divineGold">{orderId}</div>
                    <p className="mt-4 text-sm font-medium text-divineCream/60">Copia o guarda este código. Lo usarás en la lupa de Rastreo para ver tu pedido en vivo.</p>
                  </div>
                  
                  <button 
                    onClick={() => {
                      if (window.deferredPrompt) {
                        window.deferredPrompt.prompt();
                        window.deferredPrompt.userChoice.then((choiceResult) => {
                          if (choiceResult.outcome === 'accepted') {
                            console.log('El cliente instaló la App');
                          }
                          window.deferredPrompt = null;
                        });
                      } else {
                        window.showToast('Tu navegador no soporta instalación directa o ya la tienes instalada.', '📱');
                      }
                    }} 
                    className="mt-6 w-full bg-divineGold text-[#0A1128] py-5 rounded-2xl font-black text-base tracking-widest flex items-center justify-center gap-3 shadow-glow hover:brightness-110 transition"
                    type="button"
                  >
                    <span className="text-2xl">📱</span> INSTALAR APP DIVINÉE
                  </button>

                  <button className="mt-8 w-full btn-ghost py-4 font-bold text-sm" onClick={close}>VOLVER AL MENÚ PRINCIPAL</button>
                </div>
              )}
            </div>
          </motion.aside>
        </motion.div>
      );
    }

    // =========================
    // Panel de Administrador (Con Configuración General y Ajustes)
    // =========================
    // =========================
    // Atelier (Burger Builder)
    // =========================
    function wrapIndex(i, len) {
      if (len <= 0) return 0;
      return (i % len + len) % len;
    }

    function IconButton({ label, onClick, title }) {
      return (
        <button onClick={onClick} title={title} className="btn-ghost px-4 py-2" type="button">
          {label}
        </button>
      );
    }

    function CarouselPicker({ title, options, index, onPrev, onNext, disabledItems = [] }) {
      const opt = options[index];
      const isExhausted = disabledItems.includes(opt?.id);
      return (
        <div className={`rounded-3xl border-2 ${isExhausted ? 'border-red-500/40 bg-red-500/10' : 'border-divineLine2 bg-[#060A17]'} p-5 transition-colors shadow-inner`}>
          <div className="text-xs font-bold tracking-[0.3em] text-divineGold/90">{title.toUpperCase()}</div>
          <div className="mt-4 grid grid-cols-[auto_1fr_auto] items-center gap-4">
            <IconButton label="←" title="Anterior" onClick={onPrev} />
            <motion.div key={opt?.id} initial={{ opacity: 0, y: 8 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.18 }} className="rounded-2xl border-2 border-divineLine2 bg-[#0A1128] p-5">
              <div className="flex items-start justify-between gap-4">
                <div>
                  <div className="text-lg font-bold">
                    {opt?.name} 
                    {isExhausted && <span className="ml-3 inline-block rounded-full bg-red-500/20 border border-red-500/50 px-3 py-1 text-[10px] font-bold text-red-400 tracking-widest align-middle">AGOTADO</span>}
                  </div>
                  <div className="mt-2 text-sm text-divineCream/70 font-medium">{opt?.note}</div>
                </div>
                <div className="text-base font-black text-divineGold">{money(opt?.price ?? 0)}</div>
              </div>
            </motion.div>
            <IconButton label="→" title="Siguiente" onClick={onNext} />
          </div>
        </div>
      );
    }

    function LayersHeader({ title, count, onAdd, addLabel, disabled }) {
      return (
        <div className="flex flex-wrap items-center justify-between gap-3">
          <div>
            <div className="text-xs font-bold tracking-[0.3em] text-divineGold/90">{title.toUpperCase()}</div>
            <div className="mt-1 text-sm font-semibold text-divineCream/70">Capas actuales: <span className="text-divineCream">{count}</span></div>
          </div>
          <button type="button" onClick={onAdd} className="btn-ghost px-5 py-3 text-xs font-bold" disabled={disabled} style={{ opacity: disabled ? 0.55 : 1 }}>
            ➕ <span className="ml-1">{addLabel}</span>
          </button>
        </div>
      );
    }

    function LayersTabs({ label, layers, active, setActive, onRemove, min = 1 }) {
      return (
        <div className="mt-4 flex gap-3 overflow-x-auto scroll-smooth-ios pb-2 mobile-scroll">
          {layers.map((_, i) => (
            <div key={i} className="flex items-center gap-1 shrink-0">
              <button type="button" onClick={() => setActive(i)} className={["whitespace-nowrap rounded-full border-2 px-4 py-2.5 text-xs font-bold tracking-[0.2em] transition backdrop-blur", active === i ? "border-divineGold bg-divineGold/20 text-divineGold shadow-glow" : "border-divineLine2 bg-[#060A17] text-divineCream/70 hover:text-divineGold hover:border-divineGold/40"].join(" ")}>{label.toUpperCase()} {i + 1}</button>
              {layers.length > min && (<button type="button" onClick={() => onRemove(i)} className="rounded-full border-2 border-divineLine2 bg-[#060A17] w-9 h-9 flex items-center justify-center text-sm font-bold text-divineCream/70 hover:text-red-400 hover:border-red-400/50 transition" title="Eliminar capa">✕</button>)}
            </div>
          ))}
        </div>
      );
    }

    function BurgerBuilder({ onAddToCart, catalog }) {
      const [step, setStep] = useState(0);
      const [bunIdx, setBunIdx] = useState(0);
      const [proteinLayers, setProteinLayers] = useState([0]);
      const [activeProteinLayer, setActiveProteinLayer] = useState(0);
      const [cheeseLayers, setCheeseLayers] = useState([5]); 
      const [activeCheeseLayer, setActiveCheeseLayer] = useState(0);
      
      const [toppings, setToppings] = useState({});
      
      const [disabledItems, setDisabledItems] = useState([]);
      const MAX_PROTEIN_LAYERS = 4;
      const MAX_CHEESE_LAYERS = 4;
      const BURGER_BASE = 0.00;

      useEffect(() => {
        const fetchInventory = async () => {
          if(!window.supabaseClient) return;
          const { data } = await window.supabaseClient.from('disabled_ingredients').select('id');
          if (data) setDisabledItems(data.map(i => i.id));
        };
        fetchInventory();
      }, []);

      const bun = catalog.buns[bunIdx];
      const cheesesCount = Math.max(0, cheeseLayers.filter((idx) => catalog.cheeses[idx]?.id !== "none").length);
      const toppingsCount = Object.values(toppings).reduce((a, b) => a + b, 0);

      const [price, totalCost] = useMemo(() => {
        const bunP = bun?.price ?? 0;
        const bunC = bun?.cost ?? 0;
        const proteinsP = proteinLayers.reduce((acc, idx) => acc + (catalog.proteins[idx]?.price ?? 0), 0);
        const proteinsC = proteinLayers.reduce((acc, idx) => acc + (catalog.proteins[idx]?.cost ?? 0), 0);
        const cheesesP = cheeseLayers.reduce((acc, idx) => acc + (catalog.cheeses[idx]?.price ?? 0), 0);
        const cheesesC = cheeseLayers.reduce((acc, idx) => acc + (catalog.cheeses[idx]?.cost ?? 0), 0);
        
        const toppingsP = Object.entries(toppings).reduce((acc, [id, qty]) => acc + (catalog.toppings.find((t) => t.id === id)?.price ?? 0) * qty, 0);
        const toppingsC = Object.entries(toppings).reduce((acc, [id, qty]) => acc + (catalog.toppings.find((t) => t.id === id)?.cost ?? 0) * qty, 0);
        
        return [
          BURGER_BASE + bunP + proteinsP + cheesesP + toppingsP,
          bunC + proteinsC + cheesesC + toppingsC
        ];
      }, [bunIdx, proteinLayers, cheeseLayers, toppings, catalog]);

      const dynamicConfig = useMemo(() => {
        const conf = [{ type: 'bunBottom' }];
        proteinLayers.forEach(() => conf.push({ type: 'meat' }));
        cheeseLayers.forEach((idx) => { if (catalog.cheeses[idx]?.id !== 'none') conf.push({ type: 'cheese' }); });
        
        Object.entries(toppings).forEach(([id, qty]) => {
          for (let i=0; i<qty; i++) {
            if (id === 'lettuce' || id === 'arugula') conf.push({ type: 'lettuce' });
            else if (id === 'tomato') conf.push({ type: 'tomato' });
            else conf.push({ type: 'generic' });
          }
        });
        
        conf.push({ type: 'bunTop' });
        return conf;
      }, [proteinLayers, cheeseLayers, toppings, catalog]);

      const isBunDisabled = disabledItems.includes(bun?.id);
      const hasDisabledProtein = proteinLayers.some(idx => disabledItems.includes(catalog.proteins[idx]?.id));
      const hasDisabledCheese = cheeseLayers.some(idx => disabledItems.includes(catalog.cheeses[idx]?.id));
      const hasDisabledTopping = Object.keys(toppings).some(id => disabledItems.includes(id));
      
      const hasAnyError = isBunDisabled || hasDisabledProtein || hasDisabledCheese || hasDisabledTopping;
      const valid = proteinLayers.length >= 1 && !hasAnyError;

      const steps = ["PAN", "CARNES", "QUESOS", "TOPPINGS"];

      function incrementTopping(id) { 
        setToppings(prev => ({ ...prev, [id]: (prev[id] || 0) + 1 })); 
      }
      function decrementTopping(id) { 
        setToppings(prev => { 
          const next = { ...prev }; 
          if (next[id] > 1) next[id] -= 1; else delete next[id]; 
          return next; 
        }); 
      }
      
      function bunPrev() { setBunIdx((i) => wrapIndex(i - 1, catalog.buns.length)); }
      function bunNext() { setBunIdx((i) => wrapIndex(i + 1, catalog.buns.length)); }
      function proteinPrev() { setProteinLayers((layers) => { const copy = [...layers]; copy[activeProteinLayer] = wrapIndex(copy[activeProteinLayer] - 1, catalog.proteins.length); return copy; }); }
      function proteinNext() { setProteinLayers((layers) => { const copy = [...layers]; copy[activeProteinLayer] = wrapIndex(copy[activeProteinLayer] + 1, catalog.proteins.length); return copy; }); }
      function addProteinLayer() { setProteinLayers((layers) => { if (layers.length >= MAX_PROTEIN_LAYERS) return layers; return [...layers, layers[layers.length - 1] ?? 0]; }); setActiveProteinLayer((i) => Math.min(i + 1, MAX_PROTEIN_LAYERS - 1)); }
      function removeProteinLayer(i) { setProteinLayers((layers) => layers.filter((_, idx) => idx !== i)); setActiveProteinLayer((cur) => (cur > 0 ? cur - 1 : 0)); }
      function cheesePrev() { setCheeseLayers((layers) => { const copy = [...layers]; copy[activeCheeseLayer] = wrapIndex(copy[activeCheeseLayer] - 1, catalog.cheeses.length); return copy; }); }
      function cheeseNext() { setCheeseLayers((layers) => { const copy = [...layers]; copy[activeCheeseLayer] = wrapIndex(copy[activeCheeseLayer] + 1, catalog.cheeses.length); return copy; }); }
      function addCheeseLayer() { setCheeseLayers((layers) => { if (layers.length >= MAX_CHEESE_LAYERS) return layers; return [...layers, layers[layers.length - 1] ?? 0]; }); setActiveCheeseLayer((i) => Math.min(i + 1, MAX_CHEESE_LAYERS - 1)); }
      function removeCheeseLayer(i) { setCheeseLayers((layers) => layers.filter((_, idx) => idx !== i)); setActiveCheeseLayer((cur) => (cur > 0 ? cur - 1 : 0)); }

      function buildAndAdd() {
        if (!valid) return;
        const bunSel = catalog.buns[bunIdx];
        const proteinsSel = proteinLayers.map((idx) => catalog.proteins[idx]).filter(Boolean);
        const cheesesSel = cheeseLayers.map((idx) => catalog.cheeses[idx]).filter(Boolean);
        
        let toppingsArr = [];
        Object.entries(toppings).forEach(([id, qty]) => {
          const t = catalog.toppings.find(x => x.id === id);
          if (t) {
            for (let i = 0; i < qty; i++) toppingsArr.push(t);
          }
        });
        
        const id = ["custom-burger", bunSel?.id, proteinsSel.map((p) => p.id).join("+"), cheesesSel.map((c) => c.id).join("+"), toppingsArr.map(t=>t.id).sort().join(",")].join(":");
        const meta = { pan: bunSel?.name, carnes: proteinsSel.map((p) => p.name), quesos: cheesesSel.map((c) => c.name), toppings: toppingsArr.map((t) => t.name) };
        
        onAddToCart?.({ id, name: "Hamburguesa Divinée (Atelier)", price, cost: totalCost, meta }, true); // true = es burger, mostrar upsell
        setStep(0); setBunIdx(0); setProteinLayers([0]); setActiveProteinLayer(0); setCheeseLayers([5]); setActiveCheeseLayer(0); setToppings({});
      }

      return (
        <div className="rounded-3xl bg-[#060A17]/80 backdrop-blur-xl border-2 border-divineGold/40 p-5 md:p-8 shadow-glow">
          <div className="flex flex-col md:flex-row md:items-start justify-between gap-5">
            <div>
              <div className="text-sm font-bold tracking-[0.3em] text-divineGold/90">ATELIER</div>
              <h3 className="mt-2 text-2xl font-extrabold md:text-4xl text-divineCream">Arma tu Hamburguesa</h3>
              <p className="mt-2 text-base text-divineCream/70 font-medium">Configurador visual: Agrega capas y verás cómo caen.</p>
            </div>
            <div className="rounded-2xl border-2 border-divineLine2 bg-[#0A1128] px-6 py-4 shadow-inner text-center md:text-right min-w-[140px]">
              <div className="text-xs font-bold tracking-[0.3em] text-divineCream/60">PRECIO TOTAL</div>
              <div className="mt-1 text-2xl font-black text-divineGold">{money(price)}</div>
            </div>
          </div>
          
          <div className="mt-8 rounded-3xl border-2 border-divineLine2 bg-[#0A1128] overflow-hidden shadow-inner">
            <div className="flex items-center justify-between px-5 py-4 border-b-2 border-divineLine2 bg-[#060A17]">
              <div>
                <div className="text-xs font-bold tracking-[0.3em] text-divineGold/90">VISTA 3D EN VIVO</div>
              </div>
              <div className="text-xs font-bold tracking-[0.2em] text-divineCream/70">
                {proteinLayers.length} carne(s) • {cheesesCount} queso(s)
              </div>
            </div>
            <BurgerViewer3D heightClass="h-[280px] md:h-[400px]" modelUrl={null} burgerConfig={dynamicConfig} showUI={false} />
          </div>

          {hasAnyError && (
            <div className="mt-6 p-4 rounded-2xl border-2 border-red-500/50 bg-red-500/10 text-red-400 text-base font-bold text-center">
              ⚠️ Tienes ingredientes AGOTADOS seleccionados. Cámbialos para poder armar tu hamburguesa.
            </div>
          )}

          <div className="mt-8 grid grid-cols-4 gap-3">
            {steps.map((label, i) => (
              <button key={label} onClick={() => setStep(i)} className={["rounded-2xl border-2 px-2 py-3 text-xs sm:text-sm font-bold tracking-[0.1em] transition", step === i ? "border-divineGold bg-divineGold text-[#0A1128] shadow-glow" : "border-divineLine2 bg-[#060A17] text-divineCream/80 hover:text-divineGold hover:border-divineGold/50"].join(" ")} type="button">
                {label}
              </button>
            ))}
          </div>

          <motion.div key={step} initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.25 }} className="mt-6">
            {step === 0 && (
              <CarouselPicker title="Pan" options={catalog.buns} index={bunIdx} onPrev={bunPrev} onNext={bunNext} disabledItems={disabledItems} />
            )}
            {step === 1 && (
              <div className="space-y-5">
                <LayersHeader title="Carnes" count={proteinLayers.length} onAdd={addProteinLayer} addLabel="Agregar otra carne" disabled={proteinLayers.length >= MAX_PROTEIN_LAYERS} />
                <LayersTabs label="Carne" layers={proteinLayers} active={activeProteinLayer} setActive={setActiveProteinLayer} onRemove={removeProteinLayer} min={1} />
                <CarouselPicker title={`Carne ${activeProteinLayer + 1}`} options={catalog.proteins} index={proteinLayers[activeProteinLayer] ?? 0} onPrev={proteinPrev} onNext={proteinNext} disabledItems={disabledItems} />
              </div>
            )}
            {step === 2 && (
              <div className="space-y-5">
                <LayersHeader title="Quesos" count={cheeseLayers.length} onAdd={addCheeseLayer} addLabel="Agregar otro queso" disabled={cheeseLayers.length >= MAX_CHEESE_LAYERS} />
                <LayersTabs label="Queso" layers={cheeseLayers} active={activeCheeseLayer} setActive={setActiveCheeseLayer} onRemove={removeCheeseLayer} min={1} />
                <CarouselPicker title={`Queso ${activeCheeseLayer + 1}`} options={catalog.cheeses} index={cheeseLayers[activeCheeseLayer] ?? 0} onPrev={cheesePrev} onNext={cheeseNext} disabledItems={disabledItems} />
              </div>
            )}
            {step === 3 && (
              <div className="rounded-3xl border-2 border-divineLine2 bg-[#060A17] p-5 md:p-6 shadow-inner">
                <div className="flex items-start justify-between gap-4">
                  <div>
                    <div className="text-sm font-bold tracking-[0.3em] text-divineGold/90">TOPPINGS Y SALSAS</div>
                    <div className="mt-1 text-sm font-medium text-divineCream/70">Selecciona todos los que quieras. ¡Incluso dobles!</div>
                  </div>
                  <div className="text-xs font-bold tracking-[0.2em] text-divineCream/60 bg-black/40 px-3 py-1.5 rounded-lg border border-divineLine2/50">{toppingsCount} agregados</div>
                </div>
                <div className="mt-6 grid gap-3 sm:grid-cols-2">
                  {catalog.toppings.map((t) => {
                    const qty = toppings[t.id] || 0;
                    const active = qty > 0;
                    const isExhausted = disabledItems.includes(t.id);
                    return (
                      <div key={t.id} className={`rounded-2xl border-2 px-5 py-4 text-left transition ${isExhausted ? 'border-red-500/30 bg-red-500/5 opacity-60' : (active ? 'border-divineGold/80 bg-divineGold/10 shadow-glow' : 'border-divineLine2 bg-[#0A1128]')}`}>
                        <div className="flex items-center justify-between gap-3">
                          <div className="flex-1 min-w-0">
                            <div className={`font-bold text-base truncate ${isExhausted ? 'text-red-400 line-through' : 'text-divineCream'}`}>{t.name}</div>
                            <div className="mt-1 text-[10px] font-bold tracking-[0.2em] text-divineCream/50">
                              {isExhausted ? <span className="text-red-400">AGOTADO</span> : t.group.toUpperCase()}
                            </div>
                          </div>
                          
                          {isExhausted ? (
                             <div className="text-sm font-bold text-divineCream/30">{money(t.price)}</div>
                          ) : !active ? (
                            <div className="flex items-center gap-4">
                              <span className="text-base font-black text-divineGold">{money(t.price)}</span>
                              <button onClick={() => incrementTopping(t.id)} className="w-10 h-10 flex items-center justify-center rounded-xl bg-[#060A17] border border-divineLine2 text-divineGold hover:bg-divineGold hover:text-[#0A1128] transition text-xl font-bold shadow-sm">+</button>
                            </div>
                          ) : (
                            <div className="flex items-center gap-3 bg-[#060A17] rounded-xl border border-divineLine2 px-2 py-1 shadow-inner">
                              <button onClick={() => decrementTopping(t.id)} className="w-8 h-8 flex items-center justify-center rounded-lg text-divineCream/80 hover:bg-white/10 transition text-xl font-bold">−</button>
                              <span className="w-6 text-center text-lg font-black text-divineGold">{qty}</span>
                              <button onClick={() => incrementTopping(t.id)} className="w-8 h-8 flex items-center justify-center rounded-lg bg-divineGold text-[#0A1128] font-bold transition text-xl">+</button>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </motion.div>

          <div className="mt-10 rounded-3xl border-2 border-divineLine2 bg-[#060A17] p-6 shadow-inner">
            <div className="text-xs font-bold tracking-[0.3em] text-divineCream/60 mb-4 border-b border-divineLine2/30 pb-2">DESGLOSE DEL PEDIDO</div>
            <div className="space-y-3 text-base font-medium text-divineCream/80">
              <div className="flex justify-between"><span>Salsas Divinée</span><span>{money(BURGER_BASE)}</span></div>
              <div className={`flex justify-between ${isBunDisabled ? 'text-red-400 line-through' : ''}`}><span>{bun?.name}</span><span>{money(bun?.price ?? 0)}</span></div>
              
              {proteinLayers.map((idx, i) => {
                const p = catalog.proteins[idx];
                if (!p) return null;
                return <div key={`p-${i}`} className={`flex justify-between ${disabledItems.includes(p.id) ? 'text-red-400 line-through' : ''}`}><span>{p.name}</span><span>{money(p.price)}</span></div>;
              })}
              
              {cheeseLayers.map((idx, i) => {
                const c = catalog.cheeses[idx];
                if (!c || c.id === 'none') return null;
                return <div key={`c-${i}`} className={`flex justify-between ${disabledItems.includes(c.id) ? 'text-red-400 line-through' : ''}`}><span>{c.name}</span><span>{money(c.price)}</span></div>;
              })}
              
              {Object.entries(toppings).map(([id, qty]) => {
                const t = catalog.toppings.find((x) => x.id === id);
                if (!t) return null;
                return <div key={id} className={`flex justify-between ${disabledItems.includes(id) ? 'text-red-400 line-through' : ''}`}><span>{qty}x {t.name}</span><span>{money(t.price * qty)}</span></div>;
              })}
            </div>
            <div className="mt-5 pt-4 border-t-2 border-divineLine2 flex justify-between items-center">
              <span className="text-lg font-bold text-divineCream">TOTAL FINAL</span>
              <span className="text-2xl font-black text-divineGold">{money(price)}</span>
            </div>
          </div>

          <div className="mt-8 flex flex-col sm:flex-row items-center gap-4">
            <div className="flex w-full sm:w-auto gap-3">
               <button onClick={() => setStep((s) => Math.max(0, s - 1))} className="flex-1 sm:flex-none btn-ghost py-4 px-6 text-sm font-bold" type="button">← ATRÁS</button>
               <button onClick={() => setStep((s) => Math.min(3, s + 1))} className="flex-1 sm:flex-none btn-ghost py-4 px-6 text-sm font-bold" type="button">SIGUIENTE →</button>
            </div>
            <button onClick={buildAndAdd} className="w-full sm:w-auto sm:ml-auto btn-primary py-4 px-10 text-sm shadow-glow" disabled={!valid} style={{ opacity: valid ? 1 : 0.6 }} type="button">
              ➕ AÑADIR CREACIÓN AL CARRITO
            </button>
          </div>
        </div>
      );
    }
    // =========================
    // Yogurt Coming Soon
    // =========================
    function YogurtComingSoonCard() {
      return (
        <div className="rounded-3xl border-2 border-divineLine2 bg-[#060A17] p-6 md:p-8 shadow-divine">
          <div className="text-xs font-bold tracking-[0.3em] text-divineGold/90 mb-2">GREEK YOGURT</div>
          <div className="text-3xl md:text-4xl font-black text-divineCream">¡MUY PRONTO!</div>
          <p className="mt-4 text-base text-divineCream/80 font-medium">
            Estamos preparando una experiencia divina para ti.
          </p>
          <div className="mt-6 inline-flex items-center gap-3 rounded-xl border-2 border-divineLine2/50 bg-black/40 px-5 py-3 text-xs font-bold tracking-[0.2em] text-divineCream/70">
            <span className="text-red-400">🔴</span> YOGURT DE MÁQUINA • NO DISPONIBLE
          </div>
        </div>
      );
    }
    function AdminLogin({ onLogin, onClose }) {
      const [pin, setPin] = useState("");
      const handleLogin = () => {
        if (pin === "7777") onLogin(); 
        else alert("PIN incorrecto. Acceso denegado.");
      };
      return (
        <BottomSheet title="ZONA RESTRINGIDA" subtitle="Acceso exclusivo para el equipo de Divinée" onClose={onClose}>
          <div className="space-y-4">
            <input type="password" value={pin} onChange={(e) => setPin(e.target.value)} placeholder="Ingresa el PIN" className="w-full bg-black/40 border border-divineLine2 rounded-xl px-4 py-3 text-center text-2xl tracking-[0.5em] text-divineGold outline-none focus:border-divineGold transition" />
            <button className="w-full btn-primary" onClick={handleLogin}>ENTRAR AL PANEL</button>
          </div>
        </BottomSheet>
      );
    }

    function AdminDashboard({ onClose, supabaseClient, localBurgers, localDesserts, localDrinks, localCatalog, onSaveInventory, onAddProduct }) {
      const [orders, setOrders] = useState([]);
      const [disabledItems, setDisabledItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('orders'); 
      const [searchCode, setSearchCode] = useState('');

      // --- MÓDULO DE FINANZAS ---
      const [financeDate, setFinanceDate] = useState(new Date().toISOString().split('T')[0]);
      const [financeOrders, setFinanceOrders] = useState([]);
      const [financeLoading, setFinanceLoading] = useState(false);

      const loadFinanceData = async (dateStr) => {
         setFinanceLoading(true);
         const start = new Date(dateStr + "T00:00:00").toISOString();
         const end = new Date(dateStr + "T23:59:59.999").toISOString();

         const { data } = await supabaseClient.from('orders')
           .select('*')
           .gte('created_at', start)
           .lte('created_at', end);
           
         if (data) setFinanceOrders(data);
         setFinanceLoading(false);
      };

      useEffect(() => {
         if (tab === 'finance') loadFinanceData(financeDate);
      }, [tab, financeDate]);

      const handleResetDay = async () => {
         const pwd = window.prompt(`⚠️ PELIGRO: Vas a ELIMINAR TODOS los pedidos del ${financeDate}.\n\nPara confirmar, escribe la palabra: BORRAR`);
         if (pwd !== 'BORRAR') { window.showToast("Operación cancelada", "❌"); return; }
         
         setFinanceLoading(true);
         const start = new Date(financeDate + "T00:00:00").toISOString();
         const end = new Date(financeDate + "T23:59:59.999").toISOString();

         const { error } = await supabaseClient.from('orders').delete().gte('created_at', start).lte('created_at', end);
         
         if (error) {
            window.showToast("Error al borrar", "❌");
         } else {
            window.showToast("Contabilidad del día reseteada", "🗑️");
            loadFinanceData(financeDate);
            fetchData(); // Recarga la pestaña de pedidos principal
         }
         setFinanceLoading(false);
      };
      // ---------------------------
      const [invoiceOrder, setInvoiceOrder] = useState(null);
      const [isStoreOpen, setIsStoreOpen] = useState(true);

      const [editMode, setEditMode] = useState(false);
      const [itemToEdit, setItemToEdit] = useState(null); 
      const [editForm, setEditForm] = useState({ name: '', description: '', price: 0, cost: 0, ingredients: [], isPromo: false, showUpsell: true, img: '', menuSection: 'clasica', flavors: '' });
      
      const [showAddModal, setShowAddModal] = useState(false);
      const [addForm, setAddForm] = useState({ type: 'burger', group: 'buns', name: '', price: '', cost: '', description: '', img: '', ingredients: [], isPromo: false, showUpsell: true, menuSection: 'clasica', flavors: '' });

      const [imgFile, setImgFile] = useState(null);
      const [isUploading, setIsUploading] = useState(false);

      // ESTADO DE AJUSTES GENERALES Y LEALTAD
      const [settingsForm, setSettingsForm] = useState({ 
        whatsapp: localCatalog?.settings?.whatsapp || "584126835635",
        telegramToken: localCatalog?.settings?.telegramToken || "8566482559:AAEKenkBkriNlZAjlyIGBWWzGDTB3sFzyCA",
        telegramChatId: localCatalog?.settings?.telegramChatId || "1145054461",
        banco: localCatalog?.settings?.banco || "PROVINCIAL (0108)",
        telefonoPago: localCatalog?.settings?.telefonoPago || "0412 683 5635",
        cedulaPago: localCatalog?.settings?.cedulaPago || "V-30158858",
        zelleEmail: localCatalog?.settings?.zelleEmail || "tu_correo@zelle.com",
        binanceId: localCatalog?.settings?.binanceId || "123456789",
        binanceEmail: localCatalog?.settings?.binanceEmail || "tu_correo@binance.com",
        drinkFlavors: localCatalog?.settings?.drinkFlavors || "Regular / Original, Zero / Sin Azúcar, Limón, Naranja, Uva, Chinotto / Sprite, Otro (Especificar en nota)",
        loyaltyRate: localCatalog?.settings?.loyalty?.rate || 10,
        loyaltyRoulette: (localCatalog?.settings?.loyalty?.roulette || [10, 20, 50, 100, 200, 500]).join(', '),
        // Nuevas variables VIP
        horarioActivo: localCatalog?.settings_v2?.horario?.activo || false,
        apertura: localCatalog?.settings_v2?.horario?.apertura || "17:00",
        cierre: localCatalog?.settings_v2?.horario?.cierre || "23:00",
        crossSellMeta: localCatalog?.settings_v2?.cross_sell?.meta || 15,
        deliveryEta: localCatalog?.settings_v2?.deliveryEta || "35 - 45 min",
        cupones: localCatalog?.settings_v2?.cupones || "FLASH20:2"
      });

      const [deliveryZonesConfig, setDeliveryZonesConfig] = useState(localCatalog?.settings?.deliveryZones || [
        { id: 'retiro', name: 'Retiro por el local', cost: 0.00 },
        { id: 'centro', name: 'Delivery: Pueblo Llano Centro', cost: 0.00 },
        { id: 'afueras', name: 'Delivery: Zonas alejadas', cost: 1.50 }
      ]);

      const [loyaltyCatalog, setLoyaltyCatalog] = useState(localCatalog?.settings?.loyalty?.catalog || [
        { id: "r-papas", name: "🍟 Papas Fritas Extra", cost: 200, type: "side", price: 0 },
        { id: "r-bebida", name: "🥤 Bebida Gratis", cost: 300, type: "drink", price: 0 },
        { id: "r-burger", name: "🍔 Burger Clásica", cost: 850, type: "burger", price: 0 }
      ]);

      useEffect(() => { fetchData(); }, []);

      const fetchData = async () => {
        setLoading(true);
        const [ordersRes, invRes, storeRes] = await Promise.all([
          supabaseClient.from('orders').select('*').order('created_at', { ascending: false }),
          supabaseClient.from('disabled_ingredients').select('id'),
          supabaseClient.from('store_settings').select('is_open').eq('id', 'divinee').single()
        ]);
        if (ordersRes.data) setOrders(ordersRes.data);
        if (invRes.data) setDisabledItems(invRes.data.map(i => i.id));
        if (storeRes.data) setIsStoreOpen(storeRes.data.is_open);
        setLoading(false);
      };

      const toggleStore = async () => {
        const newVal = !isStoreOpen;
        setIsStoreOpen(newVal);
        await supabaseClient.from('store_settings').update({ is_open: newVal }).eq('id', 'divinee');
      };

      const updateStatus = async (id, newStatus) => {
        const order = orders.find(o => o.id === id);
        
        // Otorgar Tokens SOLO si se marca como Entregado y no se han dado antes
        if (newStatus === 'Entregado' && order && !order.tokens_otorgados) {
           const dinamicRate = localCatalog?.settings?.loyalty?.rate || 10;
           const earnedTokens = Math.floor(order.total_usd * dinamicRate);
           const cleanPhone = order.phone.replace(/\D/g, '');
           
           if (cleanPhone.length >= 10) {
              const { data: existingClient } = await supabaseClient.from('clientes').select('tokens').eq('telefono', cleanPhone).single();
              if (existingClient) {
                 await supabaseClient.from('clientes').update({ tokens: existingClient.tokens + earnedTokens }).eq('telefono', cleanPhone);
              } else {
                 await supabaseClient.from('clientes').insert([{ telefono: cleanPhone, nombre: order.customer_name, tokens: earnedTokens }]);
              }
              await supabaseClient.from('orders').update({ tokens_otorgados: true }).eq('id', id);
              window.showToast(`+${earnedTokens} Tokens enviados al cliente`, "✅");
           }
        }

        const { error } = await supabaseClient.from('orders').update({ status: newStatus }).eq('id', id);
        if (!error) {
           setOrders(orders.map(o => o.id === id ? { ...o, status: newStatus, tokens_otorgados: newStatus === 'Entregado' ? true : o.tokens_otorgados } : o));
        }
      };

      const toggleIngredient = async (id, isCurrentlyDisabled) => {
        if (isCurrentlyDisabled) {
          await supabaseClient.from('disabled_ingredients').delete().eq('id', id);
          setDisabledItems(prev => prev.filter(i => i !== id));
        } else {
          await supabaseClient.from('disabled_ingredients').insert([{ id }]);
          setDisabledItems(prev => [...prev, id]);
        }
      };

      const addDeliveryZone = () => {
        const id = 'zone_' + Math.random().toString(36).substr(2, 9);
        setDeliveryZonesConfig([...deliveryZonesConfig, { id, name: 'Nueva Zona', cost: 0 }]);
      };
      
      const updateDeliveryZone = (id, field, value) => {
        setDeliveryZonesConfig(deliveryZonesConfig.map(z => z.id === id ? { ...z, [field]: value } : z));
      };

      const removeDeliveryZone = (id) => {
        setDeliveryZonesConfig(deliveryZonesConfig.filter(z => z.id !== id));
      };

      // GUARDAR LOS AJUSTES (Incluyendo Lealtad VIP y Nuevos Ajustes V2)
      const saveSettingsForm = () => {
        const newCatalog = { 
          ...localCatalog, 
          settings: { 
            ...settingsForm,
            deliveryZones: deliveryZonesConfig.map(z => ({...z, cost: Number(z.cost)})),
            loyalty: {
              rate: Number(settingsForm.loyaltyRate || 10),
              roulette: String(settingsForm.loyaltyRoulette || "10, 20, 50, 100, 200").split(',').map(v => Number(v.trim())).filter(v => !isNaN(v)),
              catalog: loyaltyCatalog.map(item => ({...item, cost: Number(item.cost)}))
            }
          },
          settings_v2: {
            horario: {
              activo: settingsForm.horarioActivo,
              apertura: settingsForm.apertura,
              cierre: settingsForm.cierre
            },
            cross_sell: {
              activo: true,
              meta: Number(settingsForm.crossSellMeta)
            },
            deliveryEta: settingsForm.deliveryEta,
            cupones: settingsForm.cupones
          }
        };
        onSaveInventory(localBurgers, localDesserts, localDrinks, newCatalog);
      }; // <--- ESTA ES LA LLAVE QUE SALVA LA PÁGINA

      const addLoyaltyItem = () => {
        const id = 'reward_' + Math.random().toString(36).substr(2, 9);
        setLoyaltyCatalog([...loyaltyCatalog, { id, name: 'Nuevo Premio', cost: 100, price: 0 }]);
      };
      
      const updateLoyaltyItem = (id, field, value) => {
        setLoyaltyCatalog(loyaltyCatalog.map(z => z.id === id ? { ...z, [field]: value } : z));
      };
      
      const removeLoyaltyItem = (id) => {
        setLoyaltyCatalog(loyaltyCatalog.filter(z => z.id !== id));
      };

      const openEditModal = (item, type, catIdx = null, groupName = null) => {
        setItemToEdit({ id: item.id, type, catIdx, groupName });
        setEditForm({ name: item.name, description: item.description || '', price: item.price, cost: item.cost || 0, ingredients: item.ingredientIds || [], isPromo: item.isPromo || false, showUpsell: item.showUpsell !== false, img: item.img || '', menuSection: item.menuSection || 'clasica', flavors: item.flavors || '' });
        setImgFile(null);
      };

      const buildIngredientNames = (idsArray) => {
        const uniqueIds = [...new Set(idsArray)];
        return uniqueIds.map(id => {
          const qty = idsArray.filter(x => x === id).length;
          let matchName = id;
          for (let arr of Object.values(localCatalog)) {
            if (Array.isArray(arr)) { let m = arr.find(x => x.id === id); if(m) matchName = m.name; }
          }
          return qty > 1 ? `${qty}x ${matchName}` : matchName;
        });
      };

      const uploadImage = async (file) => {
        const fileExt = file.name.split('.').pop();
        const fileName = `${Math.random().toString(36).substring(2, 15)}.${fileExt}`;
        const filePath = `productos/${fileName}`;

        const { data, error } = await supabaseClient.storage.from('imagenes').upload(filePath, file);
        if (error) throw error;

        const { data: publicUrlData } = supabaseClient.storage.from('imagenes').getPublicUrl(filePath);
        return publicUrlData.publicUrl;
      };

      const saveEditForm = async () => {
        setIsUploading(true);
        let finalImgUrl = editForm.img;

        if (imgFile) {
          try {
             finalImgUrl = await uploadImage(imgFile);
          } catch (e) {
             alert("Error al subir imagen. Verifica los permisos públicos en Supabase.");
             setIsUploading(false);
             return;
          }
        }

        let newBurgers = [...localBurgers];
        let newDesserts = [...localDesserts];
        let newDrinks = [...localDrinks];
        let newCatalog = { ...localCatalog };

        if (itemToEdit.type === 'burger') {
          const nombresIngredientes = buildIngredientNames(editForm.ingredients);
