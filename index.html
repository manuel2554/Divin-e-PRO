    function makeNoiseTexture(THREE, { size = 256, contrast = 0.6 } = {}) {
      const c = document.createElement("canvas"); c.width = c.height = size;
      const ctx = c.getContext("2d", { willReadFrequently: true });
      const img = ctx.createImageData(size, size);
      for (let i = 0; i < img.data.length; i += 4) { const v = Math.floor(120 + (Math.random() - 0.5) * 255 * contrast); img.data[i] = v; img.data[i+1] = v; img.data[i+2] = v; img.data[i+3] = 255; }
      ctx.putImageData(img, 0, 0);
      const tex = new THREE.CanvasTexture(c); tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(3,3); tex.needsUpdate = true;
      return tex;
    }
    function fitCameraToObject(THREE, camera, object, offset = 1.4) {
      const box = new THREE.Box3().setFromObject(object); if (box.isEmpty()) return;
      const size = new THREE.Vector3(); const center = new THREE.Vector3();
      box.getSize(size); box.getCenter(center);
      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * (Math.PI / 180);
      const cameraZ = Math.abs((maxDim / 2) / Math.tan(fov / 2)) * offset;
      camera.position.set(center.x, center.y + maxDim * 0.2, center.z + cameraZ);
      camera.lookAt(center); camera.updateProjectionMatrix();
    }

    function ProductCard({ product, badge, onClick, onAdd, isDisabled, isPromo }) {
      const cardRef = useRef(null);
      const handleMouseMove = e => {
        if (!cardRef.current) return;
        const rect = cardRef.current.getBoundingClientRect();
        cardRef.current.style.setProperty('--card-mx', `${((e.clientX - rect.left) / rect.width) * 100}%`);
        cardRef.current.style.setProperty('--card-my', `${((e.clientY - rect.top) / rect.height) * 100}%`);
      };

      return (
        <motion.div ref={cardRef} onMouseMove={handleMouseMove} initial={{ opacity: 0, y: 30 }} whileInView={{ opacity: 1, y: 0 }} viewport={{ once: true, amount: 0.2 }} transition={{ duration: 0.5 }} whileHover={!isDisabled ? { y: -8 } : {}} className={`card-luxury ${isPromo ? 'card-promo' : ''} ${isDisabled ? 'opacity-60 grayscale' : ''}`}>

            <div className="relative aspect-[4/3] overflow-hidden img-overlay">
              <img src={product.img} alt={product.name} className="card-img h-full w-full object-cover" loading="lazy" />

              {/* Badges */}
              <div className="absolute top-3 left-3 z-10 flex gap-2">
                {isPromo && <span className="px-3 py-1 rounded-full bg-gold text-bg text-[9px] font-bold tracking-widest shadow-lg">⭐ PROMO</span>}

              </div>
              <div className="absolute top-3 right-3 z-10">
                <span className="px-3 py-1.5 rounded-full glass-gold text-gold text-xs font-bold tracking-wider">{money(product.price)}</span>
              </div>

              {isDisabled && (
                <div className="absolute inset-0 z-20 bg-bg/60 backdrop-blur-[3px] flex items-center justify-center">

            </div>

            {/* Content */}
            <div className="relative z-10 p-5">
              <h3 className="text-base lg:text-lg font-display font-semibold text-cream">{product.name}</h3>
              <p className="mt-1.5 text-sm text-cream/50 line-clamp-2 font-light leading-relaxed">{product.description}</p>

          const bunN = makeNoiseTexture(THREE, { contrast: 0.45 }); const meatN = makeNoiseTexture(THREE, { contrast: 0.65 });
          const matCache = {
            bun: new THREE.MeshPhysicalMaterial({ color: 0xc9a84c, roughness: 0.55, bumpMap: bunN, bumpScale: 0.08 }),
            meat: new THREE.MeshStandardMaterial({ color: 0x341b12, roughness: 0.92, bumpMap: meatN, bumpScale: 0.14 }),
            cheese: new THREE.MeshPhysicalMaterial({ color: 0xf2c24f, roughness: 0.38, clearcoat: 0.25 }),
            green: new THREE.MeshStandardMaterial({ color: 0x3f8f5a, roughness: 0.85 }),
            red: new THREE.MeshStandardMaterial({ color: 0xb33b2e, roughness: 0.68 }),
            generic: new THREE.MeshStandardMaterial({ color: 0x8a6a4c, roughness: 0.9 })
          };
          stateRef.current = { THREE, scene, camera, renderer, root, stack, animatables: [], matCache };
          const animate = () => {
            reqRef.current = requestAnimationFrame(animate);
            if (stateRef.current.root) {
              if (autoRotateRef.current && !draggingRef.current) yawRef.current += 0.003;
              stateRef.current.root.rotation.set(pitchRef.current, yawRef.current, 0); // FIX: Position/Rotation set
            }
            const time = performance.now() * 0.001;
            stateRef.current.animatables.forEach(a => {
              if (time > a.startTime) {
                const d = a.targetY - a.mesh.position.y;
                a.velocity += d * 0.25; a.velocity *= 0.65;
                a.mesh.position.setY(a.mesh.position.y + a.velocity); // FIX: Position setY
              }
            });
            renderer.render(scene, camera);
          };
          animate();
          return () => { window.removeEventListener("resize", onResize); el.removeEventListener("pointerdown", onDown); el.removeEventListener("pointermove", onMove); window.removeEventListener("pointerup", onUp); cancelAnimationFrame(reqRef.current); renderer.dispose(); if (mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement); stateRef.current = { animatables: [] }; };
        } catch (e) { setErr(e?.message || String(e)); }
      }, []);

      useEffect(() => {
        const st = stateRef.current; if (!st.THREE || !st.stack) return;
        const { THREE, stack, camera, matCache } = st;
        while (stack.children.length) stack.remove(stack.children[0]);
        st.animatables = [];
        const fallback = [{type:'bunBottom'},{type:'meat'},{type:'cheese'},{type:'lettuce'},{type:'tomato'},{type:'bunTop'}];
        const config = burgerConfig || fallback;
        buildProcedural(config);
        function buildProcedural(cfg) {
          let curY = -0.5; const anims = []; const now = performance.now() * 0.001;
          cfg.forEach((item, idx) => {
            let mesh, thick;
            if (item.type === 'bunBottom') { mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.92,1.02,0.26,64), matCache.bun); thick = 0.26; }
            else if (item.type === 'meat') { mesh = new THREE.Mesh(new THREE.CylinderGeometry(1.04,1.04,0.28,64), matCache.meat); thick = 0.28; }
            else if (item.type === 'cheese') { mesh = new THREE.Mesh(new THREE.CylinderGeometry(1.07,1.07,0.08,64), matCache.cheese); thick = 0.08; }
            else if (item.type === 'lettuce') { mesh = new THREE.Mesh(new THREE.TorusGeometry(0.78,0.12,14,90), matCache.green); mesh.rotation.x = Math.PI/2; thick = 0.15; }
            else if (item.type === 'tomato') { mesh = new THREE.Group(); for (let i=0;i<3;i++) { const t = new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.28,0.06,48), matCache.red); t.position.set(Math.cos(i*2.2)*0.45,0,Math.sin(i*2.2)*0.45); mesh.add(t); } thick = 0.06; }
            else if (item.type === 'bunTop') { mesh = new THREE.Mesh(new THREE.SphereGeometry(0.95,64,48,0,Math.PI*2,0,Math.PI/1.9), matCache.bun); mesh.scale.set(1,0.62,1); thick = 0.4; }
            else { mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.85,0.85,0.05,32), matCache.generic); thick = 0.05; }
            if (mesh) { mesh.traverse(m => { if(m.isMesh){m.castShadow=true;m.receiveShadow=true;} }); stack.add(mesh); const tY = curY+thick/2; anims.push({mesh,targetY:tY,startTime:now+idx*0.15,velocity:0}); curY += thick; }
          });
          fitCameraToObject(THREE, camera, stack, 1.4);
          anims.forEach(a => { a.mesh.position.setY(a.targetY + 6); }); // FIX: setY
          st.animatables = anims;
        }
      }, [modelUrl, burgerConfig]);

      if (err) return <div className={`${heightClass} w-full rounded-2xl border border-line glass p-4`}><p className="text-xs text-gold">3D no disponible: {err}</p></div>;

      return (
        <div className="relative w-full">
          {showUI && (
            <>

    }

    // ═══════════════════════════════════════════
    // BURGER BUILDER (ATELIER)
    // ═══════════════════════════════════════════
    function BurgerBuilder({ onAddToCart, catalog }) {
      const [step, setStep] = useState(0);
      const [bunIdx, setBunIdx] = useState(0);
      const [proteinLayers, setProteinLayers] = useState([0]);
      const [activeProteinLayer, setActiveProteinLayer] = useState(0);
      const [cheeseLayers, setCheeseLayers] = useState([5]);
      const [activeCheeseLayer, setActiveCheeseLayer] = useState(0);
      const [toppings, setToppings] = useState({});
      const [disabledItems, setDisabledItems] = useState([]);
      const MAX_PROTEIN = 4, MAX_CHEESE = 4, BASE = 0;

      useEffect(() => {
        (async () => {
          if (!supabaseClient) return;
          const { data } = await supabaseClient.from('disabled_ingredients').select('id');
          if (data) setDisabledItems(data.map(i => i.id));
        })();
      }, []);

      const bun = catalog.buns[bunIdx];
      const cheesesCount = cheeseLayers.filter(idx => catalog.cheeses[idx]?.id !== "none").length;
      const toppingsCount = Object.values(toppings).reduce((a, b) => a + b, 0);

      const [price, totalCost] = useMemo(() => {
        const bP = bun?.price ?? 0, bC = bun?.cost ?? 0;
        const pP = proteinLayers.reduce((a, i) => a + (catalog.proteins[i]?.price ?? 0), 0);
        const pC = proteinLayers.reduce((a, i) => a + (catalog.proteins[i]?.cost ?? 0), 0);
        const cP = cheeseLayers.reduce((a, i) => a + (catalog.cheeses[i]?.price ?? 0), 0);
        const cC = cheeseLayers.reduce((a, i) => a + (catalog.cheeses[i]?.cost ?? 0), 0);
        const tP = Object.entries(toppings).reduce((a, [id, q]) => a + (catalog.toppings.find(t => t.id === id)?.price ?? 0) * q, 0);
        const tC = Object.entries(toppings).reduce((a, [id, q]) => a + (catalog.toppings.find(t => t.id === id)?.cost ?? 0) * q, 0);
        return [BASE + bP + pP + cP + tP, bC + pC + cC + tC];
      }, [bunIdx, proteinLayers, cheeseLayers, toppings, catalog]);

      const dynamicConfig = useMemo(() => {
        const c = [{ type: 'bunBottom' }];
        proteinLayers.forEach(() => c.push({ type: 'meat' }));
        cheeseLayers.forEach(idx => { if (catalog.cheeses[idx]?.id !== 'none') c.push({ type: 'cheese' }); });
        Object.entries(toppings).forEach(([id, q]) => { for (let i = 0; i < q; i++) { if (id === 'lettuce' || id === 'arugula') c.push({ type: 'lettuce' }); else if (id === 'tomato') c.push({ type: 'tomato' }); else c.push({ type: 'generic' }); } });
        c.push({ type: 'bunTop' }); return c;
      }, [proteinLayers, cheeseLayers, toppings, catalog]);

      const isBunOff = disabledItems.includes(bun?.id);
      const hasErrProtein = proteinLayers.some(i => disabledItems.includes(catalog.proteins[i]?.id));
      const hasErrCheese = cheeseLayers.some(i => disabledItems.includes(catalog.cheeses[i]?.id));
      const hasErrTopping = Object.keys(toppings).some(id => disabledItems.includes(id));
      const hasAnyError = isBunOff || hasErrProtein || hasErrCheese || hasErrTopping;
      const valid = proteinLayers.length >= 1 && !hasAnyError;

      const steps = [
        { key: "PAN", icon: "🍞", label: "Pan" },
        { key: "CARNES", icon: "🥩", label: "Carnes" },
        { key: "QUESOS", icon: "🧀", label: "Quesos" },
        { key: "TOPPINGS", icon: "🥬", label: "Extras" },
      ];

      const incTop = id => setToppings(p => ({ ...p, [id]: (p[id] || 0) + 1 }));
      const decTop = id => setToppings(p => { const n = { ...p }; if (n[id] > 1) n[id]--; else delete n[id]; return n; });
      const bunPrev = () => setBunIdx(i => wrapIndex(i - 1, catalog.buns.length));
      const bunNext = () => setBunIdx(i => wrapIndex(i + 1, catalog.buns.length));
      const protPrev = () => setProteinLayers(l => { const c = [...l]; c[activeProteinLayer] = wrapIndex(c[activeProteinLayer] - 1, catalog.proteins.length); return c; });
      const protNext = () => setProteinLayers(l => { const c = [...l]; c[activeProteinLayer] = wrapIndex(c[activeProteinLayer] + 1, catalog.proteins.length); return c; });
      const addProtein = () => { setProteinLayers(l => l.length >= MAX_PROTEIN ? l : [...l, l[l.length - 1] ?? 0]); setActiveProteinLayer(i => Math.min(i + 1, MAX_PROTEIN - 1)); };
      const rmProtein = i => { setProteinLayers(l => l.filter((_, idx) => idx !== i)); setActiveProteinLayer(c => c > 0 ? c - 1 : 0); };
      const cheesePrev = () => setCheeseLayers(l => { const c = [...l]; c[activeCheeseLayer] = wrapIndex(c[activeCheeseLayer] - 1, catalog.cheeses.length); return c; });
      const cheeseNext = () => setCheeseLayers(l => { const c = [...l]; c[activeCheeseLayer] = wrapIndex(c[activeCheeseLayer] + 1, catalog.cheeses.length); return c; });
      const addCheese = () => { setCheeseLayers(l => l.length >= MAX_CHEESE ? l : [...l, l[l.length - 1] ?? 0]); setActiveCheeseLayer(i => Math.min(i + 1, MAX_CHEESE - 1)); };
      const rmCheese = i => { setCheeseLayers(l => l.filter((_, idx) => idx !== i)); setActiveCheeseLayer(c => c > 0 ? c - 1 : 0); };

      function buildAndAdd() {
        if (!valid) return;
        const b = catalog.buns[bunIdx];
        const ps = proteinLayers.map(i => catalog.proteins[i]).filter(Boolean);
        const cs = cheeseLayers.map(i => catalog.cheeses[i]).filter(Boolean);
        let ts = []; Object.entries(toppings).forEach(([id, q]) => { const t = catalog.toppings.find(x => x.id === id); if (t) for (let i = 0; i < q; i++) ts.push(t); });
        const id = ["custom", b?.id, ps.map(p => p.id).join("+"), cs.map(c => c.id).join("+"), ts.map(t => t.id).sort().join(",")].join(":");
        const meta = { pan: b?.name, carnes: ps.map(p => p.name), quesos: cs.map(c => c.name), toppings: ts.map(t => t.name) };
        onAddToCart?.({ id, name: "Hamburguesa Divinée (Atelier)", price, cost: totalCost, meta }, true);
        setStep(0); setBunIdx(0); setProteinLayers([0]); setActiveProteinLayer(0); setCheeseLayers([5]); setActiveCheeseLayer(0); setToppings({});
      }

      return (
        <div className="rounded-[28px] border border-lineGold glass-gold shadow-glowStrong p-5 lg:p-8">
          <div className="flex flex-wrap items-start justify-between gap-4 mb-6">
            <div>
              <div className="flex items-center gap-2 mb-2"><span className="text-gold">{Icons.sparkles}</span><span className="text-[9px] tracking-[0.4em] text-gold font-semibold">ATELIER DIVINÉE</span></div>
              <h3 className="text-2xl lg:text-3xl font-display font-bold text-gradient-cream">Arma tu Hamburguesa</h3>
              <p className="mt-1 text-sm text-cream/50 font-light">Selecciona cada ingrediente y mira cómo cobra vida en 3D.</p>
            </div>
            <div className="glass-gold rounded-2xl px-5 py-3 shadow-glow text-center">
              <p className="text-[9px] tracking-[0.3em] text-gold/60 font-semibold">TOTAL</p>
              <p className="text-2xl font-display font-bold text-gradient-gold">{money(price)}</p>
            </div>
          </div>

          <div className="rounded-2xl border border-line overflow-hidden bg-bg mb-6">
            <div className="flex items-center justify-between px-4 py-2 border-b border-line glass">
              <p className="text-[9px] tracking-[0.3em] text-gold/70 font-semibold">VISTA PREVIA 3D</p>
              <p className="text-[9px] tracking-[0.2em] text-cream/40">{proteinLayers.length} carne(s) · {cheesesCount} queso(s) · {toppingsCount} extra(s)</p>
            </div>
            <BurgerViewer3D heightClass="h-[220px] lg:h-[300px]" burgerConfig={dynamicConfig} showUI={false} />
          </div>

          {hasAnyError && <div className="mb-5 p-4 rounded-xl border border-red-500/40 bg-red-500/10 text-red-400 text-sm font-semibold text-center">⚠️ Tienes ingredientes AGOTADOS. Cámbialos para continuar.</div>}

          <div className="grid grid-cols-4 gap-2 mb-6">
            {steps.map((s, i) => (
              <button key={s.key} onClick={() => setStep(i)} className={`relative rounded-2xl py-3 px-2 text-center transition-all duration-300 ${step === i ? 'glass-gold shadow-glow border border-gold/40' : 'glass border border-line hover:border-lineGold'}`}>
                <div className="text-lg mb-1">{s.icon}</div>
                <div className={`text-[9px] tracking-[0.2em] font-semibold ${step === i ? 'text-gold' : 'text-cream/50'}`}>{s.key}</div>
                {step === i && <div className="absolute bottom-0 left-1/2 -translate-x-1/2 w-8 h-[2px] bg-gold rounded-full" />}
              </button>
            ))}
          </div>

          <motion.div key={step} initial={{ opacity: 0, y: 12 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.25 }}>
            {step === 0 && <CarouselPicker title="Pan" options={catalog.buns} index={bunIdx} onPrev={bunPrev} onNext={bunNext} disabledItems={disabledItems} />}
            {step === 1 && (
              <div className="space-y-4">
                <LayersHeader title="Carnes" count={proteinLayers.length} onAdd={addProtein} addLabel="Otra carne" disabled={proteinLayers.length >= MAX_PROTEIN} />
                <LayersTabs label="CARNE" layers={proteinLayers} active={activeProteinLayer} setActive={setActiveProteinLayer} onRemove={rmProtein} min={1} />
                <CarouselPicker title={`Carne ${activeProteinLayer + 1}`} options={catalog.proteins} index={proteinLayers[activeProteinLayer] ?? 0} onPrev={protPrev} onNext={protNext} disabledItems={disabledItems} />
              </div>
            )}
            {step === 2 && (
              <div className="space-y-4">
                <LayersHeader title="Quesos" count={cheeseLayers.length} onAdd={addCheese} addLabel="Otro queso" disabled={cheeseLayers.length >= MAX_CHEESE} />
                <LayersTabs label="QUESO" layers={cheeseLayers} active={activeCheeseLayer} setActive={setActiveCheeseLayer} onRemove={rmCheese} min={1} />
                <CarouselPicker title={`Queso ${activeCheeseLayer + 1}`} options={catalog.cheeses} index={cheeseLayers[activeCheeseLayer] ?? 0} onPrev={cheesePrev} onNext={cheeseNext} disabledItems={disabledItems} />
              </div>
            )}
            {step === 3 && (
              <div className="glass rounded-2xl p-4">
                <div className="flex items-start justify-between gap-3 mb-4">
                  <div>
                    <p className="text-[9px] tracking-[0.35em] text-gold/80 font-semibold">TOPPINGS & SALSAS</p>
                    <p className="text-xs text-cream/50 mt-1 font-light">Añade todos los que quieras. ¡Incluso dobles!</p>
                  </div>
                  <span className="px-3 py-1 rounded-full glass-gold text-[10px] text-gold font-bold">{toppingsCount} items</span>
                </div>
                <div className="grid gap-2 sm:grid-cols-2">
                  {catalog.toppings.map(t => {
                    const qty = toppings[t.id] || 0;
                    const active = qty > 0;
                    const isOff = disabledItems.includes(t.id);
                    return (
                      <div key={t.id} className={`rounded-xl border px-4 py-3 transition-all duration-200 ${isOff ? 'border-red-500/20 bg-red-500/5 opacity-50' : active ? 'border-gold/40 glass-gold shadow-glow' : 'border-line glass hover:border-lineGold'}`}>
                        <div className="flex items-center justify-between gap-3">
                          <div className="flex-1 min-w-0">
                            <p className={`text-sm font-medium ${isOff ? 'text-red-400 line-through' : 'text-cream/85'}`}>{t.name}</p>
                            <p className="text-[9px] tracking-widest text-cream/35 mt-0.5">{isOff ? '🔴 AGOTADO' : t.group.toUpperCase()}</p>
                          </div>
                          {isOff ? <span className="text-sm text-cream/20">{money(t.price)}</span> : !active ? (
                            <div className="flex items-center gap-2">
                              <span className="text-sm font-bold text-gold">{money(t.price)}</span>
                              <button onClick={() => incTop(t.id)} className="w-8 h-8 rounded-full bg-gold/15 border border-gold/30 text-gold flex items-center justify-center hover:bg-gold hover:text-bg transition-all">{Icons.plus}</button>
                            </div>
                          ) : (
                            <div className="flex items-center gap-1 bg-bg/60 rounded-full border border-line px-1 py-1">
                              <button onClick={() => decTop(t.id)} className="w-7 h-7 rounded-full flex items-center justify-center text-cream/60 hover:bg-panel transition">{Icons.minus}</button>
                              <span className="w-6 text-center text-sm font-bold text-gold">{qty}</span>
                              <button onClick={() => incTop(t.id)} className="w-7 h-7 rounded-full bg-gold text-bg flex items-center justify-center font-bold hover:brightness-110 transition">{Icons.plus}</button>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </motion.div>

          <div className="mt-6 glass rounded-2xl p-5">
            <p className="text-[9px] tracking-[0.3em] text-gold/60 font-semibold mb-3">DESGLOSE</p>
            <div className="space-y-1.5 text-sm">
              <div className="flex justify-between text-cream/50"><span>Salsas Divinée</span><span>{money(BASE)}</span></div>
              <div className={`flex justify-between ${isBunOff ? 'text-red-400 line-through' : 'text-cream/60'}`}><span>{bun?.name}</span><span>{money(bun?.price ?? 0)}</span></div>
              {proteinLayers.map((idx, i) => { const p = catalog.proteins[idx]; return p ? <div key={`p${i}`} className={`flex justify-between ${disabledItems.includes(p.id) ? 'text-red-400 line-through' : 'text-cream/60'}`}><span>{p.name}</span><span>{money(p.price)}</span></div> : null; })}
              {cheeseLayers.map((idx, i) => { const c = catalog.cheeses[idx]; return (c && c.id !== 'none') ? <div key={`c${i}`} className={`flex justify-between ${disabledItems.includes(c.id) ? 'text-red-400 line-through' : 'text-cream/60'}`}><span>{c.name}</span><span>{money(c.price)}</span></div> : null; })}
              {Object.entries(toppings).map(([id, q]) => { const t = catalog.toppings.find(x => x.id === id); return t ? <div key={id} className={`flex justify-between ${disabledItems.includes(id) ? 'text-red-400 line-through' : 'text-cream/60'}`}><span>{q}x {t.name}</span><span>{money(t.price * q)}</span></div> : null; })}
            </div>
            <hr className="divider-gold my-3" />
            <div className="flex justify-between items-center">
              <span className="font-display font-bold text-cream">TOTAL</span>
              <span className="text-xl font-display font-bold text-gradient-gold">{money(price)}</span>
            </div>
          </div>

          <div className="mt-6 flex flex-wrap items-center gap-3">
            <button onClick={() => setStep(s => Math.max(0, s - 1))} className="btn-ghost !text-[10px]">← ATRÁS</button>
            <button onClick={() => setStep(s => Math.min(3, s + 1))} className="btn-ghost !text-[10px]">SIGUIENTE →</button>
            <button onClick={buildAndAdd} disabled={!valid} className="ml-auto btn-primary !text-[10px]" style={{ opacity: valid ? 1 : 0.4 }}>
              {Icons.sparkles} ARMAR BURGER · {money(price)}
            </button>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════
    // ADMIN DASHBOARD — COMPLETO Y BLINDADO
    // ═══════════════════════════════════════
    function AdminDashboard({ onClose, supabaseClient, localBurgers, localDesserts, localDrinks, localCatalog, onSaveInventory, onAddProduct }) {
      const [orders, setOrders] = useState([]);
      const [disabledItems, setDisabledItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [tab, setTab] = useState('orders');
      const [searchCode, setSearchCode] = useState('');
      const [invoiceOrder, setInvoiceOrder] = useState(null);
      const [isStoreOpen, setIsStoreOpen] = useState(true);
      const [editMode, setEditMode] = useState(false);
      const [itemToEdit, setItemToEdit] = useState(null);
      const [editForm, setEditForm] = useState({ name:'', description:'', price:0, cost:0, ingredients:[], isPromo:false, showUpsell:true });
      const [showAddModal, setShowAddModal] = useState(false);
      const [addForm, setAddForm] = useState({ type:'burger', group:'buns', name:'', price:'', cost:'', description:'', img:'', ingredients:[], isPromo:false, showUpsell:true });
      const [settingsForm, setSettingsForm] = useState({
        empaque: localCatalog?.settings?.empaque || 0.60,
        whatsapp: localCatalog?.settings?.whatsapp || "",
        telegramToken: localCatalog?.settings?.telegramToken || "",
        telegramChatId: localCatalog?.settings?.telegramChatId || "",
        banco: localCatalog?.settings?.banco || "",
        telefonoPago: localCatalog?.settings?.telefonoPago || "",
        cedulaPago: localCatalog?.settings?.cedulaPago || "",
        zelleEmail: localCatalog?.settings?.zelleEmail || "",
        binanceId: localCatalog?.settings?.binanceId || "",
        binanceEmail: localCatalog?.settings?.binanceEmail || "",
      });
      const [dzConfig, setDzConfig] = useState(localCatalog?.settings?.deliveryZones || [{ id:'retiro', name:'Retiro por el local', cost:0 }]);

      useEffect(() => { fetchData(); }, []);
      const fetchData = async () => {
        setLoading(true);
        const [oR, iR, sR] = await Promise.all([
          supabaseClient.from('orders').select('*').order('created_at', { ascending: false }),
          supabaseClient.from('disabled_ingredients').select('id'),
          supabaseClient.from('store_settings').select('is_open').eq('id', 'divinee').single()
        ]);
        if (oR.data) setOrders(oR.data);
        if (iR.data) setDisabledItems(iR.data.map(i => i.id));
        if (sR.data) setIsStoreOpen(sR.data.is_open);
        setLoading(false);
      };

      const toggleStore = async () => { const v = !isStoreOpen; setIsStoreOpen(v); await supabaseClient.from('store_settings').update({ is_open: v }).eq('id', 'divinee'); };
      const updateStatus = async (id, s) => { await supabaseClient.from('orders').update({ status: s }).eq('id', id); setOrders(orders.map(o => o.id === id ? { ...o, status: s } : o)); };
      const toggleIngredient = async (id, isOff) => { if (isOff) { await supabaseClient.from('disabled_ingredients').delete().eq('id', id); setDisabledItems(p => p.filter(i => i !== id)); } else { await supabaseClient.from('disabled_ingredients').insert([{ id }]); setDisabledItems(p => [...p, id]); } };
      
      const addDz = () => setDzConfig([...dzConfig, { id: 'z_' + Math.random().toString(36).substr(2,6), name: 'Nueva Zona', cost: 0 }]);
      const updateDz = (id, f, v) => setDzConfig(dzConfig.map(z => z.id === id ? { ...z, [f]: v } : z));
      const rmDz = id => setDzConfig(dzConfig.filter(z => z.id !== id));

      const saveSettings = () => {
        const nc = { ...localCatalog, settings: { ...settingsForm, empaque: Number(settingsForm.empaque), deliveryZones: dzConfig.map(z => ({...z, cost: Number(z.cost)})) } };
        onSaveInventory(localBurgers, localDesserts, localDrinks, nc);
      };

      const buildIngNames = ids => [...new Set(ids)].map(id => { const q = ids.filter(x => x===id).length; let n = id; for (let arr of Object.values(localCatalog)) { if (Array.isArray(arr)) { let m = arr.find(x => x.id === id); if(m) n = m.name; } } return q > 1 ? `${q}x ${n}` : n; });

      const openEdit = (item, type, idx, grp) => {
        setItemToEdit({ id: item.id, type, catIdx: idx, groupName: grp });
        setEditForm({ name: item.name, description: item.description||'', price: item.price, cost: item.cost||0, ingredients: item.ingredientIds||[], isPromo: item.isPromo||false, showUpsell: item.showUpsell !== false });
      };
      
      const saveEdit = () => {
        let nB=[...localBurgers], nDe=[...localDesserts], nDr=[...localDrinks], nC={...localCatalog};
        const ie = itemToEdit;
        if (ie.type==='burger') { nB[ie.catIdx] = { ...nB[ie.catIdx], name:editForm.name, description:editForm.description, price:Number(editForm.price), cost:Number(editForm.cost), ingredientIds:editForm.ingredients, ingredients:buildIngNames(editForm.ingredients), isPromo:editForm.isPromo, showUpsell:editForm.showUpsell }; }
        else if (ie.type==='dessert') { nDe[ie.catIdx] = { ...nDe[ie.catIdx], name:editForm.name, description:editForm.description, price:Number(editForm.price), cost:Number(editForm.cost), isPromo:editForm.isPromo }; }
        else if (ie.type==='drink') { nDr[ie.catIdx] = { ...nDr[ie.catIdx], name:editForm.name, description:editForm.description, price:Number(editForm.price), cost:Number(editForm.cost), isPromo:editForm.isPromo }; }
        else if (ie.type==='catalog') { nC[ie.groupName] = nC[ie.groupName].map(i => i.id===ie.id ? {...i, name:editForm.name, price:Number(editForm.price), cost:Number(editForm.cost)} : i); }
        onSaveInventory(nB, nDe, nDr, nC); setItemToEdit(null);
      };

      const deleteItem = () => {
        if (!confirm(`¿Eliminar "${editForm.name}"?`)) return;
        let nB=[...localBurgers], nDe=[...localDesserts], nDr=[...localDrinks], nC={...localCatalog};
        const ie = itemToEdit;
        if (ie.type==='burger') nB.splice(ie.catIdx, 1);
        else if (ie.type==='dessert') nDe.splice(ie.catIdx, 1);
        else if (ie.type==='drink') nDr.splice(ie.catIdx, 1);
        else if (ie.type==='catalog') nC[ie.groupName] = nC[ie.groupName].filter(i => i.id !== ie.id);
        onSaveInventory(nB, nDe, nDr, nC); setItemToEdit(null);
      };

      const submitAdd = () => {
        if (!addForm.name || !addForm.price || !addForm.cost) { alert("Completa nombre, precio y costo."); return; }
        let f = { ...addForm };
        if (addForm.type==='burger') { f.ingredientIds = addForm.ingredients; f.ingredients = buildIngNames(addForm.ingredients); }
        onAddProduct(f); setShowAddModal(false);
        setAddForm({ type:'burger', group:'buns', name:'', price:'', cost:'', description:'', img:'', ingredients:[], isPromo:false, showUpsell:true });
      };

      const autoCalc = (ids, isEdit) => {
        let c=0, p=0;
        ids.forEach(id => { Object.values(localCatalog).forEach(arr => { if (Array.isArray(arr)) { let m = arr.find(x => x.id===id); if (m) { c += m.cost||0; p += m.price||0; } } }); });
        if (isEdit) setEditForm(prev => ({...prev, cost: c.toFixed(2), price: p.toFixed(2)}));
        else setAddForm(prev => ({...prev, cost: c.toFixed(2), price: p.toFixed(2)}));
        window.showToast("Precios calculados", "✨");
      };

      const incFormIng = (id, isE) => { if (isE) setEditForm(p=>({...p, ingredients:[...p.ingredients,id]})); else setAddForm(p=>({...p, ingredients:[...p.ingredients,id]})); };
      const decFormIng = (id, isE) => {
        const fn = prev => { const i = prev.ingredients.indexOf(id); if(i>-1){ const n=[...prev.ingredients]; n.splice(i,1); return {...prev, ingredients:n}; } return prev; };
        if (isE) setEditForm(fn); else setAddForm(fn);
      };

      const formatWa = ph => { let c = ph.replace(/\D/g,''); if (c.startsWith('0')) c = '58'+c.substring(1); else if (!c.startsWith('58')) c = '58'+c; return c; };
      const calcProfit = items => items.reduce((a,it)=>a+(it.price-it.cost||0)*it.qty, 0);

      const today = new Date(); today.setHours(0,0,0,0);
      const todayOrders = orders.filter(o => new Date(o.created_at) >= today && o.status !== 'Cancelado');
      const todaySales = todayOrders.reduce((a,o) => a + o.total_usd, 0);
      const todayProfit = todayOrders.reduce((a,o) => a + calcProfit(o.items||[]), 0);
      const stColors = { 'Pendiente':'text-red-400 border-red-400/30', 'Preparando':'text-yellow-400 border-yellow-400/30', 'En camino':'text-blue-400 border-blue-400/30', 'Listo para retirar':'text-purple-400 border-purple-400/30', 'Entregado':'text-green-400 border-green-400/30', 'Cancelado':'text-gray-400 border-gray-400/30' };

      const handlePrintTicket = () => {
        const content = document.getElementById("invoice-print-area")?.innerHTML;
        if (!content) return;
        const w = window.open('','','width=600,height=800');
        w.document.write(`<html><head><title>Ticket ${invoiceOrder.tracking_code}</title><style>@page{margin:0}body{font-family:Helvetica,Arial,sans-serif;color:#000;background:#f4f4f4;margin:0;padding:20px;display:flex;justify-content:center}.tc{width:100%;max-width:340px;background:#fff;padding:30px 25px;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,.1);border-top:6px solid #000}.tc *{margin:0}.flex{display:flex;justify-content:space-between}.text-xs{font-size:12px;color:#555}.text-sm{font-size:14px}.font-bold{font-weight:800}.mb-3{margin-bottom:12px}.mb-6{margin-bottom:24px}.pb-6{padding-bottom:24px;border-bottom:2px dashed #ccc}.py-4{padding:16px 0;border-bottom:2px dashed #ccc}.pl-4{padding-left:16px}.mt-1{margin-top:4px}.mt-2{margin-top:8px}@media print{body{background:#fff;padding:0;display:block}.tc{box-shadow:none;border-radius:0;margin:0 auto;max-width:80mm;padding:10px;border-top:2px solid #000}}</style></head><body onload="setTimeout(function(){window.print();window.close()},400)"><div class="tc">${content}</div></body></html>`);
        w.document.close();
      };

      const renderIngSelector = (selArr, isE) => (
        <div className="h-48 overflow-y-auto bg-bg rounded-xl border border-line p-3 space-y-3 scroll-smooth-ios">
          {Object.entries(localCatalog).map(([cat, arr]) => {
            if (!Array.isArray(arr)) return null; // EL ESCUDO ESTÁ AQUÍ
            return (<div key={cat}><p className="text-[9px] text-gold mb-1 uppercase tracking-widest font-semibold">{cat==='buns'?'Pan':cat==='proteins'?'Proteína':cat==='cheeses'?'Queso':'Toppings'}</p>
              {arr.map(it => { if (it.id==='none') return null; const q = selArr.filter(x=>x===it.id).length; return (
                <div key={it.id} className={`flex items-center justify-between p-2 rounded-lg mb-1 transition ${q>0?'bg-gold/10 border border-gold/30':'hover:bg-panel border border-transparent'}`}>
                  <div className="flex-1 min-w-0"><p className="text-xs text-cream truncate">{it.name}</p><p className="text-[9px] text-gold/60">{money(it.price)}/{money(it.cost)}</p></div>
                  <div className="flex items-center gap-1 bg-bg rounded-full border border-line px-1 py-0.5">
                    <button onClick={()=>decFormIng(it.id,isE)} className="w-6 h-6 rounded-full flex items-center justify-center text-cream/50 hover:bg-panel text-xs">−</button>
                    <span className="w-4 text-center text-xs font-bold text-gold">{q}</span>
                    <button onClick={()=>incFormIng(it.id,isE)} className="w-6 h-6 rounded-full bg-gold text-bg flex items-center justify-center font-bold text-xs">+</button>
                  </div>
                </div>
              ); })}</div>);
          })}
        </div>
      );

      const invGrid = (list, type) => (
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">
          {list.map((item, idx) => { const isOff = disabledItems.includes(item.id); return (
            <button key={item.id} onClick={() => editMode ? openEdit(item, type, idx) : toggleIngredient(item.id, isOff)} className={`p-3 rounded-xl border text-left transition-all duration-200 ${isOff ? 'bg-red-500/5 border-red-500/20' : 'glass border-line hover:border-lineGold hover:shadow-glow'}`}>
              <p className={`font-semibold text-sm truncate ${isOff ? 'text-red-400 line-through' : 'text-cream/85'} ${item.isPromo ? 'text-gold' : ''}`}>{item.name} {item.isPromo && '⭐'}</p>
              <div className="flex justify-between items-end mt-2">
                <span className="text-[9px] text-cream/35">{isOff ? '🔴' : '🟢'}</span>
                <div className="text-right">
                  <p className="text-xs font-bold text-gold">{money(item.price)}</p>
                  <p className="text-[9px] text-green-400/60">+{money(item.price-(item.cost||0))}</p>
                </div>
              </div>
            </button>
          ); })}
        </div>
      );

      return (
        <motion.div className="fixed inset-0 z-[150] bg-bg overflow-y-auto" initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}>
          {/* Admin Header */}
          <div className="sticky top-0 z-20 glass-strong border-b border-line">
            <div className="px-4 py-4 flex flex-wrap justify-between items-center gap-3 max-w-7xl mx-auto">
              <div><p className="text-[9px] tracking-[0.4em] text-gold font-semibold">PANEL DE CONTROL</p><h2 className="text-lg font-display font-bold text-cream">Gestión {BRAND}</h2></div>
              <div className="flex gap-2"><button onClick={fetchData} className="btn-ghost !py-2 !px-3 !text-[9px]">↻ REFRESH</button><button onClick={onClose} className="btn-primary !py-2 !px-3 !text-[9px]">CERRAR</button></div>
            </div>
            <div className="flex gap-4 px-4 max-w-7xl mx-auto overflow-x-auto no-scrollbar border-t border-line/50">
              {[['orders','PEDIDOS'],['inventory','INVENTARIO'],['invoice','FACTURACIÓN'],['settings','⚙️ AJUSTES']].map(([k,l]) => (
                <button key={k} onClick={()=>setTab(k)} className={`py-3 text-[10px] tracking-widest whitespace-nowrap transition font-semibold ${tab===k?'text-gold border-b-2 border-gold':'text-cream/35 hover:text-cream/60'}`}>{l}</button>
              ))}
            </div>
          </div>

          <div className="p-4 max-w-7xl mx-auto pb-20">
            {loading ? <div className="text-center py-20 text-cream/30">Cargando...</div> :

            tab === 'orders' ? (
              <>
                {/* Stats */}
                <div className="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-6">
                  <div className="glass-gold rounded-2xl p-4 text-center shadow-glow"><p className="text-[9px] tracking-widest text-cream/40 mb-1">VENTAS HOY</p><p className="text-2xl font-display font-bold text-gradient-gold">{money(todaySales)}</p></div>
                  <div className="glass rounded-2xl p-4 text-center"><p className="text-[9px] tracking-widest text-cream/40 mb-1">GANANCIA</p><p className="text-2xl font-display font-bold text-green-400">{money(todayProfit)}</p></div>
                  <div className="glass rounded-2xl p-4 text-center"><p className="text-[9px] tracking-widest text-cream/40 mb-1">PEDIDOS</p><p className="text-2xl font-display font-bold text-cream">{todayOrders.length}</p></div>
                  <div className="glass rounded-2xl p-4 text-center"><p className="text-[9px] tracking-widest text-cream/40 mb-2">LOCAL</p><button onClick={toggleStore} className={`w-full py-2 rounded-xl text-xs font-bold tracking-widest border transition ${isStoreOpen?'bg-green-500/10 border-green-500/30 text-green-400':'bg-red-500/10 border-red-500/30 text-red-400'}`}>{isStoreOpen?'🟢 ABIERTO':'🔴 CERRADO'}</button></div>
                </div>
                {/* Orders List */}
                {orders.length === 0 ? <p className="text-center py-16 text-cream/25">Sin pedidos aún.</p> :
                  orders.map(o => (
                    <div key={o.id} className="glass rounded-2xl p-5 flex flex-col lg:flex-row gap-5 mb-4 border border-line hover:border-lineGold transition">
                      <div className="flex-1">
                        <div className="flex flex-wrap items-center gap-2 mb-3">
                          <span className="text-lg font-display font-bold text-gold">{o.tracking_code}</span>
                          <span className="text-[9px] text-cream/35 glass px-2 py-1 rounded-full">{new Date(o.created_at).toLocaleString('es-VE')}</span>
                        </div>
                        <p className="text-sm text-cream/70 mb-1">👤 {o.customer_name} · <a href={`https://wa.me/${formatWa(o.phone)}?text=${encodeURIComponent(`Hola ${o.customer_name}, tu pedido ${o.tracking_code} está en proceso. Divinée🍔✨`)}`} target="_blank" className="text-gold hover:underline">📞 {o.phone}</a></p>
                        <p className="text-sm text-cream/50 mb-3">📍 {o.address}</p>
                        <div className="text-xs text-cream/50 bg-bg rounded-xl p-3 border border-line">
                          {o.items.map((it,i)=><div key={i}>• {it.qty}x {it.name} <span className="text-gold/40">({money(it.price)})</span></div>)}
                          {o.notes && <div className="mt-2 text-gold/70">📝 {o.notes}</div>}
                        </div>
                      </div>
                      <div className="flex flex-col justify-between min-w-[200px] bg-bg p-4 rounded-xl border border-line">
                        <div className="flex justify-between lg:flex-col lg:text-right">
                          <div><p className="text-[9px] text-cream/35">TOTAL</p><p className="text-2xl font-display font-bold text-gold">{money(o.total_usd)}</p></div>
                          <div><p className="text-[9px] text-cream/35 mt-1">PROFIT</p><p className="text-lg font-bold text-green-400">{money(calcProfit(o.items||[]))}</p></div>
                        </div>
                        <div className="mt-4">
                          <p className="text-[9px] tracking-widest text-cream/35 mb-1">ESTATUS</p>
                          <select value={o.status} onChange={e=>updateStatus(o.id,e.target.value)} className={`w-full bg-bg border rounded-xl px-3 py-2 text-sm font-semibold outline-none cursor-pointer ${stColors[o.status]||'text-cream border-line'}`}>
                            {['Pendiente','Preparando','En camino','Listo para retirar','Entregado','Cancelado'].map(s=><option key={s} value={s}>{s}</option>)}
                          </select>
                          <button onClick={()=>{setSearchCode(o.tracking_code);setInvoiceOrder(o);setTab('invoice');}} className="mt-2 w-full text-[10px] tracking-widest text-cream/30 hover:text-gold transition text-center">📄 FACTURA</button>
                        </div>
                      </div>
                    </div>
                  ))
                }
              </>
            ) : tab === 'settings' ? (
              <div className="max-w-xl mx-auto space-y-5">
                {/* Empaque */}
                <div className="glass-gold rounded-2xl p-5 shadow-glow"><h3 className="text-[10px] tracking-widest text-gold font-bold mb-3 pb-2 border-b border-line">📦 TARIFA DE SERVICIO</h3><div><label className="text-[9px] text-cream/50 block mb-1">Costo por empaque ($)</label><input type="number" step="0.01" value={settingsForm.empaque} onChange={e=>setSettingsForm({...settingsForm,empaque:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" /></div></div>
                {/* Delivery */}
                <div className="glass rounded-2xl p-5 border border-line"><div className="flex justify-between items-center mb-3 pb-2 border-b border-line"><h3 className="text-[10px] tracking-widest text-gold font-bold">🛵 ZONAS DELIVERY</h3><button onClick={addDz} className="text-[9px] bg-gold/10 text-gold px-3 py-1 rounded-lg border border-gold/30 hover:bg-gold hover:text-bg transition font-semibold">+ ZONA</button></div>
                  {dzConfig.map(z=><div key={z.id} className="flex gap-2 items-center bg-bg p-2 rounded-xl border border-line mb-2"><input type="text" value={z.name} onChange={e=>updateDz(z.id,'name',e.target.value)} className="flex-1 bg-transparent text-cream text-sm outline-none px-2" /><input type="number" step="0.01" value={z.cost} onChange={e=>updateDz(z.id,'cost',e.target.value)} className="w-20 bg-bg border border-line rounded-lg px-2 py-1 text-cream text-sm outline-none text-center" /><button onClick={()=>rmDz(z.id)} className="btn-icon !w-7 !h-7 text-red-400 !border-red-500/20">×</button></div>)}
                </div>
                {/* Bank */}
                <div className="glass rounded-2xl p-5 border border-line"><h3 className="text-[10px] tracking-widest text-gold font-bold mb-3 pb-2 border-b border-line">💳 PAGO MÓVIL</h3><div className="space-y-3">{[['banco','Banco'],['telefonoPago','Teléfono'],['cedulaPago','Cédula']].map(([k,l])=><div key={k}><label className="text-[9px] text-cream/50 block mb-1">{l}</label><input type="text" value={settingsForm[k]} onChange={e=>setSettingsForm({...settingsForm,[k]:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" /></div>)}</div></div>
                {/* Zelle/Binance */}
                <div className="glass rounded-2xl p-5 border border-line"><h3 className="text-[10px] tracking-widest text-[#b366ff] font-bold mb-3 pb-2 border-b border-[#741bd1]/20">🟣 PAGOS INTERNACIONALES</h3><div className="space-y-3">{[['zelleEmail','Correo Zelle'],['binanceId','Binance Pay ID'],['binanceEmail','Binance Email']].map(([k,l])=><div key={k}><label className="text-[9px] text-cream/50 block mb-1">{l}</label><input type="text" value={settingsForm[k]} onChange={e=>setSettingsForm({...settingsForm,[k]:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" /></div>)}</div></div>
                {/* WhatsApp & Telegram */}
                <div className="glass rounded-2xl p-5 border border-line"><h3 className="text-[10px] tracking-widest text-[#25D366] font-bold mb-3 pb-2 border-b border-[#25D366]/20">📞 CONTACTO</h3><div><label className="text-[9px] text-cream/50 block mb-1">WhatsApp</label><input type="text" value={settingsForm.whatsapp} onChange={e=>setSettingsForm({...settingsForm,whatsapp:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-[#25D366] outline-none font-mono tracking-widest" /></div></div>
                <div className="glass rounded-2xl p-5 border border-line"><h3 className="text-[10px] tracking-widest text-[#0088cc] font-bold mb-3 pb-2 border-b border-[#0088cc]/20">🤖 TELEGRAM BOT</h3><div className="space-y-3"><div><label className="text-[9px] text-cream/50 block mb-1">Bot Token</label><input type="text" value={settingsForm.telegramToken} onChange={e=>setSettingsForm({...settingsForm,telegramToken:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-[#0088cc] outline-none font-mono text-xs" /></div><div><label className="text-[9px] text-cream/50 block mb-1">Chat ID</label><input type="text" value={settingsForm.telegramChatId} onChange={e=>setSettingsForm({...settingsForm,telegramChatId:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-[#0088cc] outline-none font-mono tracking-widest" /></div></div></div>
                <button onClick={saveSettings} className="btn-primary w-full !py-4 shadow-glowStrong">GUARDAR TODOS LOS AJUSTES</button>
              </div>
            ) : tab === 'inventory' ? (
              <div className="space-y-8 relative">
                {/* Edit Modal */}
                {itemToEdit && (
                  <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/80 px-4 overflow-y-auto py-8">
                    <div className="bg-bgAlt border border-gold/40 rounded-2xl p-6 w-full max-w-sm shadow-glowStrong my-auto">
                      <h3 className="text-lg font-display font-bold text-cream mb-4">Editar Producto</h3>
                      <div className="space-y-3">
                        <div><label className="text-[9px] text-cream/50 block mb-1">Nombre</label><input value={editForm.name} onChange={e=>setEditForm({...editForm,name:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" /></div>
                        {(itemToEdit.type==='burger'||itemToEdit.type==='dessert'||itemToEdit.type==='drink') && <div><label className="text-[9px] text-cream/50 block mb-1">Descripción</label><textarea rows={2} value={editForm.description} onChange={e=>setEditForm({...editForm,description:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" /></div>}
                        {(itemToEdit.type==='burger'||itemToEdit.type==='dessert'||itemToEdit.type==='drink') && (
                          <div className="flex gap-2">
                            <label className="flex items-center gap-2 cursor-pointer bg-gold/5 p-2 rounded-xl border border-gold/20 flex-1"><input type="checkbox" checked={editForm.isPromo} onChange={e=>setEditForm({...editForm,isPromo:e.target.checked})} className="accent-gold" /><span className="text-[9px] text-gold font-bold">⭐ PROMO</span></label>
                            {itemToEdit.type==='burger' && <label className="flex items-center gap-2 cursor-pointer bg-green-500/5 p-2 rounded-xl border border-green-500/20 flex-1"><input type="checkbox" checked={editForm.showUpsell} onChange={e=>setEditForm({...editForm,showUpsell:e.target.checked})} className="accent-green-500" /><span className="text-[9px] text-green-400 font-bold">🍟 UPSELL</span></label>}
                          </div>
                        )}
                        {itemToEdit.type==='burger' && <div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-cream/50">Ingredientes</label><button onClick={()=>autoCalc(editForm.ingredients,true)} className="text-[9px] bg-gold/10 text-gold px-2 py-1 rounded border border-gold/30 hover:bg-gold hover:text-bg transition font-semibold">✨ AUTO-CALC</button></div>{renderIngSelector(editForm.ingredients, true)}</div>}
                        <div className="grid grid-cols-2 gap-2">
                          <div><label className="text-[9px] text-cream/50 block mb-1">Costo ($)</label><input type="number" step="0.01" value={editForm.cost} onChange={e=>setEditForm({...editForm,cost:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" /></div>
                          <div><label className="text-[9px] text-cream/50 block mb-1">Precio ($)</label><input type="number" step="0.01" value={editForm.price} onChange={e=>setEditForm({...editForm,price:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" /></div>
                        </div>
                        <div className="bg-green-500/5 border border-green-500/20 rounded-xl p-3 text-center"><span className="text-[9px] text-green-400 block mb-1">Ganancia</span><span className="text-lg font-bold text-green-400">{money(editForm.price - editForm.cost)}</span></div>
                        <div className="flex gap-2 pt-2">
                          <button onClick={deleteItem} className="btn-icon !border-red-500/30 text-red-400 hover:!bg-red-500/10">🗑</button>
                          <button onClick={()=>setItemToEdit(null)} className="flex-1 btn-ghost !py-2">CANCELAR</button>
                          <button onClick={saveEdit} className="flex-1 btn-primary !py-2">GUARDAR</button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {/* Add Modal */}
                {showAddModal && (
                  <div className="fixed inset-0 z-[200] flex items-center justify-center bg-black/80 px-4 overflow-y-auto py-8">
                    <div className="bg-bgAlt border border-green-500/40 rounded-2xl p-6 w-full max-w-md shadow-luxe my-auto">
                      <h3 className="text-lg font-display font-bold text-cream mb-4">Añadir Producto</h3>
                      <div className="space-y-3">
                        <div><label className="text-[9px] text-cream/50 block mb-1">Tipo</label><select value={addForm.type} onChange={e=>setAddForm({...addForm,type:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream outline-none cursor-pointer"><option value="burger">Hamburguesa</option><option value="dessert">Postre</option><option value="drink">Bebida</option><option value="catalog">Ingrediente Atelier</option></select></div>
                        {addForm.type==='catalog' && <div><label className="text-[9px] text-cream/50 block mb-1">Categoría</label><select value={addForm.group} onChange={e=>setAddForm({...addForm,group:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream outline-none cursor-pointer"><option value="buns">Pan</option><option value="proteins">Proteína</option><option value="cheeses">Queso</option><option value="toppings">Topping</option></select></div>}
                        <div><label className="text-[9px] text-cream/50 block mb-1">Nombre</label><input value={addForm.name} onChange={e=>setAddForm({...addForm,name:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" /></div>
                        {(addForm.type==='burger'||addForm.type==='dessert'||addForm.type==='drink') && (
                          <div className="flex gap-2"><label className="flex items-center gap-2 cursor-pointer bg-gold/5 p-2 rounded-xl border border-gold/20 flex-1"><input type="checkbox" checked={addForm.isPromo} onChange={e=>setAddForm({...addForm,isPromo:e.target.checked})} className="accent-gold" /><span className="text-[9px] text-gold font-bold">⭐ PROMO</span></label>{addForm.type==='burger'&&<label className="flex items-center gap-2 cursor-pointer bg-green-500/5 p-2 rounded-xl border border-green-500/20 flex-1"><input type="checkbox" checked={addForm.showUpsell} onChange={e=>setAddForm({...addForm,showUpsell:e.target.checked})} className="accent-green-500" /><span className="text-[9px] text-green-400 font-bold">🍟 UPSELL</span></label>}</div>
                        )}
                        {addForm.type==='burger' && <div><div className="flex justify-between items-center mb-1"><label className="text-[9px] text-cream/50">Ingredientes</label><button onClick={()=>autoCalc(addForm.ingredients,false)} className="text-[9px] bg-gold/10 text-gold px-2 py-1 rounded border border-gold/30 hover:bg-gold hover:text-bg transition font-semibold">✨ AUTO-CALC</button></div>{renderIngSelector(addForm.ingredients, false)}</div>}
                        <div className="grid grid-cols-2 gap-2"><div><label className="text-[9px] text-cream/50 block mb-1">Costo ($)</label><input type="number" step="0.01" value={addForm.cost} onChange={e=>setAddForm({...addForm,cost:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" /></div><div><label className="text-[9px] text-cream/50 block mb-1">Precio ($)</label><input type="number" step="0.01" value={addForm.price} onChange={e=>setAddForm({...addForm,price:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" /></div></div>
                        {(addForm.type==='burger'||addForm.type==='dessert'||addForm.type==='drink') && (<><div><label className="text-[9px] text-cream/50 block mb-1">Descripción</label><textarea value={addForm.description} onChange={e=>setAddForm({...addForm,description:e.target.value})} rows={2} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" /></div><div><label className="text-[9px] text-cream/50 block mb-1">URL Imagen</label><input value={addForm.img} onChange={e=>setAddForm({...addForm,img:e.target.value})} className="w-full bg-bg border border-line rounded-xl px-3 py-2 text-cream focus:border-gold outline-none" placeholder="https://..." /></div></>)}
                        <div className="flex gap-2 pt-3"><button onClick={()=>setShowAddModal(false)} className="flex-1 btn-ghost !py-2">CANCELAR</button><button onClick={submitAdd} className="flex-1 btn-primary !py-2 !bg-green-600 !border-green-500/50">AÑADIR</button></div>
                      </div>
                    </div>
                  </div>
                )}
                {/* Toolbar */}
                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3 glass rounded-2xl p-4 border border-line">
                  <p className="text-sm text-cream/55 font-light">Gestiona, edita o crea productos.</p>
                  <div className="flex bg-bg rounded-xl p-1 border border-line gap-0.5">
                    <button onClick={()=>{setEditMode(false);setShowAddModal(false);}} className={`px-3 py-2 rounded-lg text-[9px] tracking-widest font-bold transition ${!editMode&&!showAddModal?'bg-gold text-bg':'text-cream/35'}`}>AGOTAR</button>
                    <button onClick={()=>{setEditMode(true);setShowAddModal(false);}} className={`px-3 py-2 rounded-lg text-[9px] tracking-widest font-bold transition ${editMode?'bg-blue-500 text-white':'text-cream/35'}`}>EDITAR</button>
                    <button onClick={()=>setShowAddModal(true)} className={`px-3 py-2 rounded-lg text-[9px] tracking-widest font-bold transition ${showAddModal?'bg-green-500 text-white':'text-cream/35'}`}>+ NUEVO</button>
                  </div>
                </div>
                {/* Inventory Lists */}
                <div><h3 className="text-[10px] tracking-widest text-gold font-bold mb-3">HAMBURGUESAS</h3>{invGrid(localBurgers, 'burger')}</div>
                <div><h3 className="text-[10px] tracking-widest text-gold font-bold mb-3 mt-6">BEBIDAS</h3>{invGrid(localDrinks, 'drink')}</div>
                <div><h3 className="text-[10px] tracking-widest text-gold font-bold mb-3 mt-6">POSTRES</h3>{invGrid(localDesserts, 'dessert')}</div>
                {Object.entries(localCatalog).map(([cat, arr]) => { if (cat==='settings'||!Array.isArray(arr)) return null; return (<div key={cat}><h3 className="text-[10px] tracking-widest text-gold font-bold mb-3 mt-6">ATELIER: {cat.toUpperCase()}</h3><div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3">{arr.map(item => { if(item.id==='none') return null; const isOff=disabledItems.includes(item.id); return (<button key={item.id} onClick={()=>editMode?openEdit(item,'catalog',null,cat):toggleIngredient(item.id,isOff)} className={`p-3 rounded-xl border text-left transition ${isOff?'bg-red-500/5 border-red-500/20':'glass border-line hover:border-lineGold'}`}><p className={`font-semibold text-sm ${isOff?'text-red-400 line-through':'text-cream/85'}`}>{item.name}</p><div className="flex justify-between items-end mt-2"><span className="text-[9px] text-cream/35">{isOff?'🔴':'🟢'}</span><div className="text-right"><p className="text-xs font-bold text-gold">{money(item.price)}</p><p className="text-[9px] text-green-400/60">+{money(item.price-(item.cost||0))}</p></div></div></button>); })}</div></div>); })}
              </div>
            ) : (
              /* Invoice Tab */
              <div className="max-w-md mx-auto">
                <form onSubmit={e=>{e.preventDefault();const f=orders.find(o=>o.tracking_code.toUpperCase()===searchCode.toUpperCase());if(f)setInvoiceOrder(f);}} className="flex gap-2 mb-6">
                  <input type="text" value={searchCode} onChange={e=>setSearchCode(e.target.value)} placeholder="#DIV-1234" className="flex-1 bg-bg border border-line rounded-xl px-4 py-3 text-sm text-cream outline-none focus:border-gold transition uppercase tracking-widest" />
                  <button type="submit" className="btn-primary !px-6">BUSCAR</button>
                </form>
                {invoiceOrder ? (
                  <>
                    <div id="invoice-print-area" className="bg-white text-black p-6 rounded-2xl shadow-xl font-mono text-sm">
                      <div className="text-center mb-6 border-b-2 border-dashed border-black/20 pb-6"><h2 className="text-2xl font-bold tracking-widest">{BRAND.toUpperCase()}</h2><p className="text-xs mt-1 text-gray-600">GOURMET BAR</p></div>
                      <div className="mb-6 space-y-1 text-xs"><div className="flex"><span>TICKET:</span><strong className="text-base ml-2">{invoiceOrder.tracking_code}</strong></div><div className="flex"><span>FECHA:</span><span className="ml-2">{new Date(invoiceOrder.created_at).toLocaleString('es-VE')}</span></div><div className="flex mt-3"><span>CLIENTE:</span><span className="font-bold uppercase ml-2">{invoiceOrder.customer_name}</span></div><div className="flex"><span>TLF:</span><span className="ml-2">{invoiceOrder.phone}</span></div></div>
                      <div className="mb-6 border-t-2 border-b-2 border-dashed border-black/20 py-4">
                        {invoiceOrder.items.map((it,i)=><div key={i} className="mb-2 text-xs"><div className="flex font-semibold justify-between"><span>{it.qty}x {it.name}</span><span>{money(it.price*it.qty)}</span></div>{it.meta&&<div className="text-xs text-gray-500 pl-4 mt-1">{Object.entries(it.meta).map(([k,v])=><div key={k}>- {k}: {Array.isArray(v)?v.join(", "):v}</div>)}</div>}</div>)}
                      </div>
                      <div className="space-y-1"><div className="flex text-base font-bold justify-between"><span>TOTAL USD:</span><span>{money(invoiceOrder.total_usd)}</span></div>{invoiceOrder.bcv_rate&&<div className="flex text-xs text-gray-500 font-bold justify-between"><span>TOTAL Bs ({invoiceOrder.bcv_rate}):</span><span>{(invoiceOrder.total_usd*invoiceOrder.bcv_rate).toFixed(2)} Bs</span></div>}<div className="flex text-xs text-gray-400 mt-2 justify-between"><span>MÉTODO:</span><span className="uppercase">{invoiceOrder.payment_ref}</span></div></div>
                      <div className="text-center text-xs text-gray-600 font-bold mt-6 space-y-1"><p>¡GRACIAS POR SU COMPRA!</p><p>{BRAND_SLOGAN} 🍔✨</p></div>
                    </div>
                    <button onClick={handlePrintTicket} className="mt-6 w-full btn-primary !py-4">🖨️ IMPRIMIR TICKET</button>
                  </>
                ) : <div className="text-center py-16 text-cream/20 border border-dashed border-line rounded-2xl text-sm">Ingresa un código o selecciona un pedido.</div>}
              </div>
            )}
          </div>
        </motion.div>
      );
    }

    // ═══════════════════════════════════
    // MAIN APP — EVERYTHING CONNECTED
    // ═══════════════════════════════════
    function App() {
      useSpotlight();
      const refs = { promos: useRef(null), burgers: useRef(null), drinks: useRef(null), desserts: useRef(null), yogurt: useRef(null), atelier: useRef(null) };
      const [activeBurger, setActiveBurger] = useState(null);
      const [cartOpen, setCartOpen] = useState(false);
      const [cartItems, setCartItems] = useState(() => { try { const g = localStorage.getItem('divinee_cart'); return g ? JSON.parse(g) : []; } catch { return []; } });
      const [localBurgers, setLocalBurgers] = useState(DEFAULT_BURGERS);
      const [localDesserts, setLocalDesserts] = useState(DEFAULT_DESSERTS);
      const [localDrinks, setLocalDrinks] = useState(DEFAULT_DRINKS);
      const [localCatalog, setLocalCatalog] = useState(DEFAULT_CATALOG);
      const [bcvRate, setBcvRate] = useState(null);
      const [trackingOpen, setTrackingOpen] = useState(false);
      const [adminOpen, setAdminOpen] = useState(false);
      const [adminLogged, setAdminLogged] = useState(false);
      const [appLoaded, setAppLoaded] = useState(false);
      const [isStoreOpen, setIsStoreOpen] = useState(true);
      const [disabledItems, setDisabledItems] = useState([]);
      const [showUpsell, setShowUpsell] = useState(false);
      const [pendingItem, setPendingItem] = useState(null);

      const cartCount = useMemo(() => cartItems.reduce((a, it) => a + it.qty, 0), [cartItems]);
      const cartTotal = useMemo(() => cartItems.reduce((a, it) => a + it.price * it.qty, 0), [cartItems]);
      const promos = useMemo(() => [...localBurgers.filter(b => b.isPromo), ...localDrinks.filter(d => d.isPromo), ...localDesserts.filter(d => d.isPromo)], [localBurgers, localDesserts, localDrinks]);

      useEffect(() => { localStorage.setItem('divinee_cart', JSON.stringify(cartItems)); }, [cartItems]);

      useEffect(() => {
        fetch("https://ve.dolarapi.com/v1/dolares/oficial").then(r => r.json()).then(d => {
          let tasa = parseFloat(d.promedio);
          if (tasa > 100) tasa = tasa / 10; // Safety fallback 
          setBcvRate(tasa.toFixed(2));
        }).catch(() => setBcvRate(60.00));

        const fetchGlobal = async () => {
          if (!supabaseClient) return;
          const { data } = await supabaseClient.from('store_settings').select('is_open, catalog_data').eq('id', 'divinee').single();
          if (data) {
            setIsStoreOpen(data.is_open);
            if (data.catalog_data) {
              if (data.catalog_data.burgers) setLocalBurgers(data.catalog_data.burgers);
              if (data.catalog_data.desserts) setLocalDesserts(data.catalog_data.desserts);
              if (data.catalog_data.drinks) setLocalDrinks(data.catalog_data.drinks);
              if (data.catalog_data.catalog) { const c = data.catalog_data.catalog; if (!c.settings) c.settings = DEFAULT_CATALOG.settings; setLocalCatalog(c); }
            }
          }
          const { data: inv } = await supabaseClient.from('disabled_ingredients').select('id');
          if (inv) setDisabledItems(inv.map(i => i.id));
        };
        fetchGlobal();
        const interval = setInterval(fetchGlobal, 15000);
        return () => clearInterval(interval);
      }, []);

      const handleSaveInventory = async (nB, nDe, nDr, nC) => {
        setLocalBurgers(nB); setLocalDesserts(nDe); setLocalDrinks(nDr); setLocalCatalog(nC);
        const { error } = await supabaseClient.from('store_settings').update({ catalog_data: { burgers: nB, desserts: nDe, drinks: nDr, catalog: nC } }).eq('id', 'divinee');
        window.showToast(error ? "Error guardando" : "Sincronizado ☁️", error ? "⚠️" : "☁️");
      };

      const handleAddProduct = f => {
        let nB=[...localBurgers], nDe=[...localDesserts], nDr=[...localDrinks], nC={...localCatalog};
        const id = f.name.toLowerCase().replace(/[^a-z0-9]/g, '-') + '-' + Math.floor(Math.random()*1000);
        const base = { id, name: f.name, price: Number(f.price), cost: Number(f.cost) };
        if (f.type==='burger') nB.push({ ...base, description: f.description||"Creación exclusiva.", img: f.img||"https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=800&q=80", ingredientIds: f.ingredientIds||[], ingredients: f.ingredients||[], isPromo: f.isPromo, showUpsell: f.showUpsell, config:[{type:"bunBottom"},{type:"meat"},{type:"generic"},{type:"bunTop"}] });
        else if (f.type==='dessert') nDe.push({ ...base, description: f.description||"Delicia artesanal.", img: f.img||"https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=800&q=80", isPromo: f.isPromo });
        else if (f.type==='drink') nDr.push({ ...base, description: f.description||"Bebida refrescante.", img: f.img||"https://images.unsplash.com/photo-1543253687-c931c8e01820?auto=format&fit=crop&w=800&q=80", isPromo: f.isPromo });
        else if (f.type==='catalog') { base.note = "Nuevo"; base.group = f.group==='toppings'?'Extra':undefined; if (!nC[f.group]) nC[f.group]=[]; nC[f.group].push(base); }
        handleSaveInventory(nB, nDe, nDr, nC);
      };

      const scrollTo = k => refs[k]?.current?.scrollIntoView({ behavior: "smooth", block: "start" });

      const handleInitialAdd = (item, isBurger = true) => {
        if (!isStoreOpen) { window.showToast("Local cerrado 🚫", "🚫"); return; }
        if (disabledItems.includes(item.id)) { window.showToast("Producto agotado 🚫", "🚫"); return; }
        if (isBurger && item.showUpsell !== false) { setPendingItem(item); setShowUpsell(true); }
        else addToCart(item);
      };

      const addToCart = item => {
        window.showToast(`${item.name} añadido`, '🍔');
        setCartItems(prev => { const idx = prev.findIndex(p => p.id === item.id); if (idx >= 0) { const c = [...prev]; c[idx] = { ...c[idx], qty: c[idx].qty + 1 }; return c; } return [...prev, { ...item, qty: 1 }]; });
      };

      const processUpsell = (addPapas, papaObj) => {
        addToCart(pendingItem);
        if (addPapas && papaObj) setTimeout(() => addToCart(papaObj), 400);
        setShowUpsell(false); setPendingItem(null);
      };

      const updateQty = (id, qty) => setCartItems(prev => prev.map(p => p.id === id ? { ...p, qty } : p).filter(p => p.qty > 0));
      const wsPhone = localCatalog?.settings?.whatsapp || "584126835635";

      // Hide Sections logic
      const activePromos = promos.filter(p => !disabledItems.includes(p.id));
      const activeBurgers = localBurgers.filter(b => !b.isPromo && !disabledItems.includes(b.id));
      const activeDrinks = localDrinks.filter(d => !d.isPromo && !disabledItems.includes(d.id));
      const activeDesserts = localDesserts.filter(d => !d.isPromo && !disabledItems.includes(d.id));

      return (
        <div className="min-h-screen relative z-[1]">
          <ScrollProgressBar />
          <ToastContainer />

          {/* Store Closed Banner */}
          <AnimatePresence>
            {!isStoreOpen && (
              <motion.div initial={{ opacity: 0, y: -20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} className="fixed top-0 w-full z-[300] bg-red-500/90 text-white text-center py-2 text-[10px] font-bold tracking-[0.3em] backdrop-blur shadow-lg">
                ⛔ LOCAL CERRADO — NO SE RECIBEN PEDIDOS
              </motion.div>
            )}
          </AnimatePresence>

          {/* Preloader */}
          <AnimatePresence>{!appLoaded && <Preloader onComplete={() => setAppLoaded(true)} />}</AnimatePresence>

          {/* Header */}
          <Header onNavigate={scrollTo} onOpenCart={() => setCartOpen(true)} cartCount={cartCount} onOpenAdmin={() => setAdminOpen(true)} />

          {/* Main Content */}
          <main className="mx-auto max-w-7xl px-4 lg:px-8 pb-32 pt-32 lg:pt-36">

            {/* Hero */}
            <HeroSection onExplore={() => scrollTo(activePromos.length > 0 ? 'promos' : 'burgers')} onTrack={() => setTrackingOpen(true)} bcvRate={bcvRate} />

            {/* Promos */}
            {activePromos.length > 0 && (
              <div ref={refs.promos} className="scroll-mt-32">
                <SectionShell eyebrow="⭐ DESTACADO" title="Promociones Especiales" subtitle="Ofertas y novedades por tiempo limitado.">
                  <ProductShowcase items={activePromos} badge="PROMO" onOpen={setActiveBurger} onAdd={item => handleInitialAdd(item, !!item.config)} disabledItems={disabledItems} promoOnly={true} />
                </SectionShell>
              </div>
            )}

            {/* Burgers */}
            {activeBurgers.length > 0 && (
              <div ref={refs.burgers} className="scroll-mt-32">
                <SectionShell eyebrow="COLECCIÓN SIGNATURE" title="Hamburguesas Gourmet" subtitle={`${BRAND_SLOGAN} Cada creación es una experiencia única.`}>
                  <ProductShowcase items={activeBurgers} badge="VER 360°" onOpen={setActiveBurger} onAdd={item => handleInitialAdd(item, true)} disabledItems={disabledItems} />
                </SectionShell>
              </div>
            )}

            {/* Drinks */}
            {activeDrinks.length > 0 && (
              <>
                <hr className="divider-gold my-8 lg:my-12" />
                <div ref={refs.drinks} className="scroll-mt-32">
                  <SectionShell eyebrow="REFRESHING" title="Bebidas" subtitle="El complemento perfecto para tu experiencia.">
                    <ProductShowcase items={activeDrinks} badge="BEBIDA" onOpen={p => handleInitialAdd({ ...p, qty: 1 }, false)} onAdd={item => handleInitialAdd(item, false)} disabledItems={disabledItems} />
                  </SectionShell>
                </div>
              </>
            )}

            {/* Desserts */}
            {activeDesserts.length > 0 && (
              <>
                <hr className="divider-gold my-8 lg:my-12" />
                <div ref={refs.desserts} className="scroll-mt-32">
                  <SectionShell eyebrow="PATISSERIE" title="Postres Artesanales" subtitle="Selección corta y elegante de delicias dulces.">
                    <ProductShowcase items={activeDesserts} badge="DULCE" onOpen={p => handleInitialAdd({ ...p, qty: 1 }, false)} onAdd={item => handleInitialAdd(item, false)} disabledItems={disabledItems} />
                  </SectionShell>
                </div>
              </>
            )}

            <hr className="divider-gold my-8 lg:my-12" />

            {/* About Section */}
            <AboutSection />

            {/* Testimonials */}
            <TestimonialsSection />

            {/* Yogurt */}
            <div ref={refs.yogurt} className="scroll-mt-32">
              <SectionShell eyebrow="PRÓXIMAMENTE" title="Yogurt Griego" subtitle="Una nueva experiencia que estamos preparando.">
                <YogurtComingSoon />
              </SectionShell>
            </div>

            {/* Atelier */}
            <div ref={refs.atelier} className="scroll-mt-32">
              <SectionShell eyebrow="✨ EXPERIENCIA INTERACTIVA" title="Atelier — Arma tu Burger" subtitle="Configura cada ingrediente en tiempo real con vista 3D.">
                <BurgerBuilder onAddToCart={handleInitialAdd} catalog={localCatalog} />
              </SectionShell>
            </div>
          </main>

          {/* Footer */}
          <Footer whatsapp={wsPhone} />

          {/* Floating Buttons Mobile (CORRECTED POSITIONS) */}
          <div className="lg:hidden">
            <button onClick={() => setCartOpen(true)} className="fixed z-40 bottom-4 right-4 rounded-2xl glass-gold px-4 py-3 shadow-glowStrong hover:brightness-110 transition-all duration-300 flex items-center gap-3">
              <span className="text-gold">{Icons.cart}</span>
              <span className="bg-gradient-to-br from-gold to-goldDark text-bg text-[10px] font-bold px-2 py-0.5 rounded-full">{cartCount}</span>
            </button>
          </div>

          <a href={`https://wa.me/${wsPhone}?text=${encodeURIComponent('Hola Divinée, tengo una consulta...')}`} target="_blank" rel="noopener noreferrer" className="fixed z-40 bottom-4 left-4 lg:bottom-8 lg:left-8 rounded-2xl glass border border-[#25D366]/30 px-4 py-3 shadow-glow hover:bg-[#25D366]/10 transition-all duration-300 flex items-center gap-2">
            <span className="text-xl">💬</span>
            <span className="text-[10px] tracking-[0.2em] text-[#25D366] font-semibold hidden sm:inline">AYUDA</span>
          </a>

          {/* Modals */}
          <AnimatePresence>{showUpsell && <UpsellModal product={pendingItem} catalog={localCatalog} onAccept={p => processUpsell(true, p)} onDecline={() => processUpsell(false)} />}</AnimatePresence>
          <AnimatePresence>{cartOpen && <CartDrawer items={cartItems} total={cartTotal} bcvRate={bcvRate} catalog={localCatalog} onClose={() => setCartOpen(false)} onQty={updateQty} onClearCart={() => setCartItems([])} supabaseClient={supabaseClient} />}</AnimatePresence>
          <AnimatePresence>{!!activeBurger && <ProductModal product={activeBurger} onClose={() => setActiveBurger(null)} onAdd={() => handleInitialAdd({ ...activeBurger, cost: activeBurger.cost }, true)} />}</AnimatePresence>
          <AnimatePresence>{trackingOpen && <TrackingModal onClose={() => setTrackingOpen(false)} supabaseClient={supabaseClient} />}</AnimatePresence>
          <AnimatePresence>
            {adminOpen && !adminLogged && <AdminLogin onLogin={() => setAdminLogged(true)} onClose={() => setAdminOpen(false)} />}
            {adminOpen && adminLogged && <AdminDashboard supabaseClient={supabaseClient} onClose={() => setAdminOpen(false)} localBurgers={localBurgers} localDesserts={localDesserts} localDrinks={localDrinks} localCatalog={localCatalog} onSaveInventory={handleSaveInventory} onAddProduct={handleAddProduct} />}
          </AnimatePresence>
        </div>
      );
    }

    // ═══════════════════════════
    // RENDER
    // ═══════════════════════════
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
