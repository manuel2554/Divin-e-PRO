                        <div><label className="text-xs text-divineCream/70 mb-1 block">Nombre</label><input type="text" value={addForm.name} onChange={(e) => setAddForm({...addForm, name: e.target.value})} placeholder="Ej: Triple Bacon" className="w-full bg-black/50 border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-divineGold outline-none" /></div>
                        
                        {(addForm.type === 'burger' || addForm.type === 'dessert') && (
                          <label className="flex items-center gap-3 cursor-pointer bg-divineGold/10 p-3 rounded-xl border border-divineGold/30">
                            <input type="checkbox" checked={addForm.isPromo} onChange={(e)=>setAddForm({...addForm, isPromo: e.target.checked})} className="w-5 h-5 accent-divineGold" />
                            <span className="text-sm font-bold text-divineGold">🌟 Destacar en Promociones</span>
                          </label>
                        )}

                        {/* Selector de ingredientes para nuevas Hamburguesas */}
                        {addForm.type === 'burger' && (
                          <div>
                            <div className="flex justify-between items-center mb-1">
                              <label className="text-xs text-divineCream/70 block">Ingredientes de la Receta</label>
                              <button onClick={() => handleAutoCalc(addForm.ingredients, false)} className="text-[10px] bg-divineGold/20 text-divineGold px-2 py-1 rounded border border-divineGold/50 hover:bg-divineGold hover:text-black transition">✨ Auto-Calcular Precio</button>
                            </div>
                            {renderIngredientSelector(addForm.ingredients, false)}
                          </div>
                        )}

                        <div className="grid grid-cols-2 gap-3">
                          <div><label className="text-xs text-divineCream/70 mb-1 block">Costo ($)</label><input type="number" step="0.01" value={addForm.cost} onChange={(e) => setAddForm({...addForm, cost: e.target.value})} placeholder="0.00" className="w-full bg-black/50 border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-divineGold outline-none" /></div>
                          <div><label className="text-xs text-divineCream/70 mb-1 block">Precio Venta ($)</label><input type="number" step="0.01" value={addForm.price} onChange={(e) => setAddForm({...addForm, price: e.target.value})} placeholder="0.00" className="w-full bg-black/50 border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-divineGold outline-none" /></div>
                        </div>
                        {(addForm.type === 'burger' || addForm.type === 'dessert') && (
                          <motion.div initial={{opacity:0}} animate={{opacity:1}} className="space-y-4">
                            <div><label className="text-xs text-divineCream/70 mb-1 block">Descripción (Opcional)</label><textarea value={addForm.description} onChange={(e) => setAddForm({...addForm, description: e.target.value})} rows="2" className="w-full bg-black/50 border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-divineGold outline-none"></textarea></div>
                            <div><label className="text-xs text-divineCream/70 mb-1 block">Link de Imagen (Opcional)</label><input type="text" value={addForm.img} onChange={(e) => setAddForm({...addForm, img: e.target.value})} placeholder="https://..." className="w-full bg-black/50 border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-divineGold outline-none" /></div>
                          </motion.div>
                        )}
                        <div className="flex gap-2 pt-4">
                          <button onClick={() => setShowAddModal(false)} className="flex-1 btn-ghost py-3 text-xs">CANCELAR</button>
                          <button onClick={submitAddForm} className="flex-1 btn-primary py-3 text-xs shadow-[0_0_15px_rgba(34,197,94,0.3)] !border-green-500/50 bg-gradient-to-r from-green-600 to-green-400 !text-white hover:brightness-110">AÑADIR AL INVENTARIO</button>
                        </div>
                      </div>
                    </div>
                  </div>
                )}

                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-divineLine2/10 border border-divineLine2/30 p-4 rounded-2xl">
                  <p className="text-sm text-divineCream/80">Gestiona, apaga o crea productos nuevos para tu menú o atelier.</p>
                  <div className="flex bg-black/50 rounded-xl p-1 border border-divineLine2 flex-wrap justify-center sm:justify-end">
                    <button onClick={() => { setEditMode(false); setShowAddModal(false); }} className={`px-4 py-2 rounded-lg text-xs tracking-widest font-bold transition ${!editMode && !showAddModal ? 'bg-divineGold text-black' : 'text-divineCream/50 hover:text-white'}`}>AGOTAR</button>
                    <button onClick={() => { setEditMode(true); setShowAddModal(false); }} className={`px-4 py-2 rounded-lg text-xs tracking-widest font-bold transition ${editMode ? 'bg-blue-500 text-white shadow-[0_0_15px_rgba(59,130,246,0.5)]' : 'text-divineCream/50 hover:text-white'}`}>EDITAR</button>
                    <button onClick={() => setShowAddModal(true)} className={`px-4 py-2 rounded-lg text-xs tracking-widest font-bold transition ${showAddModal ? 'bg-green-500 text-white shadow-[0_0_15px_rgba(34,197,94,0.5)]' : 'text-divineCream/50 hover:text-green-400'}`}>➕ NUEVO</button>
                  </div>
                </div>
                
                <div><h3 className="text-xs tracking-[0.2em] text-divineGold mb-3 uppercase">MENÚ: HAMBURGUESAS</h3><div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">{localBurgers.map((item, idx) => { const isOff = disabledItems.includes(item.id); return (<button key={item.id} onClick={() => editMode ? openEditModal(item, 'burger', idx) : toggleIngredient(item.id, isOff)} className={`p-3 rounded-xl border text-left transition ${isOff ? 'bg-red-500/10 border-red-500/30' : 'bg-divinePanel border-divineLine hover:border-divineGold/50'}`}><div className={`font-semibold text-sm ${isOff ? 'text-red-400 line-through' : 'text-divineCream'} ${item.isPromo ? 'text-divineGold' : ''}`}>{item.name} {item.isPromo && '🌟'}</div><div className="flex justify-between items-end mt-2"><div className="text-[10px] text-divineCream/50">{isOff ? '🔴 AGOTADO' : '🟢 DISPONIBLE'}</div><div className="text-right"><div className="text-xs font-bold text-divineGold">{money(item.price)}</div><div className="text-[9px] text-[#25D366]">Prof: {money(item.price - (item.cost||0))}</div></div></div></button>) })}</div></div>
                <div><h3 className="text-xs tracking-[0.2em] text-divineGold mb-3 uppercase mt-6">MENÚ: POSTRES</h3><div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">{localDesserts.map((item, idx) => { const isOff = disabledItems.includes(item.id); return (<button key={item.id} onClick={() => editMode ? openEditModal(item, 'dessert', idx) : toggleIngredient(item.id, isOff)} className={`p-3 rounded-xl border text-left transition ${isOff ? 'bg-red-500/10 border-red-500/30' : 'bg-divinePanel border-divineLine hover:border-divineGold/50'}`}><div className={`font-semibold text-sm ${isOff ? 'text-red-400 line-through' : 'text-divineCream'} ${item.isPromo ? 'text-divineGold' : ''}`}>{item.name} {item.isPromo && '🌟'}</div><div className="flex justify-between items-end mt-2"><div className="text-[10px] text-divineCream/50">{isOff ? '🔴 AGOTADO' : '🟢 DISPONIBLE'}</div><div className="text-right"><div className="text-xs font-bold text-divineGold">{money(item.price)}</div><div className="text-[9px] text-[#25D366]">Prof: {money(item.price - (item.cost||0))}</div></div></div></button>) })}</div></div>
                
                {Object.entries(localCatalog).map(([category, items]) => { if(category === 'settings') return null; return (<div key={category}><h3 className="text-xs tracking-[0.2em] text-divineGold mb-3 uppercase mt-6">ATELIER: {category}</h3><div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">{items.map(item => { if(item.id === 'none') return null; const isOff = disabledItems.includes(item.id); return (<button key={item.id} onClick={() => editMode ? openEditModal(item, 'catalog', null, category) : toggleIngredient(item.id, isOff)} className={`p-3 rounded-xl border text-left transition ${isOff ? 'bg-red-500/10 border-red-500/30' : 'bg-divinePanel border-divineLine hover:border-divineGold/50'}`}><div className={`font-semibold text-sm ${isOff ? 'text-red-400 line-through' : 'text-divineCream'}`}>{item.name}</div><div className="flex justify-between items-end mt-2"><div className="text-[10px] text-divineCream/50">{isOff ? '🔴 AGOTADO' : '🟢 DISPONIBLE'}</div><div className="text-right"><div className="text-xs font-bold text-divineGold">{money(item.price)}</div><div className="text-[9px] text-[#25D366]">Prof: {money(item.price - (item.cost||0))}</div></div></div></button>) })}</div></div>)})}
              </div>
             ) : (
              <div className="max-w-md mx-auto">
                <form onSubmit={handleSearchInvoice} className="flex gap-2 mb-6"><input type="text" value={searchCode} onChange={(e) => setSearchCode(e.target.value)} placeholder="Código (Ej: #DIV-1234)" className="flex-1 bg-black/40 border border-divineLine2 rounded-xl px-4 py-3 text-sm text-divineCream outline-none focus:border-divineGold transition uppercase tracking-widest" /><button type="submit" className="btn-primary px-6">BUSCAR</button></form>
                {invoiceOrder ? (
                  <><div id="invoice-print-area" className="bg-white text-black p-6 md:p-8 rounded-2xl shadow-xl font-mono text-sm"><div className="text-center mb-6 border-b-2 border-dashed border-black/20 pb-6"><h2 className="text-2xl font-bold tracking-widest">{BRAND_NAME.toUpperCase()}</h2><p className="text-xs mt-1 text-gray-600">GOURMET BAR</p><p className="text-xs text-gray-600 mt-1">RIF: V-30158858-1</p></div><div className="mb-6 space-y-1 text-xs"><div className="flex"><span>TICKET:</span> <strong className="text-base">{invoiceOrder.tracking_code}</strong></div><div className="flex"><span>FECHA:</span> <span>{new Date(invoiceOrder.created_at).toLocaleString('es-VE')}</span></div><div className="flex mt-3"><span>CLIENTE:</span> <span className="font-bold uppercase text-right truncate">{invoiceOrder.customer_name}</span></div><div className="flex"><span>TLF:</span> <span>{invoiceOrder.phone}</span></div></div><div className="mb-6 border-t-2 border-b-2 border-dashed border-black/20 py-4"><div className="flex font-bold mb-3 text-xs"><span>CANT DESCRIPCIÓN</span><span>TOTAL</span></div>{invoiceOrder.items.map((it, i) => (<div key={i} className="mb-3 text-xs"><div className="flex font-semibold"><span>{it.qty}x {it.name.replace('Hamburguesa Divinée (Atelier)', 'Atelier')}</span><span>{money(it.price * it.qty)}</span></div>{it.meta && (<div className="text-xs text-gray-500 pl-4 mt-1 space-y-1">{Object.entries(it.meta).map(([k,v]) => <div key={k}>- {k}: {Array.isArray(v) ? v.join(", ") : String(v)}</div>)}</div>)}</div>))}</div><div className="mb-8 space-y-1"><div className="flex text-base font-bold"><span>TOTAL USD:</span><span>{money(invoiceOrder.total_usd)}</span></div>{invoiceOrder.bcv_rate && (<div className="flex text-xs text-gray-500 font-bold"><span>TOTAL BCV (TASA {invoiceOrder.bcv_rate}):</span><span>{(invoiceOrder.total_usd * invoiceOrder.bcv_rate).toFixed(2)} Bs</span></div>)}<div className="flex text-xs text-gray-400 mt-2"><span>REF PAGO:</span><span>{invoiceOrder.payment_ref}</span></div></div><div className="text-center text-xs text-gray-600 font-bold space-y-1"><p>¡GRACIAS POR SU COMPRA!</p><p>Exquisito. Divino. Divinée🍔✨</p></div></div><button onClick={handlePrintTicket} className="mt-8 w-full bg-black text-white py-4 rounded-xl font-sans font-bold tracking-widest hover:bg-gray-800 transition shadow-lg">🖨️ IMPRIMIR TICKET</button></>
                ) : (<div className="text-center py-10 text-divineCream/40 text-sm border border-dashed border-divineLine2 rounded-2xl">Ingresa el código arriba o selecciona un pedido de la lista para generar su factura.</div>)}
              </div>
             )
            }
          </div>
        </motion.div>
      );
    }
  
    // =========================
    // Notificaciones Premium (Toasts)
    // =========================
    window.showToast = (msg, icon = '✨') => window.dispatchEvent(new CustomEvent('add-toast', { detail: { msg, icon } }));

    function ToastContainer() {
      const [toasts, setToasts] = useState([]);
      useEffect(() => {
        const handleToast = (e) => {
          const id = Date.now() + Math.random();
          setToasts(prev => [...prev, { id, ...e.detail }]);
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
        };
        window.addEventListener('add-toast', handleToast);
        return () => window.removeEventListener('add-toast', handleToast);
      }, []);

      return (
        <div className="fixed top-6 left-0 right-0 z-[100] flex flex-col items-center gap-2 pointer-events-none px-4">
          <AnimatePresence>
            {toasts.map(t => (
              <motion.div key={t.id} initial={{ opacity: 0, y: -30, scale: 0.8 }} animate={{ opacity: 1, y: 0, scale: 1 }} exit={{ opacity: 0, y: -20, scale: 0.8 }} className="bg-black/85 backdrop-blur-md border border-divineLine2 shadow-glow text-divineCream px-5 py-3 rounded-full text-[11px] sm:text-xs tracking-widest flex items-center gap-3">
                <span className="text-lg">{t.icon}</span> {t.msg}
              </motion.div>
            ))}
          </AnimatePresence>
        </div>
      );
    }

    // =========================
    // Pantalla de Carga de Lujo (Preloader)
    // =========================
    function Preloader({ onComplete }) {
      useEffect(() => {
        const t = setTimeout(onComplete, 2200); 
        return () => clearTimeout(t);
      }, [onComplete]);
      return (
        <motion.div initial={{ opacity: 1 }} exit={{ opacity: 0 }} transition={{ duration: 0.8, ease: "easeInOut" }} className="fixed inset-0 z-[200] bg-divineBg flex flex-col items-center justify-center">
          <div className="relative flex items-center justify-center">
            <motion.div animate={{ rotate: 360 }} transition={{ duration: 6, repeat: Infinity, ease: "linear" }} className="absolute -inset-6 rounded-full border border-dashed border-divineGold/30"></motion.div>
            <motion.div animate={{ rotate: -360 }} transition={{ duration: 10, repeat: Infinity, ease: "linear" }} className="absolute -inset-8 rounded-full border border-divineLine2/20"></motion.div>
            <motion.img initial={{ opacity: 0, scale: 0.7 }} animate={{ opacity: 1, scale: 1 }} transition={{ duration: 1 }} src={LOGO_LOCAL} onError={(e) => e.target.src=LOGO_REMOTE} className="w-20 h-20 object-contain rounded-2xl border border-divineLine2 p-2 shadow-glow relative z-10 bg-black/50 backdrop-blur" />
          </div>
          <motion.div initial={{ width: 0 }} animate={{ width: 140 }} transition={{ duration: 1.8, ease: "easeInOut" }} className="h-[2px] bg-divineGold mt-10 rounded-full shadow-glow"></motion.div>
          <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.6 }} className="mt-4 text-[10px] tracking-[0.4em] text-divineCream/50">PREPARANDO LA EXPERIENCIA</motion.div>
        </motion.div>
      );
    }

    // =========================
    // App Base (Con Inventario Sincronizado en la Nube)
    // =========================
    function App() {
      useSpotlight();
      const refs = { promos: useRef(null), burgers: useRef(null), desserts: useRef(null), yogurt: useRef(null), atelier: useRef(null) };
      const [activeBurger, setActiveBurger] = useState(null);
      const [cartOpen, setCartOpen] = useState(false);
      
      const [cartItems, setCartItems] = useState(() => {
        try { const guardado = localStorage.getItem('divinee_cart'); return guardado ? JSON.parse(guardado) : []; } catch (e) { return []; }
      });

      const [localBurgers, setLocalBurgers] = useState(DEFAULT_BURGERS);
      const [localDesserts, setLocalDesserts] = useState(DEFAULT_DESSERTS);
      const [localCatalog, setLocalCatalog] = useState(DEFAULT_CATALOG);

      const [bcvRate, setBcvRate] = useState(null);
      const [trackingModalOpen, setTrackingModalOpen] = useState(false);
      const [adminModalOpen, setAdminModalOpen] = useState(false);
      const [isAdminLogged, setIsAdminLogged] = useState(false);
      const [appLoaded, setAppLoaded] = useState(false);
      
      const [isStoreOpen, setIsStoreOpen] = useState(true);
      const [disabledItems, setDisabledItems] = useState([]);

      // Estado para Upsell
      const [showUpsell, setShowUpsell] = useState(false);
      const [pendingItem, setPendingItem] = useState(null);

      const cartCount = useMemo(() => cartItems.reduce((acc, it) => acc + it.qty, 0), [cartItems]);
      const cartTotal = useMemo(() => cartItems.reduce((acc, it) => acc + it.price * it.qty, 0), [cartItems]);

      const promos = useMemo(() => {
        return [
          ...localBurgers.filter(b => b.isPromo),
          ...localDesserts.filter(d => d.isPromo)
        ];
      }, [localBurgers, localDesserts]);

      useEffect(() => { localStorage.setItem('divinee_cart', JSON.stringify(cartItems)); }, [cartItems]);

      useEffect(() => {
        fetch("https://ve.dolarapi.com/v1/dolares/oficial").then(res => res.json()).then(data => setBcvRate(data.promedio)).catch(err => setBcvRate(60.00)); 
        
        const fetchGlobalData = async () => {
          if (window.supabaseClient) {
            const { data } = await window.supabaseClient.from('store_settings').select('is_open, catalog_data').eq('id', 'divinee').single();
            if (data) {
              setIsStoreOpen(data.is_open);
              if (data.catalog_data) {
                if (data.catalog_data.burgers) setLocalBurgers(data.catalog_data.burgers);
                if (data.catalog_data.desserts) setLocalDesserts(data.catalog_data.desserts);
                if (data.catalog_data.catalog) setLocalCatalog(data.catalog_data.catalog);
              }
            }
            const { data: invData } = await window.supabaseClient.from('disabled_ingredients').select('id');
            if (invData) setDisabledItems(invData.map(i => i.id));
          }
        };

        fetchGlobalData();
        const interval = setInterval(fetchGlobalData, 15000);
        return () => clearInterval(interval);
      }, []);

      const handleSaveInventory = async (newBurgers, newDesserts, newCatalog) => {
        setLocalBurgers(newBurgers); setLocalDesserts(newDesserts); setLocalCatalog(newCatalog);
        
        if (window.supabaseClient) {
          const { error } = await window.supabaseClient.from('store_settings').update({
            catalog_data: { burgers: newBurgers, desserts: newDesserts, catalog: newCatalog }
          }).eq('id', 'divinee');
          
          if (error) {
            window.showToast("Error guardando en la nube", "⚠️");
            console.error(error);
          } else {
            window.showToast("Menú sincronizado en la nube", "☁️");
          }
        }
      };

      const handleAddNewProduct = (newItemData) => {
        let newBurgers = [...localBurgers];
        let newDesserts = [...localDesserts];
        let newCatalog = { ...localCatalog };

        const newId = newItemData.name.toLowerCase().replace(/[^a-z0-9]/g, '-') + '-' + Math.floor(Math.random()*1000);
        
        const baseItem = {
          id: newId,
          name: newItemData.name,
          price: Number(newItemData.price),
          cost: Number(newItemData.cost)
        };

        if (newItemData.type === 'burger') {
          newBurgers.push({
            ...baseItem,
            description: newItemData.description || "Nueva creación exclusiva de la casa.",
            img: newItemData.img || "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=800&q=80",
            grams: 150,
            ingredientIds: newItemData.ingredientIds || [],
            ingredients: newItemData.ingredients || [],
            isPromo: newItemData.isPromo || false,
            config: [{type:"bunBottom"},{type:"meat"},{type:"generic"},{type:"bunTop"}]
          });
        } else if (newItemData.type === 'dessert') {
          newDesserts.push({
            ...baseItem,
            description: newItemData.description || "Nueva delicia de nuestra patisserie.",
            img: newItemData.img || "https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=800&q=80",
            isPromo: newItemData.isPromo || false
          });
        } else if (newItemData.type === 'catalog') {
          baseItem.note = "Añadido recientemente";
          baseItem.group = newItemData.group === 'toppings' ? 'Extra' : undefined;
          if (!newCatalog[newItemData.group]) newCatalog[newItemData.group] = [];
          newCatalog[newItemData.group].push(baseItem);
        }

        handleSaveInventory(newBurgers, newDesserts, newCatalog);
      };

      function scrollTo(key) { refs[key]?.current?.scrollIntoView({ behavior: "smooth", block: "start" }); }
      
      // Añadir al carrito modificado con Upsell
      function handleInitialAddToCart(item, isBurger = true) {
        if (!isStoreOpen) { window.showToast("CERRADO POR HOY 🚫", '🚫'); return; }
        if (disabledItems.includes(item.id)) { window.showToast("Este producto está agotado 🚫", '🚫'); return; }

        if (isBurger) {
          setPendingItem(item);
          setShowUpsell(true);
        } else {
          addToCart(item);
        }
      }

      function addToCart(item) {
        window.showToast(`${item.name} añadido`, '🍔');
        setCartItems((prev) => {
          const idx = prev.findIndex((p) => p.id === item.id);
          if (idx >= 0) { const copy = [...prev]; copy[idx] = { ...copy[idx], qty: copy[idx].qty + 1 }; return copy; }
          return [...prev, { ...item, qty: 1 }];
        });
      }

      function processUpsell(addPapas, papaObj) {
        addToCart(pendingItem);
        if (addPapas && papaObj) {
           setTimeout(() => addToCart(papaObj), 400); // Añadir papas después con delay para visual
        }
        setShowUpsell(false);
        setPendingItem(null);
      }
      
      function updateQty(id, qty) { setCartItems((prev) => prev.map((p) => (p.id === id ? { ...p, qty } : p)).filter((p) => p.qty > 0)); }

      return (
        <div className="min-h-screen relative z-[1]">
          
          <AnimatePresence>
            {!isStoreOpen && (
              <motion.div initial={{ opacity: 0, y: -20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} className="bg-red-500/90 text-white text-center py-2 text-[10px] md:text-xs font-bold tracking-widest fixed top-0 w-full z-[300] backdrop-blur shadow-glow">
                LOCAL CERRADO POR EL MOMENTO - NO SE RECIBEN PEDIDOS
              </motion.div>
            )}
          </AnimatePresence>

          <ToastContainer />
          <AnimatePresence>{!appLoaded && <Preloader onComplete={() => setAppLoaded(true)} />}</AnimatePresence>
          <Header onNavigate={scrollTo} onOpenCart={() => setCartOpen(true)} cartCount={cartCount} onOpenAdmin={() => setAdminModalOpen(true)} />
          
          <main className="mx-auto max-w-6xl px-4 pb-28 pt-28 md:pt-28 md:px-6">
            <motion.section initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.6, ease: [0.2, 0.8, 0.2, 1] }} className="mb-8 md:mb-14">
              <div className="rounded-3xl hero-grid shadow-divine p-5 md:p-10 relative overflow-hidden">
                <div className="absolute inset-0 pointer-events-none">
                  {[...Array(8)].map((_, i) => (
                    <motion.div key={i} className="absolute w-1 h-1 bg-divineGold rounded-full shadow-glow blur-[1px]" animate={{ y: [0, -60, 0], opacity: [0, 0.8, 0], scale: [0.5, 1.5, 0.5] }} transition={{ duration: 4 + Math.random() * 3, repeat: Infinity, delay: Math.random() * 2 }} style={{ left: `${10 + Math.random() * 80}%`, top: `${20 + Math.random() * 60}%` }} />
                  ))}
                </div>
                <div className="relative z-10">
                  <div className="flex justify-between items-start"><p className="mb-3 text-xs tracking-[0.35em] text-divineGold/90">{BRAND_NAME.toUpperCase()} • GOURMET BAR</p>{bcvRate && <div className="text-[10px] tracking-[0.28em] text-divineCream/50 border border-divineLine2/30 rounded-full px-3 py-1 bg-black/40">TASA BCV: {bcvRate} Bs</div>}</div>
                  <h1 className="text-3xl font-semibold leading-tight md:text-6xl"><span className="bg-gradient-to-r from-divineCream via-divineCream to-divineGold bg-clip-text text-transparent">Hamburguesas, postres y yogurt griego</span> con estética de lujo.</h1>
                  <p className="mt-3 max-w-2xl text-sm text-divineCream/75 md:text-base">Explora el menú y arma tu burger con un configurador premium.</p>
                  <div className="mt-5 flex flex-col sm:flex-row flex-wrap gap-3">
                    <button className="btn-primary w-full sm:w-auto" onClick={() => scrollTo(promos.length > 0 ? "promos" : "burgers")} type="button">Explorar menú</button>
                    <button className="btn-ghost w-full sm:w-auto" onClick={() => setTrackingModalOpen(true)} type="button">Rastrear Pedido</button>
                  </div>
                </div>
              </div>
            </motion.section>
            
            {promos.length > 0 && (
              <section ref={refs.promos} className="scroll-mt-32 mb-10 md:mb-16 bg-divineGold/5 border border-divineGold/20 p-6 md:p-8 rounded-3xl shadow-promoglow">
                <SectionShell eyebrow="🌟 DESTACADO" title="Promociones Especiales" subtitle="Ofertas y novedades por tiempo limitado.">
                  <ProductShowcase items={promos} badge="PROMO" onOpen={setActiveBurger} onAdd={(item) => handleInitialAddToCart(item, !!item.config)} disabledItems={disabledItems} promoOnly={true} />
                </SectionShell>
              </section>
            )}

            <section ref={refs.burgers} className="scroll-mt-32"><SectionShell eyebrow="COLECCIÓN DIVINÉE" title="Hamburguesas" subtitle="Exquisito. Divino. Divinée🍔✨."><ProductShowcase items={localBurgers.filter(b=>!b.isPromo)} badge="VER 360°" onOpen={setActiveBurger} onAdd={(item) => handleInitialAddToCart(item, true)} disabledItems={disabledItems} /></SectionShell></section>
            <section ref={refs.desserts} className="scroll-mt-32"><SectionShell eyebrow="EXQUISITE DESSERTS" title="Postres" subtitle="Selección corta, elegante."><ProductShowcase items={localDesserts.filter(d=>!d.isPromo)} badge="PATISSERIE" onOpen={(p) => handleInitialAddToCart({ ...p, qty: 1 }, false)} onAdd={(item) => handleInitialAddToCart(item, false)} disabledItems={disabledItems} /></SectionShell></section>
            
            <section ref={refs.yogurt} className="scroll-mt-32"><SectionShell eyebrow="GREEK YOGURT DE MÁQUINA" title="Yogurt" subtitle="Sección desactivada temporalmente."><YogurtComingSoonCard /></SectionShell></section>
            <section ref={refs.atelier} className="scroll-mt-32"><SectionShell eyebrow="ATELIER" title="Arma tu Hamburguesa" subtitle="Configurador en vivo, agrega ingredientes y verás cómo caen."><BurgerBuilder onAddToCart={handleInitialAddToCart} catalog={localCatalog} /></SectionShell></section>
          </main>

          <div className="md:hidden"><CartButton cartCount={cartCount} onClick={() => setCartOpen(true)} /></div>
          
          <a href="https://wa.me/584126835635?text=Hola%20Divin%C3%A9e%2C%20tengo%20una%20duda%20con%20mi%20pedido..." target="_blank" rel="noopener noreferrer" className="fixed z-40 bottom-[calc(1.1rem+env(safe-area-inset-bottom))] left-[calc(1.1rem+env(safe-area-inset-left))] rounded-2xl border border-[#25D366]/50 bg-black/60 px-4 py-3 shadow-glow backdrop-blur hover:bg-[#25D366]/20 transition flex items-center gap-3"><span className="text-xl leading-none">💬</span><span className="text-xs tracking-[0.2em] text-[#25D366] font-semibold hidden sm:inline">AYUDA</span></a>
          
          <AnimatePresence>{showUpsell && <UpsellModal product={pendingItem} catalog={localCatalog} onAccept={(papaObj) => processUpsell(true, papaObj)} onDecline={() => processUpsell(false)} />}</AnimatePresence>
          <AnimatePresence>{cartOpen && <CartDrawer items={cartItems} total={cartTotal} bcvRate={bcvRate} catalog={localCatalog} onClose={() => setCartOpen(false)} onQty={updateQty} onClearCart={() => setCartItems([])} />}</AnimatePresence>
          <AnimatePresence>{!!activeBurger && <ProductModal product={activeBurger} onClose={() => setActiveBurger(null)} onAdd={() => handleInitialAddToCart({ ...activeBurger, cost: activeBurger.cost }, true)} />}</AnimatePresence>
          <AnimatePresence>{trackingModalOpen && <TrackingModal onClose={() => setTrackingModalOpen(false)} supabaseClient={window.supabaseClient} />}</AnimatePresence>
          <AnimatePresence>
            {adminModalOpen && !isAdminLogged && <AdminLogin onLogin={() => setIsAdminLogged(true)} onClose={() => setAdminModalOpen(false)} />}
            {adminModalOpen && isAdminLogged && <AdminDashboard supabaseClient={window.supabaseClient} onClose={() => setAdminModalOpen(false)} localBurgers={localBurgers} localDesserts={localDesserts} localCatalog={localCatalog} onSaveInventory={handleSaveInventory} onAddProduct={handleAddNewProduct} />}
          </AnimatePresence>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById("root")); root.render(<App />);
  </script>
</body>
</html>
