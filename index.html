Name="uppercase">{invoiceOrder.payment_ref}</span></div></div><div className="text-center text-xs text-gray-600 font-bold space-y-1"><p>¡GRACIAS POR SU COMPRA!</p><p>Exquisito. Divino. Divinée🍔✨</p></div></div><button onClick={handlePrintTicket} className="mt-8 w-full bg-black text-white py-4 rounded-xl font-sans font-bold tracking-widest hover:bg-gray-800 transition shadow-lg">🖨️ IMPRIMIR TICKET</button></>
                ) : (<div className="text-center py-10 text-divineCream/40 text-sm border border-dashed border-divineLine2 rounded-2xl">Ingresa el código arriba o selecciona un pedido de la lista para generar su factura.</div>)}
              </div>
             ) : tab === 'finance' ? (
                (() => {
                   const activeFin = financeOrders.filter(o => o.status !== 'Cancelado');
                   const finIngresos = activeFin.reduce((acc, o) => acc + (o.total_usd || 0), 0);
                   let finCostos = 0;
                   activeFin.forEach(o => { (o.items || []).forEach(it => { finCostos += (it.cost || 0) * (it.qty || 1); }); });
                   const finGanancia = finIngresos - finCostos;

                   return (
                     <div className="max-w-4xl mx-auto space-y-6">
                       <div className="flex flex-col md:flex-row justify-between items-center bg-[#060A17] border border-divineLine2 rounded-2xl p-5 shadow-glow gap-4">
                          <div>
                            <h3 className="text-sm tracking-[0.2em] text-divineGold font-bold mb-1">REPORTE FINANCIERO</h3>
                            <p className="text-xs text-divineCream/60">Selecciona una fecha para ver el balance y las órdenes.</p>
                          </div>
                          <input type="date" value={financeDate} onChange={(e) => setFinanceDate(e.target.value)} className="bg-[#0A1128] border border-divineLine2 rounded-xl px-4 py-3 text-white focus:border-[#25D366] outline-none font-bold" />
                       </div>

                       {financeLoading ? <div className="text-center py-10 text-divineCream/50">Calculando finanzas...</div> : (
                         <>
                           <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                             <div className="bg-[#0A1128] border border-divineLine2/50 rounded-2xl p-6 shadow-inner text-center">
                               <div className="text-[10px] tracking-[0.2em] text-divineCream/50 mb-2">INGRESOS BRUTOS</div>
                               <div className="text-3xl font-black text-white">{money(finIngresos)}</div>
                               <div className="text-xs text-divineCream/40 mt-1">{activeFin.length} pedidos completados</div>
                             </div>
                             <div className="bg-[#0A1128] border border-red-500/20 rounded-2xl p-6 shadow-inner text-center">
                               <div className="text-[10px] tracking-[0.2em] text-red-400/70 mb-2">COSTO INGREDIENTES</div>
                               <div className="text-3xl font-black text-red-400">{money(finCostos)}</div>
                               <div className="text-xs text-divineCream/40 mt-1">Gastos operativos del día</div>
                             </div>
                             <div className="bg-[#0A1128] border border-[#25D366]/40 rounded-2xl p-6 shadow-[0_0_20px_rgba(37,211,102,0.1)] text-center">
                               <div className="text-[10px] tracking-[0.2em] text-[#25D366] mb-2">GANANCIA NETA</div>
                               <div className="text-3xl font-black text-[#25D366]">{money(finGanancia)}</div>
                               <div className="text-xs text-[#25D366]/50 mt-1">Margen de beneficio real</div>
                             </div>
                           </div>

                           <div className="bg-[#060A17] border border-divineLine2 rounded-2xl p-6 shadow-divine">
                              <div className="flex justify-between items-center mb-4 border-b border-divineLine2/30 pb-3">
                                <h3 className="text-xs tracking-[0.2em] text-divineGold font-bold">DESGLOSE DE PEDIDOS ({financeOrders.length})</h3>
                              </div>
                              {financeOrders.length === 0 ? <div className="text-center py-6 text-divineCream/40 text-sm">No hay registros para este día.</div> : (
                                <div className="space-y-2 max-h-96 overflow-y-auto pr-2 scroll-smooth-ios">
                                  {financeOrders.map(o => {
                                     let c = 0; (o.items||[]).forEach(i => c += (i.cost||0)*i.qty);
                                     return (
                                       <div key={o.id} className={`flex justify-between items-center p-3 rounded-xl border ${o.status === 'Cancelado' ? 'border-red-500/20 bg-red-500/5 opacity-60' : 'border-divineLine2/50 bg-black/40'}`}>
                                          <div>
                                            <div className="text-sm font-bold text-white">{o.tracking_code} - {o.customer_name}</div>
                                            <div className="text-[10px] text-divineCream/50 mt-0.5">{o.status} • {o.items?.length} items</div>
                                          </div>
                                          <div className="text-right">
                                            <div className={`text-sm font-black ${o.status === 'Cancelado' ? 'text-red-400 line-through' : 'text-[#25D366]'}`}>{money(o.total_usd)}</div>
                                            {o.status !== 'Cancelado' && <div className="text-[9px] text-divineCream/40">Costo: {money(c)}</div>}
                                          </div>
                                       </div>
                                     )
                                  })}
                                </div>
                              )}
                           </div>

                           <div className="pt-6 border-t border-divineLine2/30 mt-6">
                              <div className="bg-red-500/10 border border-red-500/30 rounded-2xl p-5 flex flex-col sm:flex-row justify-between items-center gap-4">
                                 <div>
                                   <h4 className="text-sm font-bold text-red-400">Zona de Peligro: Limpiar Día</h4>
                                   <p className="text-xs text-red-400/70 mt-1">Borra de la base de datos TODOS los pedidos de la fecha seleccionada. Ideal para eliminar pruebas.</p>
                                 </div>
                                 <button onClick={handleResetDay} className="shrink-0 bg-red-500 text-white font-black text-xs tracking-widest px-6 py-3 rounded-xl hover:bg-red-600 transition shadow-[0_0_15px_rgba(239,68,68,0.4)]">
                                   🗑️ RESETEAR CONTABILIDAD
                                 </button>
                              </div>
                           </div>
                         </>
                       )}
                     </div>
                   );
                })()
             ) : null
            }
          </div>
        </motion.div>
      );
    }
  
    // =========================
    // Notificaciones Premium (Toasts)
    // =========================
    window.showToast = (msg, icon = '✨') => window.dispatchEvent(new CustomEvent('add-toast', { detail: { msg, icon } }));

    function ToastContainer() {
      const [toasts, setToasts] = useState([]);
      useEffect(() => {
        const handleToast = (e) => {
          const id = Date.now() + Math.random();
          setToasts(prev => [...prev, { id, ...e.detail }]);
          setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
        };
        window.addEventListener('add-toast', handleToast);
        return () => window.removeEventListener('add-toast', handleToast);
      }, []);

      return (
        <div className="fixed top-6 left-0 right-0 z-[100] flex flex-col items-center gap-2 pointer-events-none px-4">
          <AnimatePresence>
            {toasts.map(t => (
              <motion.div key={t.id} initial={{ opacity: 0, y: -30, scale: 0.8 }} animate={{ opacity: 1, y: 0, scale: 1 }} exit={{ opacity: 0, y: -20, scale: 0.8 }} className="bg-[#060A17]/90 backdrop-blur-md border-2 border-divineLine2 shadow-glow text-divineCream px-5 py-4 rounded-full text-xs font-bold sm:text-sm tracking-widest flex items-center gap-3">
                <span className="text-xl">{t.icon}</span> {t.msg}
              </motion.div>
            ))}
          </AnimatePresence>
        </div>
      );
    }

    // =========================
    // Sistema de Lealtad VIP (Ruleta Animada, Inventario y Canjes)
    // =========================
    function RewardsModal({ supabaseClient, catalog, cartItems, onAddToCart }) {
      const [isOpen, setIsOpen] = useState(false);
      const [step, setStep] = useState('login'); 
      const [phone, setPhone] = useState('');
      const [clientData, setClientData] = useState(null);
      const [loading, setLoading] = useState(false);
      const [lastOrder, setLastOrder] = useState(null);
      
      // Estados de la Ruleta
      const [spinning, setSpinning] = useState(false);
      const [spinResult, setSpinResult] = useState(null);
      const [wheelRotation, setWheelRotation] = useState(0);

      // Configuración Dinámica de Lealtad (Lee del Admin o usa por defecto)
      const loyaltySettings = catalog?.settings?.loyalty || {
        rate: 10,
        roulette: [10, 20, 50, 100, 200, 500],
        catalog: [
          { id: "r-papas", name: "🍟 Papas Fritas Extra", cost: 200, type: "side", price: 0 },
          { id: "r-bebida", name: "🥤 Bebida Gratis", cost: 300, type: "drink", price: 0 },
          { id: "r-burger", name: "🍔 Burger Clásica", cost: 850, type: "burger", price: 0 }
        ]
      };

      const wheelColors = ['#fcd535', '#741bd1', '#25D366', '#e63946', '#3a86ff', '#f4a261', '#ff006e', '#00b4d8'];

      useEffect(() => {
        const onOpen = () => setIsOpen(true);
        window.addEventListener('open-rewards', onOpen);
        return () => window.removeEventListener('open-rewards', onOpen);
      }, []);

      const handleLogin = async () => {
        let cleanPhone = phone.replace(/\D/g, '');
        if (cleanPhone.length < 10) { window.showToast("Ingresa un número válido", "⚠️"); return; }
        
        setLoading(true);
        const { data, error } = await supabaseClient.from('clientes').select('*').eq('telefono', cleanPhone).single();
        
        if (data) {
          if(!data.inventario) data.inventario = [];
          setClientData(data);
          setStep('dashboard');
          // Buscar último pedido para el Re-order
          const { data: lastO } = await supabaseClient.from('orders').select('*').eq('phone', cleanPhone).order('created_at', { ascending: false }).limit(1).single();
          if (lastO) setLastOrder(lastO);
        } else {
          window.showToast("Aún no tienes tokens. ¡Haz tu primera compra para empezar!", "💡");
        }
        setLoading(false);
      };

      const handleSpin = async () => {
        if (spinning || !clientData) return;
        
        const today = new Date().toISOString().split('T')[0];
        const lastSpin = clientData.ultimo_giro ? clientData.ultimo_giro.split('T')[0] : null;
        
        if (lastSpin === today) { window.showToast("Ya giraste hoy. ¡Vuelve mañana!", "⏳"); return; }

        setSpinning(true); setSpinResult(null);
        
        const prizes = loyaltySettings.roulette;
        // Probabilidad ponderada (Premios bajos salen más)
        const rand = Math.random();
        let prizeIndex = 0;
        if (rand > 0.4) prizeIndex = 1;
        if (rand > 0.7) prizeIndex = 2;
        if (rand > 0.85) prizeIndex = 3;
        if (rand > 0.95 && prizes.length > 4) prizeIndex = 4;
        if (rand > 0.99 && prizes.length > 5) prizeIndex = 5;
        
        if (prizeIndex >= prizes.length) prizeIndex = prizes.length - 1;
        const won = prizes[prizeIndex];

        // Animación de la ruleta (giros extra + posición del premio)
        const sliceAngle = 360 / prizes.length;
        const targetAngle = 360 - (prizeIndex * sliceAngle) - (sliceAngle / 2);
        const spins = 5 * 360; 
        const totalRotation = wheelRotation + spins + targetAngle - (wheelRotation % 360);

        setWheelRotation(totalRotation);
        
        setTimeout(async () => {
          const newTotal = clientData.tokens + Number(won);
          await supabaseClient.from('clientes').update({ tokens: newTotal, ultimo_giro: new Date().toISOString() }).eq('telefono', clientData.telefono);
          setClientData({...clientData, tokens: newTotal, ultimo_giro: new Date().toISOString()});
          setSpinResult(won);
          setSpinning(false);
          window.showToast(`¡Ganaste ${won} Divi-Tokens!`, "🎉");
        }, 4000); // 4 segundos de giro
      };

      const handleRedeem = async (item) => {
        if (clientData.tokens < item.cost) { window.showToast("Tokens insuficientes", "⚠️"); return; }
        setLoading(true);
        const newTokens = clientData.tokens - item.cost;
        const rewardInstance = { ...item, instanceId: Date.now() };
        const newInv = [...(clientData.inventario || []), rewardInstance];
        
        await supabaseClient.from('clientes').update({tokens: newTokens, inventario: newInv}).eq('telefono', clientData.telefono);
        setClientData({...clientData, tokens: newTokens, inventario: newInv});
        window.showToast(`${item.name} guardado en tu inventario`, "🎁");
        setLoading(false);
      };

      const handleUseReward = async (item) => {
        let discountValue = 0;
        // Magia para Descuentos: Si el nombre dice "Descuento 5" o "Descuento $10", lo detecta y lo vuelve negativo.
        if (item.name.toUpperCase().includes('DESCUENTO')) {
           const match = item.name.match(/\d+/);
           if (match) discountValue = -Number(match[0]);
        }

        onAddToCart({ 
          ...item, 
          id: item.instanceId, 
          name: `🎁 ${item.name}`, 
          price: discountValue, 
          isReward: true,
          instanceId: item.instanceId
        });
        
        setIsOpen(false);
        window.showToast("Añadido al carrito. No se descontará hasta pagar.", "🛒");
      };

      if (!isOpen) return null;

      // Dibujar la ruleta visualmente
      const sliceAngle = 360 / loyaltySettings.roulette.length;
      let conicString = [];
      loyaltySettings.roulette.forEach((p, i) => {
        const color = wheelColors[i % wheelColors.length];
        conicString.push(`${color} ${i * sliceAngle}deg ${(i + 1) * sliceAngle}deg`);
      });

      return (
        <BottomSheet title="CLUB DIVINÉE" subtitle={step === 'login' ? "Tus Recompensas" : `Hola, ${clientData?.nombre.split(' ')[0]}`} onClose={() => {setIsOpen(false); setStep('login'); setPhone(''); setSpinResult(null);}}>
          {step === 'login' ? (
            <div className="space-y-5 text-center py-4">
              <div className="text-6xl mb-2">🎁</div>
              <p className="text-sm text-divineCream/80 font-medium">Ingresa tu número de teléfono para acceder a tus Divi-Tokens, jugar a la ruleta y canjear premios.</p>
              <input type="tel" value={phone} onChange={(e) => setPhone(e.target.value)} placeholder="Ej: 04121234567" className="w-full bg-[#060A17] border-2 border-divineLine2 rounded-xl px-5 py-4 text-xl font-bold text-divineCream outline-none focus:border-divineGold transition tracking-widest text-center" />
              <button onClick={handleLogin} disabled={loading} className="w-full btn-primary py-4 text-sm font-bold shadow-glow">{loading ? "BUSCANDO..." : "VER MI BÓVEDA"}</button>
            </div>
          ) : (
            <div className="space-y-8">
              
              {/* Saldo y Tasa Dinámica */}
              <div className="bg-gradient-to-br from-divineGold/20 to-[#0A1128] border-2 border-divineGold/50 rounded-3xl p-6 text-center shadow-promoglow relative overflow-hidden">
                <div className="text-xs font-bold tracking-[0.3em] text-divineGold mb-1">SALDO ACTUAL</div>
                <div className="text-5xl font-black text-white drop-shadow-lg">{clientData.tokens} <span className="text-lg text-divineGold/80">DT</span></div>
                <p className="text-[10px] text-divineCream/60 mt-2 uppercase tracking-widest">Ganas {loyaltySettings.rate} DT por cada $1 de compra</p>
              </div>
              {lastOrder && (
                <div className="bg-divineGold/5 border border-divineGold/30 rounded-3xl p-5 mb-6 shadow-inner">
                  <h4 className="text-[10px] font-bold tracking-[0.2em] text-divineGold mb-3 uppercase">Pedir lo mismo de siempre</h4>
                  <div className="flex flex-col gap-1 mb-4">
                    {lastOrder.items.map((it, idx) => (
                      <div key={idx} className="text-xs text-divineCream/70 font-medium">
                        • {it.qty}x {it.name}
                      </div>
                    ))}
                  </div>
                  <button 
                    onClick={() => {
                      lastOrder.items.forEach(it => onAddToCart(it, it.name.toLowerCase().includes('hamburguesa')));
                      setIsOpen(false);
                      window.showToast("¡Pedido anterior cargated!", "🍔");
                    }}
                    className="w-full py-3 bg-divineGold text-black rounded-xl font-black text-[10px] tracking-widest hover:brightness-110 transition"
                  >
                    REPETIR ÚLTIMA ORDEN
                  </button>
                </div>
              )}

              {/* Inventario de Premios Guardados */}
              {clientData.inventario && clientData.inventario.length > 0 && (
                <div className="bg-[#0A1128] border border-[#25D366]/40 rounded-3xl p-5 shadow-[0_0_15px_rgba(37,211,102,0.15)]">
                  <h4 className="text-xs font-bold tracking-[0.2em] text-[#25D366] mb-3 uppercase">Tu Inventario (Listos para usar)</h4>
                  <div className="space-y-2">
                    {clientData.inventario.filter(item => !(cartItems || []).some(c => c.instanceId === item.instanceId)).map((item, idx) => (
                      <div key={idx} className="flex items-center justify-between bg-black/50 border border-divineLine2 rounded-xl p-3">
                        <span className="text-sm font-bold text-white">{item.name}</span>
                        <button onClick={() => handleUseReward(item)} disabled={loading} className="text-[10px] font-black bg-[#25D366] text-[#0A1128] px-4 py-2 rounded-lg hover:brightness-110 transition shadow-glow">USAR AHORA</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Ruleta Animada Dinámica */}
              <div className="bg-[#060A17] border-2 border-purple-500/40 rounded-3xl p-6 text-center relative overflow-hidden flex flex-col items-center">
                 <h4 className="text-sm font-bold tracking-[0.2em] text-purple-400 mb-2 z-10">🎰 RULETA DIARIA</h4>
                 <p className="text-xs text-divineCream/70 mb-6 z-10">Gira gratis 1 vez al día.</p>
                 
                 <div className="relative w-48 h-48 mb-6">
                    {/* Flecha indicadora */}
                    <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 w-0 h-0 border-l-[10px] border-r-[10px] border-t-[20px] border-transparent border-t-white z-20 drop-shadow-md"></div>
                    
                    {/* Rueda giratoria */}
                    <div className="w-full h-full rounded-full border-4 border-[#0A1128] shadow-glow overflow-hidden relative" style={{ background: `conic-gradient(${conicString.join(', ')})`, transform: `rotate(${wheelRotation}deg)`, transition: spinning ? 'transform 4s cubic-bezier(0.15, 0.85, 0.15, 1)' : 'none' }}>
                      {/* Textos dentro de la rueda */}
                      {loyaltySettings.roulette.map((prize, i) => {
                        const rot = (i * sliceAngle) + (sliceAngle / 2);
                        return (
                          <div key={i} className="absolute inset-0 flex items-start justify-center pt-4" style={{ transform: `rotate(${rot}deg)` }}>
                            <span className="text-white font-black text-lg drop-shadow-md" style={{ writingMode: 'vertical-rl', transform: 'rotate(180deg)' }}>{prize}</span>
                          </div>
                        )
                      })}
                    </div>
                 </div>

                 {spinResult ? (
                   <div className="py-2 px-6 bg-purple-500/20 rounded-xl border border-purple-500/50 z-10 animate-pulse">
                     <div className="text-base font-black text-white">¡GANASTE {spinResult} DT!</div>
                   </div>
                 ) : (
                   <button onClick={handleSpin} disabled={spinning} className={`w-full py-4 rounded-xl font-black text-sm tracking-widest transition z-10 ${spinning ? 'bg-gray-600 text-gray-400' : 'bg-gradient-to-r from-purple-600 to-indigo-600 text-white shadow-[0_0_20px_rgba(147,51,234,0.4)] hover:brightness-110'}`}>
                     {spinning ? "GIRANDO..." : "GIRAR RULETA"}
                   </button>
                 )}
              </div>

              {/* Catálogo de Canje Dinámico */}
              <div>
                <h4 className="text-xs font-bold tracking-[0.2em] text-divineGold mb-3 uppercase">Tienda de Canje</h4>
                <div className="space-y-3">
                  {loyaltySettings.catalog.map((item, i) => (
                    <div key={i} className="flex items-center justify-between bg-black/40 border border-divineLine2 rounded-xl p-3">
                      <div className="flex flex-col">
                        <span className="text-sm font-bold text-divineCream">{item.name}</span>
                        <span className="text-xs text-divineGold font-bold">{item.cost} DT</span>
                      </div>
                      <button onClick={() => handleRedeem(item)} disabled={loading} className="text-[10px] font-black tracking-widest bg-divineGold/10 border border-divineGold/40 text-divineGold px-4 py-2 rounded-lg hover:bg-divineGold hover:text-[#0A1128] transition">CANJEAR</button>
                    </div>
                  ))}
                </div>
              </div>

            </div>
          )}
        </BottomSheet>
      );
    }
    // =========================
    // Tutorial Rápido para Nuevos Clientes
    // =========================
    function TutorialModal() {
      const [isOpen, setIsOpen] = useState(false);

      useEffect(() => {
        const onOpen = () => setIsOpen(true);
        window.addEventListener('open-tutorial', onOpen);
        
        // Auto-abrir la primera vez que un cliente entra a la página
        if (!localStorage.getItem('divinee_tutorial_seen')) { 
          // Le damos un pequeño retraso de 2.5 segundos para que termine de cargar la animación inicial
          setTimeout(() => {
            setIsOpen(true); 
            localStorage.setItem('divinee_tutorial_seen', 'true'); 
          }, 2500);
        }
        
        return () => window.removeEventListener('open-tutorial', onOpen);
      }, []);

      if (!isOpen) return null;

      return (
        <BottomSheet title="GUÍA RÁPIDA" subtitle="¿Cómo hago mi pedido?" onClose={() => setIsOpen(false)}>
          <div className="space-y-6 text-divineCream">
            
            <div className="flex gap-4 items-start">
              <div className="w-10 h-10 rounded-full bg-divineGold text-[#0A1128] font-black text-xl flex items-center justify-center shrink-0">1</div>
              <div>
                <h4 className="font-bold text-lg text-divineGold">Elige tus productos</h4>
                <p className="text-sm mt-1 text-divineCream/80 leading-relaxed">Toca cualquier hamburguesa, bebida o postre. Si es una hamburguesa mixta o un refresco, te pediremos que elijas el sabor o las carnes antes de agregarlo al carrito.</p>
              </div>
            </div>

            <div className="flex gap-4 items-start">
              <div className="w-10 h-10 rounded-full bg-divineGold text-[#0A1128] font-black text-xl flex items-center justify-center shrink-0">2</div>
              <div>
                <h4 className="font-bold text-lg text-divineGold">Abre el Carrito</h4>
                <p className="text-sm mt-1 text-divineCream/80 leading-relaxed">Cuando estés listo, toca el botón gigante en la parte de abajo que dice "VER MI PEDIDO". Ahí verás el total exacto.</p>
              </div>
            </div>

            <div className="flex gap-4 items-start">
              <div className="w-10 h-10 rounded-full bg-divineGold text-[#0A1128] font-black text-xl flex items-center justify-center shrink-0">3</div>
              <div>
                <h4 className="font-bold text-lg text-divineGold">Ingresa tus datos y Paga</h4>
                <p className="text-sm mt-1 text-divineCream/80 leading-relaxed">Te pediremos tu nombre, a dónde enviarlo (o si lo retiras en el local) y cómo quieres pagar (Pago Móvil, Zelle o Binance). ¡Copia nuestros datos, haz el pago, adjunta el capture y listo!</p>
              </div>
            </div>

            <div className="bg-[#060A17] p-5 rounded-2xl border-2 border-divineLine2 text-center mt-4">
               <p className="text-sm font-bold text-divineCream/90 mb-3">Si te equivocas o necesitas ayuda, el botón de "SOPORTE" abajo a la izquierda te comunica directo con nosotros.</p>
               <button onClick={() => setIsOpen(false)} className="btn-primary w-full py-4 text-sm font-bold shadow-glow">¡ENTENDIDO, A PEDIR!</button>
            </div>
          </div>
        </BottomSheet>
      );
    }
    // =========================
    // Pantalla de Carga de Lujo (Preloader)
    // =========================
    function Preloader({ onComplete }) {
      useEffect(() => {
        // Reducimos el tiempo de espera de 2.2 segundos a 1 segundo
        const t = setTimeout(onComplete, 1000); 
        return () => clearTimeout(t);
      }, [onComplete]);
      return (
        <motion.div initial={{ opacity: 1 }} exit={{ opacity: 0 }} transition={{ duration: 0.8, ease: "easeInOut" }} className="fixed inset-0 z-[200] bg-divineBg flex flex-col items-center justify-center">
          <div className="relative flex items-center justify-center">
            <motion.div animate={{ rotate: 360 }} transition={{ duration: 6, repeat: Infinity, ease: "linear" }} className="absolute -inset-6 rounded-full border-2 border-dashed border-divineGold/40"></motion.div>
            <motion.div animate={{ rotate: -360 }} transition={{ duration: 10, repeat: Infinity, ease: "linear" }} className="absolute -inset-8 rounded-full border-2 border-divineLine2/30"></motion.div>
            <motion.img initial={{ opacity: 0, scale: 0.7 }} animate={{ opacity: 1, scale: 1 }} transition={{ duration: 1 }} src={LOGO_LOCAL} onError={(e) => e.target.src=LOGO_REMOTE} className="w-24 h-24 object-contain rounded-full border-2 border-divineLine2 p-2 shadow-glow relative z-10 bg-[#0A1128]/80 backdrop-blur" />
          </div>
          <motion.div initial={{ width: 0 }} animate={{ width: 140 }} transition={{ duration: 1.8, ease: "easeInOut" }} className="h-[3px] bg-divineGold mt-12 rounded-full shadow-glow"></motion.div>
          <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} transition={{ delay: 0.6 }} className="mt-4 text-xs font-bold tracking-[0.4em] text-divineCream/60">PREPARANDO LA EXPERIENCIA</motion.div>
        </motion.div>
      );
    }

    // =========================
    // App Base (Con Inventario Sincronizado en la Nube)
    // =========================
    function App() {
      useSpotlight();
      const refs = { promos: useRef(null), burgers: useRef(null), drinks: useRef(null), desserts: useRef(null), yogurt: useRef(null), atelier: useRef(null) };
      const [activeBurger, setActiveBurger] = useState(null);
      const [cartOpen, setCartOpen] = useState(false);
      
      const [cartItems, setCartItems] = useState(() => {
        try { const guardado = localStorage.getItem('divinee_cart'); return guardado ? JSON.parse(guardado) : []; } catch (e) { return []; }
      });

      const [localBurgers, setLocalBurgers] = useState(DEFAULT_BURGERS);
      const [localDesserts, setLocalDesserts] = useState(DEFAULT_DESSERTS);
      const [localDrinks, setLocalDrinks] = useState(DEFAULT_DRINKS);
      const [localCatalog, setLocalCatalog] = useState(DEFAULT_CATALOG);

      const [bcvRate, setBcvRate] = useState(null);
      const [trackingModalOpen, setTrackingModalOpen] = useState(false);
      const [adminModalOpen, setAdminModalOpen] = useState(false);
      const [isAdminLogged, setIsAdminLogged] = useState(false);
      const [appLoaded, setAppLoaded] = useState(false);
      
      const [isStoreOpen, setIsStoreOpen] = useState(true);
      const [disabledItems, setDisabledItems] = useState([]);

      // Estado para Upsell
      const [showUpsell, setShowUpsell] = useState(false);
      const [pendingItem, setPendingItem] = useState(null);

      const cartCount = useMemo(() => cartItems.reduce((acc, it) => acc + it.qty, 0), [cartItems]);
      const cartTotal = useMemo(() => cartItems.reduce((acc, it) => acc + it.price * it.qty, 0), [cartItems]);

      const promos = useMemo(() => {
        return [
          ...localBurgers.filter(b => b.isPromo),
          ...localDrinks.filter(dr => dr.isPromo),
          ...localDesserts.filter(d => d.isPromo)
        ];
      }, [localBurgers, localDesserts, localDrinks]);

      useEffect(() => { localStorage.setItem('divinee_cart', JSON.stringify(cartItems)); }, [cartItems]);

      useEffect(() => {
        fetch("https://ve.dolarapi.com/v1/dolares/oficial").then(res => res.json()).then(data => setBcvRate(data.promedio)).catch(err => setBcvRate(60.00)); 
        
        const fetchGlobalData = async () => {
          if (supabaseClient) {
            const { data } = await supabaseClient.from('store_settings').select('is_open, catalog_data, settings_v2').eq('id', 'divinee').single();
            if (data) {
              // Lógica de Horario Inteligente
              const config = data.settings_v2?.horario;
              if (config?.activo) {
                const ahora = new Date();
                const horaActual = ahora.getHours() + ":" + ahora.getMinutes().toString().padStart(2, '0');
                const estaAbierto = horaActual >= config.apertura && horaActual <= config.cierre;
                setIsStoreOpen(estaAbierto);
              } else {
                setIsStoreOpen(data.is_open);
              }

              if (data.catalog_data) {
                if (data.catalog_data.burgers) setLocalBurgers(data.catalog_data.burgers);
                if (data.catalog_data.desserts) setLocalDesserts(data.catalog_data.desserts);
                if (data.catalog_data.drinks) setLocalDrinks(data.catalog_data.drinks);
                if (data.catalog_data.catalog) {
                   const loadedCatalog = data.catalog_data.catalog;
                   if (!loadedCatalog.settings) loadedCatalog.settings = DEFAULT_CATALOG.settings;
                   // Inyectamos los settings_v2 para que estén disponibles en toda la app
                   loadedCatalog.settings_v2 = data.settings_v2;
                   setLocalCatalog(loadedCatalog);
                }
              }
            }
            const { data: invData } = await supabaseClient.from('disabled_ingredients').select('id');
            if (invData) setDisabledItems(invData.map(i => i.id));
          }
        };

        fetchGlobalData();
        const interval = setInterval(fetchGlobalData, 15000);
        return () => clearInterval(interval);
      }, []);

      const handleSaveInventory = async (newBurgers, newDesserts, newDrinks, newCatalog) => {
        setLocalBurgers(newBurgers); setLocalDesserts(newDesserts); setLocalDrinks(newDrinks); setLocalCatalog(newCatalog);
        
        if (supabaseClient) {
          const { error } = await supabaseClient.from('store_settings').update({
            catalog_data: { burgers: newBurgers, desserts: newDesserts, drinks: newDrinks, catalog: newCatalog }
          }).eq('id', 'divinee');
          
          if (error) {
            window.showToast("Error guardando en la nube", "⚠️");
            console.error(error);
          } else {
            window.showToast("Menú sincronizado en la nube", "☁️");
          }
        }
      };

      const handleAddNewProduct = (newItemData) => {
        let newBurgers = [...localBurgers];
        let newDesserts = [...localDesserts];
        let newDrinks = [...localDrinks];
        let newCatalog = { ...localCatalog };

        const newId = newItemData.name.toLowerCase().replace(/[^a-z0-9]/g, '-') + '-' + Math.floor(Math.random()*1000);
        
        const baseItem = {
          id: newId,
          name: newItemData.name,
          price: Number(newItemData.price),
          cost: Number(newItemData.cost)
        };

        if (newItemData.type === 'burger') {
          newBurgers.push({
            ...baseItem,
            description: newItemData.description || "Nueva creación exclusiva de la casa.",
            img: newItemData.img || "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?auto=format&fit=crop&w=800&q=80",
            ingredientIds: newItemData.ingredientIds || [],
            ingredients: newItemData.ingredients || [],
            isPromo: newItemData.isPromo || false,
            showUpsell: newItemData.showUpsell !== false,
            menuSection: newItemData.menuSection || 'clasica',
            config: [{type:"bunBottom"},{type:"meat"},{type:"generic"},{type:"bunTop"}]
          });
        } else if (newItemData.type === 'dessert') {
          newDesserts.push({
            ...baseItem,
            description: newItemData.description || "Nueva delicia de nuestra patisserie.",
            img: newItemData.img || "https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=800&q=80",
            isPromo: newItemData.isPromo || false
          });
        } else if (newItemData.type === 'drink') {
          newDrinks.push({
            ...baseItem,
            description: newItemData.description || "Bebida refrescante.",
            img: newItemData.img || "https://images.unsplash.com/photo-1543253687-c931c8e01820?auto=format&fit=crop&w=800&q=80",
            isPromo: newItemData.isPromo || false,
            flavors: newItemData.flavors || ''
          });
        } else if (newItemData.type === 'catalog') {
          baseItem.note = "Añadido recientemente";
          baseItem.group = newItemData.group === 'toppings' ? 'Extra' : undefined;
          if (!newCatalog[newItemData.group]) newCatalog[newItemData.group] = [];
          newCatalog[newItemData.group].push(baseItem);
        }

        handleSaveInventory(newBurgers, newDesserts, newDrinks, newCatalog);
      };

      function scrollTo(key) { refs[key]?.current?.scrollIntoView({ behavior: "smooth", block: "start" }); }
      
      function handleInitialAddToCart(item, isBurger = true) {
        if (!isStoreOpen) { window.showToast("CERRADO POR HOY 🚫", '🚫'); return; }
        if (disabledItems.includes(item.id)) { window.showToast("Este producto está agotado 🚫", '🚫'); return; }

        if (isBurger && item.showUpsell !== false) {
          // Retraso para evitar el colapso entre cerrar ventana de producto y abrir upsell
          setTimeout(() => {
            setPendingItem(item);
            setShowUpsell(true);
          }, 350);
        } else {
          addToCart(item);
        }
      }

      function addToCart(item) {
        window.showToast(`${item.name} añadido`, '🍔');
        setCartItems((prev) => {
          const uniqueId = item.meta ? `${item.id}-${JSON.stringify(item.meta)}` : item.id;
          const idx = prev.findIndex((p) => (p.uniqueId || p.id) === uniqueId);
          if (idx >= 0) { const copy = [...prev]; copy[idx] = { ...copy[idx], qty: copy[idx].qty + 1 }; return copy; }
          return [...prev, { ...item, qty: 1, uniqueId }];
        });
      }

      function processUpsell(addPapas, papaObj) {
        addToCart(pendingItem);
        if (addPapas && papaObj) {
           setTimeout(() => addToCart(papaObj), 400); 
        }
        setShowUpsell(false);
        setPendingItem(null);
      }
      
      function updateQty(id, qty) { setCartItems((prev) => prev.map((p) => ((p.uniqueId || p.id) === id ? { ...p, qty } : p)).filter((p) => p.qty > 0)); }

      const wsPhone = localCatalog?.settings?.whatsapp || "584126835635";

      return (
        <div className="min-h-screen relative z-[1]">
          
          <AnimatePresence>
            {!isStoreOpen && (
              <motion.div initial={{ opacity: 0, y: -20 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: -20 }} className="bg-red-500/90 text-white text-center py-3 text-xs md:text-sm font-bold tracking-widest fixed top-0 w-full z-[300] backdrop-blur shadow-glow">
                LOCAL CERRADO POR EL MOMENTO - NO SE RECIBEN PEDIDOS
              </motion.div>
            )}
          </AnimatePresence>

          <ToastContainer />
          <AnimatePresence>{!appLoaded && <Preloader onComplete={() => setAppLoaded(true)} />}</AnimatePresence>
          <Header onNavigate={scrollTo} onOpenCart={() => setCartOpen(true)} cartCount={cartCount} onOpenAdmin={() => setAdminModalOpen(true)} />
          
          <main className="mx-auto max-w-6xl px-4 pb-36 pt-28 md:pt-28 md:px-6">
            <motion.section initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.6, ease: [0.2, 0.8, 0.2, 1] }} className="mb-10 md:mb-16">
              <div className="rounded-3xl hero-grid shadow-divine p-6 md:p-12 relative overflow-hidden border-2 border-divineLine2">
                <div className="absolute inset-0 pointer-events-none">
                  {[...Array(8)].map((_, i) => (
                    <motion.div key={i} className="absolute w-1.5 h-1.5 bg-divineGold rounded-full shadow-glow blur-[1px]" animate={{ y: [0, -80, 0], opacity: [0, 0.8, 0], scale: [0.5, 1.5, 0.5] }} transition={{ duration: 4 + Math.random() * 3, repeat: Infinity, delay: Math.random() * 2 }} style={{ left: `${10 + Math.random() * 80}%`, top: `${20 + Math.random() * 60}%` }} />
                  ))}
                </div>
                <div className="relative z-10">
                  <div className="flex justify-between items-start"><p className="mb-4 text-sm font-bold tracking-[0.35em] text-divineGold/90">{BRAND_NAME.toUpperCase()} • GOURMET BAR</p>{bcvRate && <div className="text-xs font-bold tracking-[0.28em] text-divineCream/60 border-2 border-divineLine2/50 rounded-full px-4 py-1.5 bg-[#060A17]/80 backdrop-blur shadow-inner">TASA BCV: {bcvRate} Bs</div>}</div>
                  <h1 className="text-4xl font-extrabold leading-tight md:text-6xl"><span className="bg-gradient-to-r from-divineCream via-divineCream to-divineGold bg-clip-text text-transparent">Hamburguesas, postres y yogurt griego</span> con estética de lujo.</h1>
                  <p className="mt-4 max-w-2xl text-base text-divineCream/80 md:text-lg font-medium">Explora el menú y arma tu burger con un configurador premium.</p>
                  <div className="mt-8 flex flex-col sm:flex-row flex-wrap gap-4">
                    <button className="btn-primary w-full sm:w-auto py-4 px-8 text-sm" onClick={() => scrollTo(promos.length > 0 ? "promos" : "burgers")} type="button">📜 EXPLORAR MENÚ</button>
                    <button className="btn-ghost w-full sm:w-auto py-4 px-8 text-sm" onClick={() => window.dispatchEvent(new Event('open-tutorial'))} type="button">❓ ¿CÓMO PEDIR?</button>
                  </div>
                </div>
              </div>
            </motion.section>

            {/* PRUEBA SOCIAL DE LUJO (Marquee de Reviews) */}
            <div className="mb-12 md:mb-20 overflow-hidden relative border-y border-divineLine2 bg-black/40 py-3 shadow-inner">
              <div className="absolute left-0 top-0 bottom-0 w-16 bg-gradient-to-r from-divineBg to-transparent z-10 pointer-events-none"></div>
              <div className="absolute right-0 top-0 bottom-0 w-16 bg-gradient-to-l from-divineBg to-transparent z-10 pointer-events-none"></div>
              <div className="animate-marquee flex w-[200%] gap-12 whitespace-nowrap items-center text-sm font-bold tracking-wide text-divineCream/70">
                <span className="flex items-center gap-2"><span className="text-divineGold text-lg tracking-tighter">★★★★★</span> "La mejor smash que he probado en Pueblo Llano." <span className="text-divineCream/40">- Carlos M.</span></span>
                <span className="text-divineGold/30">✦</span>
                <span className="flex items-center gap-2"><span className="text-divineGold text-lg tracking-tighter">★★★★★</span> "El empaque y la calidad son nivel Caracas." <span className="text-divineCream/40">- Sofía P.</span></span>
                <span className="text-divineGold/30">✦</span>
                <span className="flex items-center gap-2"><span className="text-divineGold text-lg tracking-tighter">★★★★★</span> "La Divinée Absoluta es una locura total." <span className="text-divineCream/40">- Luis R.</span></span>
                <span className="text-divineGold/30">✦</span>
                <span className="flex items-center gap-2"><span className="text-divineGold text-lg tracking-tighter">★★★★★</span> "Excelente atención y llegó súper rápido." <span className="text-divineCream/40">- Ana G.</span></span>
                <span className="text-divineGold/30">✦</span>
                
                {/* Repetimos el bloque para el bucle infinito */}
                <span className="flex items-center gap-2"><span className="text-divineGold text-lg tracking-tighter">★★★★★</span> "La mejor smash que he probado en Pueblo Llano." <span className="text-divineCream/40">- Carlos M.</span></span>
                <span className="text-divineGold/30">✦</span>
                <span className="flex items-center gap-2"><span className="text-divineGold text-lg tracking-tighter">★★★★★</span> "El empaque y la calidad son nivel Caracas." <span className="text-divineCream/40">- Sofía P.</span></span>
                <span className="text-divineGold/30">✦</span>
                <span className="flex items-center gap-2"><span className="text-divineGold text-lg tracking-tighter">★★★★★</span> "La Divinée Absoluta es una locura total." <span className="text-divineCream/40">- Luis R.</span></span>
                <span className="text-divineGold/30">✦</span>
                <span className="flex items-center gap-2"><span className="text-divineGold text-lg tracking-tighter">★★★★★</span> "Excelente atención y llegó súper rápido." <span className="text-divineCream/40">- Ana G.</span></span>
              </div>
            </div>
            
            {promos.length > 0 && (
              <section ref={refs.promos} className="scroll-mt-32 mb-12 md:mb-20 bg-divineGold/5 border-2 border-divineGold/30 p-6 md:p-10 rounded-3xl shadow-promoglow">
                <SectionShell eyebrow="🌟 DESTACADO" title="Promociones Especiales" subtitle="Ofertas y novedades por tiempo limitado. ¡No te las pierdas!">
                  <ProductShowcase items={promos} badge="PROMO" onOpen={setActiveBurger} onAdd={(item) => handleInitialAddToCart(item, !!item.config)} disabledItems={disabledItems} promoOnly={true} />
                </SectionShell>
              </section>
            )}

            <section ref={refs.burgers} className="scroll-mt-32">
              <SectionShell eyebrow="COLECCIÓN CLÁSICA" title="Hamburguesas Sencillas" subtitle="La tradición elevada al máximo nivel.">
                <ProductShowcase items={localBurgers.filter(b=>!b.isPromo && b.menuSection !== 'premium')} badge="VER DETALLES" onOpen={setActiveBurger} onAdd={(item) => handleInitialAddToCart(item, true)} disabledItems={disabledItems} />
              </SectionShell>
            </section>
            <section className="scroll-mt-32">
              <SectionShell eyebrow="COLECCIÓN POTENTE" title="Hamburguesas Mixtas" subtitle="Fusión imponente para paladares exigentes.">
                <ProductShowcase items={localBurgers.filter(b=>!b.isPromo && b.menuSection === 'premium')} badge="VER DETALLES" onOpen={setActiveBurger} onAdd={(item) => handleInitialAddToCart(item, true)} disabledItems={disabledItems} forceModal={true} />
              </SectionShell>
            </section>
            <section ref={refs.drinks} className="scroll-mt-32">
              <SectionShell eyebrow="REFRESHING DRINKS" title="Bebidas" subtitle="Selecciona tu sabor favorito.">
                <ProductShowcase items={localDrinks.filter(d=>!d.isPromo)} badge="BEBIDA" onOpen={setActiveBurger} onAdd={(item) => handleInitialAddToCart(item, false)} disabledItems={disabledItems} forceModal={true} />
              </SectionShell>
            </section>
            <section ref={refs.desserts} className="scroll-mt-32">
              <SectionShell eyebrow="EXQUISITE DESSERTS" title="Postres" subtitle="Selección corta, elegante.">
                <ProductShowcase items={localDesserts.filter(d=>!d.isPromo)} badge="PATISSERIE" onOpen={setActiveBurger} onAdd={(item) => handleInitialAddToCart(item, false)} disabledItems={disabledItems} />
              </SectionShell>
            </section>
            
            <section ref={refs.yogurt} className="scroll-mt-32"><SectionShell eyebrow="GREEK YOGURT DE MÁQUINA" title="Yogurt" subtitle="Sección desactivada temporalmente."><YogurtComingSoonCard /></SectionShell></section>
            <section ref={refs.atelier} className="scroll-mt-32"><SectionShell eyebrow="ATELIER" title="Arma tu Hamburguesa" subtitle="Configurador en vivo, agrega ingredientes y verás cómo caen."><BurgerBuilder onAddToCart={handleInitialAddToCart} catalog={localCatalog} /></SectionShell></section>
          </main>

          <CartButton cartCount={cartCount} cartTotal={cartTotal} onClick={() => setCartOpen(true)} />
          
          <a href={`https://wa.me/${wsPhone}?text=Hola%20Divin%C3%A9e%2C%20tengo%20una%20duda%20con%20mi%20pedido...`} target="_blank" rel="noopener noreferrer" className="fixed z-40 bottom-[calc(5rem+env(safe-area-inset-bottom))] left-[calc(1.1rem+env(safe-area-inset-left))] rounded-2xl border-2 border-[#25D366]/50 bg-[#060A17]/80 px-4 py-3 shadow-glow backdrop-blur hover:bg-[#25D366]/20 transition flex items-center gap-3"><span className="text-2xl leading-none">💬</span><span className="text-xs tracking-[0.2em] text-[#25D366] font-extrabold hidden sm:inline">SOPORTE</span></a>
          
          <AnimatePresence>{showUpsell && <UpsellModal product={pendingItem} catalog={localCatalog} onAccept={(papaObj) => processUpsell(true, papaObj)} onDecline={() => processUpsell(false)} />}</AnimatePresence>
          <AnimatePresence>{cartOpen && <CartDrawer items={cartItems} total={cartTotal} bcvRate={bcvRate} catalog={localCatalog} onClose={() => setCartOpen(false)} onQty={updateQty} onClearCart={() => setCartItems([])} supabaseClient={supabaseClient} />}</AnimatePresence>
          <AnimatePresence>{!!activeBurger && <ProductModal product={activeBurger} catalog={localCatalog} onClose={() => setActiveBurger(null)} onAdd={(itemWithMeta) => handleInitialAddToCart(itemWithMeta, activeBurger?.config !== undefined || activeBurger?.type === 'burger')} />}</AnimatePresence>
          <AnimatePresence>{trackingModalOpen && <TrackingModal onClose={() => setTrackingModalOpen(false)} supabaseClient={supabaseClient} />}</AnimatePresence>
          
          <TutorialModal />
          <RewardsModal supabaseClient={supabaseClient} catalog={localCatalog} cartItems={cartItems} onAddToCart={(item) => handleInitialAddToCart(item, false)} />

          <AnimatePresence>
            {adminModalOpen && !isAdminLogged && <AdminLogin onLogin={() => setIsAdminLogged(true)} onClose={() => setAdminModalOpen(false)} />}
            {adminModalOpen && isAdminLogged && <AdminDashboard supabaseClient={supabaseClient} onClose={() => setAdminModalOpen(false)} localBurgers={localBurgers} localDesserts={localDesserts} localDrinks={localDrinks} localCatalog={localCatalog} onSaveInventory={handleSaveInventory} onAddProduct={handleAddNewProduct} />}
          </AnimatePresence>
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById("root")); 
    root.render(<App />);
  </script>
</body>
</html>
