          newBurgers[itemToEdit.catIdx] = { ...newBurgers[itemToEdit.catIdx], name: editForm.name, description: editForm.description, price: Number(editForm.price), cost: Number(editForm.cost), ingredientIds: editForm.ingredients, ingredients: nombresIngredientes, isPromo: editForm.isPromo, showUpsell: editForm.showUpsell, img: finalImgUrl || newBurgers[itemToEdit.catIdx].img, menuSection: editForm.menuSection };
        } else if (itemToEdit.type === 'dessert') {
          newDesserts[itemToEdit.catIdx] = { ...newDesserts[itemToEdit.catIdx], name: editForm.name, description: editForm.description, price: Number(editForm.price), cost: Number(editForm.cost), isPromo: editForm.isPromo, img: finalImgUrl || newDesserts[itemToEdit.catIdx].img };
        } else if (itemToEdit.type === 'drink') {
          newDrinks[itemToEdit.catIdx] = { ...newDrinks[itemToEdit.catIdx], name: editForm.name, description: editForm.description, price: Number(editForm.price), cost: Number(editForm.cost), isPromo: editForm.isPromo, img: finalImgUrl || newDrinks[itemToEdit.catIdx].img, flavors: editForm.flavors };
        } else if (itemToEdit.type === 'catalog') {
          const group = newCatalog[itemToEdit.groupName];
          newCatalog[itemToEdit.groupName] = group.map(i => i.id === itemToEdit.id ? { ...i, name: editForm.name, price: Number(editForm.price), cost: Number(editForm.cost) } : i);
        }

        onSaveInventory(newBurgers, newDesserts, newDrinks, newCatalog);
        setItemToEdit(null);
        setImgFile(null);
        setIsUploading(false);
      };

      const handleDeleteItem = () => {
        if (!window.confirm(`¿Estás seguro que deseas ELIMINAR el producto "${editForm.name}" definitivamente? Esta acción no se puede deshacer.`)) return;

        let newBurgers = [...localBurgers];
        let newDesserts = [...localDesserts];
        let newDrinks = [...localDrinks];
        let newCatalog = { ...localCatalog };

        if (itemToEdit.type === 'burger') {
          newBurgers.splice(itemToEdit.catIdx, 1);
        } else if (itemToEdit.type === 'dessert') {
          newDesserts.splice(itemToEdit.catIdx, 1);
        } else if (itemToEdit.type === 'drink') {
          newDrinks.splice(itemToEdit.catIdx, 1);
        } else if (itemToEdit.type === 'catalog') {
          newCatalog[itemToEdit.groupName] = newCatalog[itemToEdit.groupName].filter(i => i.id !== itemToEdit.id);
        }

        onSaveInventory(newBurgers, newDesserts, newDrinks, newCatalog);
        setItemToEdit(null);
      };

      const submitAddForm = async () => {
        if (!addForm.name || !addForm.price || !addForm.cost) {
          alert("Por favor llena Nombre, Precio y Costo."); return;
        }
        
        setIsUploading(true);
        let finalImgUrl = addForm.img;

        if (imgFile) {
          try {
             finalImgUrl = await uploadImage(imgFile);
          } catch (e) {
             alert("Error al subir imagen. Verifica los permisos públicos en Supabase.");
             setIsUploading(false);
             return;
          }
        }

        let finalAddForm = { ...addForm, img: finalImgUrl };
        if (addForm.type === 'burger') {
           finalAddForm.ingredientIds = addForm.ingredients;
           finalAddForm.ingredients = buildIngredientNames(addForm.ingredients);
        }
        
        onAddProduct(finalAddForm);
        setShowAddModal(false);
        setAddForm({ type: 'burger', group: 'buns', name: '', price: '', cost: '', description: '', img: '', ingredients: [], isPromo: false, showUpsell: true, menuSection: 'clasica', flavors: '' });
        setImgFile(null);
        setIsUploading(false);
      };

      const handleAutoCalc = (selectedIds, isEdit) => {
        let c = 0, p = 0;
        selectedIds.forEach(id => {
          Object.values(localCatalog).forEach(arr => {
            if (Array.isArray(arr)) {
              let match = arr.find(x => x.id === id);
              if (match) { c += (match.cost || 0); p += (match.price || 0); }
            }
          });
        });
        if (isEdit) setEditForm(prev => ({...prev, cost: c.toFixed(2), price: p.toFixed(2)}));
        else setAddForm(prev => ({...prev, cost: c.toFixed(2), price: p.toFixed(2)}));
        window.showToast("Costo y Precio autocalculados", "✨");
      };

      const incrementFormIngredient = (id, isEdit) => {
        if (isEdit) {
          setEditForm(prev => ({...prev, ingredients: [...prev.ingredients, id]}));
        } else {
          setAddForm(prev => ({...prev, ingredients: [...prev.ingredients, id]}));
        }
      }

      const decrementFormIngredient = (id, isEdit) => {
        if (isEdit) {
          setEditForm(prev => {
            const idx = prev.ingredients.indexOf(id);
            if (idx > -1) {
              const newArr = [...prev.ingredients];
              newArr.splice(idx, 1);
              return {...prev, ingredients: newArr};
            }
            return prev;
          });
        } else {
          setAddForm(prev => {
            const idx = prev.ingredients.indexOf(id);
            if (idx > -1) {
              const newArr = [...prev.ingredients];
              newArr.splice(idx, 1);
              return {...prev, ingredients: newArr};
            }
            return prev;
          });
        }
      }

      const formatPhoneForWa = (phone) => {
        let cleaned = phone.replace(/\D/g, ''); 
        if (cleaned.startsWith('0')) cleaned = '58' + cleaned.substring(1); 
        else if (!cleaned.startsWith('58')) cleaned = '58' + cleaned; 
        return cleaned;
      };

      const handleSearchInvoice = (e) => {
        e?.preventDefault();
        const found = orders.find(o => o.tracking_code.toUpperCase() === searchCode.toUpperCase());
        if (found) setInvoiceOrder(found);
      };

      const calcOrderProfit = (itemsArr) => {
        let cost = 0; let revenue = 0;
        itemsArr.forEach(it => {
          cost += (it.cost || 0) * it.qty;
          revenue += (it.price || 0) * it.qty;
        });
        return revenue - cost;
      };

      const today = new Date(); today.setHours(0,0,0,0);
      const todayOrders = orders.filter(o => new Date(o.created_at) >= today && o.status !== 'Cancelado');
      const todaySales = todayOrders.reduce((acc, o) => acc + o.total_usd, 0);
      const todayProfit = todayOrders.reduce((acc, o) => acc + calcOrderProfit(o.items || []), 0);

      const statusColors = { 'Pendiente': 'text-red-400 border-red-400/30', 'Preparando': 'text-yellow-400 border-yellow-400/30', 'En camino': 'text-blue-400 border-blue-400/30', 'Listo para retirar': 'text-purple-400 border-purple-400/30', 'Entregado': 'text-green-400 border-green-400/30', 'Cancelado': 'text-gray-400 border-gray-400/30' };

      const handlePrintTicket = () => {
        const content = document.getElementById("invoice-print-area").innerHTML;
        const printWindow = window.open('', '', 'width=600,height=800');
        printWindow.document.write(`
          <html>
            <head>
              <title>Ticket Divinée - ${invoiceOrder.tracking_code}</title>
              <style>
                @page { margin: 0; }
                body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #000; background: #f4f4f4; margin: 0; padding: 20px; display: flex; justify-content: center; }
                .ticket-container { width: 100%; max-width: 340px; background: #fff; padding: 30px 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 6px solid #000; }
                .text-center { text-align: center; } .text-right { text-align: right; }
                .font-bold { font-weight: 800; } .font-semibold { font-weight: 600; }
                .flex { display: flex; justify-content: space-between; align-items: flex-start; }
                .mb-6 { margin-bottom: 24px; } .mb-8 { margin-bottom: 32px; } .mb-3 { margin-bottom: 12px; }
                .mt-1 { margin-top: 4px; } .mt-2 { margin-top: 8px; } .mt-3 { margin-top: 12px; }
                .pb-6 { padding-bottom: 24px; border-bottom: 2px dashed #ccc; }
                .py-4 { padding-top: 16px; padding-bottom: 16px; border-bottom: 2px dashed #ccc; }
                .pl-4 { padding-left: 16px; }
                .text-xs { font-size: 12px; color: #555; } .text-sm { font-size: 14px; }
                .text-base { font-size: 16px; color: #000; } .text-2xl { font-size: 24px; letter-spacing: 0.1em; color: #000; }
                h2, p { margin: 0; }
                .truncate { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; }
                .space-y-1 > * { margin-bottom: 6px; display: block; }
                @media print { body { background: white; padding: 0; display: block; } .ticket-container { box-shadow: none; border-radius: 0; margin: 0 auto; max-width: 80mm; padding: 10px; border-top: 2px solid #000; page-break-inside: avoid; } .pb-6, .py-4 { border-bottom-color: #000; } .text-xs { color: #000; } }
              </style>
            </head>
            <body onload="setTimeout(function(){ window.print(); window.close(); }, 400)">
              <div class="ticket-container">${content}</div>
            </body>
          </html>
        `);
        printWindow.document.close();
      };

      const renderIngredientSelector = (selectedArr, isEdit) => (
        <div className="h-48 overflow-y-auto bg-black/60 rounded-xl border border-divineLine2 p-3 space-y-3 scroll-smooth-ios">
          {Object.entries(localCatalog).map(([cat, arr]) => {
            if (!Array.isArray(arr)) return null; 
            return (
              <div key={cat}>
                <div className="text-[10px] text-divineGold mb-1 uppercase tracking-widest">{cat === 'buns' ? 'Pan' : cat === 'proteins' ? 'Proteína' : cat === 'cheeses' ? 'Queso' : 'Toppings'}</div>
                {arr.map(it => {
                  if (it.id === 'none') return null;
                  const qty = selectedArr.filter(x => x === it.id).length;
                  const active = qty > 0;
                  return (
                    <div key={it.id} className={`flex items-center justify-between p-2 rounded-lg mb-1 transition ${active ? 'bg-divineGold/10 border border-divineGold/50' : 'hover:bg-white/5 border border-transparent'}`}>
                      <div className="flex-1 min-w-0">
                        <div className="text-xs text-divineCream truncate">{it.name}</div>
                        <div className="text-[9px] text-divineGold">{money(it.price)} / {money(it.cost)} cost</div>
                      </div>
                      <div className="flex items-center gap-2 bg-black/50 rounded-full border border-divineLine2 px-1 py-1">
                        <button type="button" onClick={() => decrementFormIngredient(it.id, isEdit)} className="w-6 h-6 flex items-center justify-center rounded-full text-divineCream/70 hover:bg-white/10 transition">−</button>
                        <span className="w-4 text-center text-sm font-bold text-divineGold">{qty}</span>
                        <button type="button" onClick={() => incrementFormIngredient(it.id, isEdit)} className="w-6 h-6 flex items-center justify-center rounded-full bg-divineGold text-black font-bold transition">+</button>
                      </div>
                    </div>
                  )
                })}
              </div>
            )
          })}
        </div>
      );

      return (
        <motion.div className="fixed inset-0 z-[60] bg-divineBg overflow-y-auto text-divineCream" initial={{ opacity: 0, y: 50 }} animate={{ opacity: 1, y: 0 }} exit={{ opacity: 0, y: 50 }}>
          <div className="sticky top-0 z-20 bg-[#0A1128]/90 backdrop-blur border-b border-divineLine2/50 shadow-glow">
            <div className="px-4 py-4 flex flex-wrap justify-between items-center gap-3">
              <div><div className="text-[10px] tracking-[0.35em] text-divineGold/90">PANEL DE CONTROL</div><h2 className="text-xl font-semibold text-white">Gestión Divinée</h2></div>
              <div className="flex gap-2"><button onClick={fetchData} className="btn-ghost px-3 py-2">↻ ACTUALIZAR</button><button onClick={onClose} className="btn-primary px-3 py-2">CERRAR PANEL</button></div>
            </div>
            <div className="flex gap-4 px-4 overflow-x-auto mobile-scroll">
              <button onClick={() => setTab('orders')} className={`py-3 text-xs tracking-widest whitespace-nowrap transition-colors ${tab === 'orders' ? 'text-divineGold border-b-2 border-divineGold' : 'text-divineCream/50 hover:text-divineCream'}`}>PEDIDOS</button>
              <button onClick={() => setTab('inventory')} className={`py-3 text-xs tracking-widest whitespace-nowrap transition-colors ${tab === 'inventory' ? 'text-divineGold border-b-2 border-divineGold' : 'text-divineCream/50 hover:text-divineCream'}`}>INVENTARIO Y PRECIOS</button>
              <button onClick={() => setTab('invoice')} className={`py-3 text-xs tracking-widest whitespace-nowrap transition-colors ${tab === 'invoice' ? 'text-divineGold border-b-2 border-divineGold' : 'text-divineCream/50 hover:text-divineCream'}`}>FACTURACIÓN</button>
              <button onClick={() => setTab('settings')} className={`py-3 text-xs tracking-widest whitespace-nowrap transition-colors ${tab === 'settings' ? 'text-divineGold border-b-2 border-divineGold' : 'text-divineCream/50 hover:text-divineCream'}`}>⚙️ AJUSTES</button>
              <button onClick={() => setTab('loyalty')} className={`py-3 text-xs tracking-widest whitespace-nowrap transition-colors ${tab === 'loyalty' ? 'text-purple-400 border-b-2 border-purple-400' : 'text-divineCream/50 hover:text-purple-300'}`}>🎁 LEALTAD VIP</button>
              <button onClick={() => setTab('finance')} className={`py-3 text-xs tracking-widest whitespace-nowrap transition-colors ${tab === 'finance' ? 'text-[#25D366] border-b-2 border-[#25D366]' : 'text-divineCream/50 hover:text-[#25D366]/70'}`}>📊 FINANZAS</button>
            </div>
          </div>

          <div className="p-4 max-w-6xl mx-auto space-y-4 pb-20">
            {loading ? <div className="text-center py-10 text-divineCream/50">Cargando datos...</div> : 
             tab === 'orders' ? (
              <>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                  <div className="bg-[#060A17] border border-divineLine2 rounded-2xl p-4 shadow-divine text-center"><div className="text-[10px] tracking-[0.2em] text-divineCream/50 mb-1">VENTAS HOY</div><div className="text-2xl font-bold text-divineGold">{money(todaySales)}</div></div>
                  <div className="bg-[#060A17] border border-divineLine2 rounded-2xl p-4 shadow-divine text-center"><div className="text-[10px] tracking-[0.2em] text-divineCream/50 mb-1">GANANCIA HOY</div><div className="text-2xl font-bold text-[#25D366]">{money(todayProfit)}</div></div>
                  <div className="bg-[#060A17] border border-divineLine2 rounded-2xl p-4 shadow-divine text-center"><div className="text-[10px] tracking-[0.2em] text-divineCream/50 mb-1">PEDIDOS HOY</div><div className="text-2xl font-bold text-divineGold">{todayOrders.length}</div></div>
                  <div className="col-span-2 md:col-span-1 bg-[#060A17] border border-divineLine2 rounded-2xl p-4 shadow-divine flex flex-col items-center justify-center"><div className="text-[10px] tracking-[0.2em] text-divineCream/50 mb-2">ESTADO LOCAL</div><button onClick={toggleStore} className={`w-full text-sm font-bold tracking-widest py-2 rounded-xl border transition-colors ${isStoreOpen ? 'bg-green-500/20 text-green-400 border-green-500/50 hover:bg-green-500/30' : 'bg-red-500/20 text-red-400 border-red-500/50 hover:bg-red-500/30'}`}>{isStoreOpen ? '🟢 ABIERTO' : '🔴 CERRADA'}</button></div>
                </div>
                {orders.length === 0 ? <div className="text-center py-10 text-divineCream/50">No hay pedidos registrados aún.</div> :
                orders.map(o => (
                  <div key={o.id} className="rounded-2xl border border-divineLine2 bg-[#060A17] p-5 flex flex-col md:flex-row gap-5 justify-between shadow-divine mb-4">
                    <div className="flex-1"><div className="flex flex-wrap items-center gap-3 mb-3"><span className="text-lg font-bold text-divineGold">{o.tracking_code}</span><span className="text-xs text-divineCream/50 border border-divineLine px-2 py-1 rounded-full">{new Date(o.created_at).toLocaleString('es-VE')}</span></div><div className="text-sm text-divineCream/90 mb-1"><span className="text-divineCream/50">Cliente:</span> {o.customer_name} • <a href={`https://wa.me/${formatPhoneForWa(o.phone)}?text=${encodeURIComponent(`Hola ${o.customer_name}, tu pedido ${o.tracking_code} ya está en proceso. Divinée🍔✨`)}`} target="_blank" rel="noopener noreferrer" className="ml-1 text-divineGold hover:underline">📞 {o.phone}</a></div><div className="text-sm text-divineCream/90 mb-3"><span className="text-divineCream/50">Dir:</span> {o.address}</div><div className="text-xs text-divineCream/70 bg-black/40 p-3 rounded-xl border border-divineLine2/30"><div className="font-semibold text-divineCream mb-1">CARRITO:</div>{o.items.map((it, i) => <div key={i}>• {it.qty}x {it.name} <span className="text-divineGold/50 ml-2">(${it.price})</span></div>)}{o.notes && <div className="mt-2 text-divineGold/90">📝 Nota: {o.notes}</div>}</div></div>
                    <div className="flex flex-col items-start md:items-end justify-between min-w-[220px] bg-black/20 p-4 rounded-xl border border-divineLine2/20">
                      <div className="w-full flex justify-between md:flex-col md:text-right">
                        <div><div className="text-xs text-divineCream/50">TOTAL</div><div className="text-2xl font-bold text-divineGold">{money(o.total_usd)}</div></div>
                        <div className="text-right"><div className="text-xs text-divineCream/50 mt-1 md:mt-2">PROFIT</div><div className="text-lg font-bold text-[#25D366]">{money(calcOrderProfit(o.items || []))}</div></div>
                      </div>
                      <div className="w-full mt-4"><div className="text-[10px] tracking-[0.2em] text-divineCream/50 mb-1 text-left md:text-right">ESTATUS ACTUAL</div><select value={o.status} onChange={(e) => updateStatus(o.id, e.target.value)} className={`w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-sm font-semibold outline-none cursor-pointer ${statusColors[o.status] || 'text-divineCream'}`}><option value="Pendiente">Pendiente</option><option value="Preparando">Preparando</option><option value="En camino">En camino</option><option value="Listo para retirar">Listo para retirar</option><option value="Entregado">Entregado</option><option value="Cancelado">Cancelado</option></select><button onClick={() => { setSearchCode(o.tracking_code); setInvoiceOrder(o); setTab('invoice'); }} className="mt-3 text-[11px] tracking-widest text-divineCream/50 hover:text-divineGold transition flex items-center gap-1 md:justify-end w-full">📄 GENERAR FACTURA</button></div>
                    </div>
                  </div>
                ))}
              </>
             ) : tab === 'settings' ? (
              <div className="max-w-xl mx-auto space-y-6">
                
                <div className="bg-[#060A17] border border-divineGold/30 rounded-2xl p-6 shadow-glow">
                   <div className="flex justify-between items-center mb-4 border-b border-divineLine2 pb-2">
                     <h3 className="text-sm tracking-[0.2em] text-divineGold font-bold">🛵 ZONAS DE DELIVERY</h3>
                     <button onClick={addDeliveryZone} className="text-xs bg-divineGold/20 text-divineGold px-3 py-1 rounded hover:bg-divineGold hover:text-black transition font-bold">+ AÑADIR ZONA</button>
                   </div>
                   <div className="space-y-3">
                     {deliveryZonesConfig.map(zone => (
                       <div key={zone.id} className="flex gap-2 items-center bg-black/40 p-2 rounded-xl border border-divineLine2/50">
                         <div className="flex-1"><input type="text" value={zone.name} onChange={(e) => updateDeliveryZone(zone.id, 'name', e.target.value)} placeholder="Nombre de la zona" className="w-full bg-transparent border-none text-white text-sm outline-none px-2" /></div>
                         <div className="w-24"><input type="number" step="0.01" value={zone.cost} onChange={(e) => updateDeliveryZone(zone.id, 'cost', e.target.value)} className="w-full bg-black/60 border border-divineLine2 rounded-lg px-2 py-1 text-white text-sm outline-none text-center" /></div>
                         <button onClick={() => removeDeliveryZone(zone.id)} className="w-8 h-8 flex items-center justify-center text-red-500 hover:bg-red-500/20 rounded-lg transition">✕</button>
                       </div>
                     ))}
                   </div>
                </div>

                <div className="bg-[#060A17] border border-[#741bd1]/50 rounded-2xl p-6 shadow-[0_0_15px_rgba(116,27,209,0.15)]">
                   <h3 className="text-sm tracking-[0.2em] text-[#b366ff] mb-4 font-bold border-b border-[#741bd1]/30 pb-2">🟣 PAGOS INTERNACIONALES</h3>
                   <div className="space-y-4">
                     <div><label className="text-xs text-divineCream/70 mb-1 block font-bold">Correo Zelle</label><div className="flex items-center gap-2"><input type="email" value={settingsForm.zelleEmail} onChange={(e)=>setSettingsForm({...settingsForm, zelleEmail: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-[#741bd1] outline-none" /></div></div>
                     <div className="grid grid-cols-2 gap-4 pt-2 border-t border-divineLine2/30 mt-2">
                       <div><label className="text-xs text-divineCream/70 mb-1 block font-bold">Binance Pay ID</label><div className="flex items-center gap-2"><input type="text" value={settingsForm.binanceId} onChange={(e)=>setSettingsForm({...settingsForm, binanceId: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-[#fcd535] outline-none" /></div></div>
                       <div><label className="text-xs text-divineCream/70 mb-1 block font-bold">Binance Email</label><div className="flex items-center gap-2"><input type="email" value={settingsForm.binanceEmail} onChange={(e)=>setSettingsForm({...settingsForm, binanceEmail: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-[#fcd535] outline-none" /></div></div>
                     </div>
                   </div>
                </div>

                <div className="bg-[#060A17] border border-divineGold/30 rounded-2xl p-6 shadow-glow">
                   <h3 className="text-sm tracking-[0.2em] text-divineGold mb-4 font-bold border-b border-divineLine2 pb-2">💳 DATOS BANCARIOS (PAGO MÓVIL)</h3>
                   <div className="space-y-4">
                     <div><label className="text-xs text-divineCream/70 mb-1 block font-bold">Banco</label><input type="text" value={settingsForm.banco} onChange={(e)=>setSettingsForm({...settingsForm, banco: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-divineGold outline-none uppercase" /></div>
                     <div className="grid grid-cols-2 gap-4">
                       <div><label className="text-xs text-divineCream/70 mb-1 block font-bold">Teléfono</label><div className="flex items-center gap-2"><input type="text" value={settingsForm.telefonoPago} onChange={(e)=>setSettingsForm({...settingsForm, telefonoPago: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-divineGold outline-none" /></div></div>
                       <div><label className="text-xs text-divineCream/70 mb-1 block font-bold">Cédula o RIF</label><div className="flex items-center gap-2"><input type="text" value={settingsForm.cedulaPago} onChange={(e)=>setSettingsForm({...settingsForm, cedulaPago: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-divineGold outline-none uppercase" /></div></div>
                     </div>
                   </div>
                </div>

                <div className="bg-[#060A17] border border-[#25D366]/50 rounded-2xl p-6 shadow-[0_0_15px_rgba(37,211,102,0.15)]">
                   <h3 className="text-sm tracking-[0.2em] text-[#25D366] mb-4 font-bold border-b border-[#25D366]/30 pb-2">📞 CONTACTO Y REDES</h3>
                   <div><label className="text-xs text-divineCream/70 mb-1 block font-bold">Número de WhatsApp (Soporte)</label><input type="text" value={settingsForm.whatsapp} onChange={(e)=>setSettingsForm({...settingsForm, whatsapp: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-[#25D366] outline-none font-mono tracking-widest" placeholder="Ej: 584126835635" /></div>
                </div>

                <div className="bg-[#060A17] border border-[#0088cc]/50 rounded-2xl p-6 shadow-[0_0_15px_rgba(0,136,204,0.15)]">
                   <h3 className="text-sm tracking-[0.2em] text-[#0088cc] mb-4 font-bold border-b border-[#0088cc]/30 pb-2">🤖 BOT DE TELEGRAM</h3>
                   <p className="text-xs text-divineCream/50 mb-4">Aquí se enviarán todas las comandas de los pedidos web.</p>
                   <div className="space-y-4">
                     <div><label className="text-xs text-divineCream/70 mb-1 block font-bold">Bot Token</label><input type="text" value={settingsForm.telegramToken} onChange={(e)=>setSettingsForm({...settingsForm, telegramToken: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-[#0088cc] outline-none font-mono text-xs" /></div>
                     <div><label className="text-xs text-divineCream/70 mb-1 block font-bold">Chat ID</label><input type="text" value={settingsForm.telegramChatId} onChange={(e)=>setSettingsForm({...settingsForm, telegramChatId: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-white focus:border-[#0088cc] outline-none font-mono tracking-widest" /></div>
                   </div>
                </div>

                <div className="bg-[#060A17] border border-divineGold/50 rounded-2xl p-6 shadow-glow">
                   <h3 className="text-sm tracking-[0.2em] text-divineGold font-bold mb-4 border-b border-divineLine2 pb-2">⏰ CERRAR LOCAL AUTOMÁTICAMENTE</h3>
                   <div className="space-y-4">
                      <label className="flex items-center gap-3 cursor-pointer bg-[#0A1128] p-3 rounded-xl border border-divineLine2">
                        <input type="checkbox" checked={settingsForm.horarioActivo} onChange={(e)=>setSettingsForm({...settingsForm, horarioActivo: e.target.checked})} className="w-5 h-5 accent-divineGold" />
                        <span className="text-xs font-bold text-divineCream">Activar Piloto Automático</span>
                      </label>
                      {settingsForm.horarioActivo && (
                        <div className="grid grid-cols-2 gap-4">
                           <div><label className="text-[10px] text-divineCream/50 block mb-1">Abre a las (Ej: 17:00)</label><input type="time" value={settingsForm.apertura} onChange={(e)=>setSettingsForm({...settingsForm, apertura: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-lg px-3 py-2 text-white outline-none focus:border-divineGold" /></div>
                           <div><label className="text-[10px] text-divineCream/50 block mb-1">Cierra a las (Ej: 23:00)</label><input type="time" value={settingsForm.cierre} onChange={(e)=>setSettingsForm({...settingsForm, cierre: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-lg px-3 py-2 text-white outline-none focus:border-divineGold" /></div>
                        </div>
                      )}
                   </div>
                </div>

                <div className="bg-[#060A17] border border-[#25D366]/50 rounded-2xl p-6 shadow-[0_0_15px_rgba(37,211,102,0.15)]">
                   <h3 className="text-sm tracking-[0.2em] text-[#25D366] font-bold mb-2 border-b border-[#25D366]/30 pb-2">💰 TÁCTICA: "TE FALTA POCO"</h3>
                   <p className="text-[10px] text-divineCream/50 mb-3">Monto objetivo en el carrito para decirle al cliente que le falta poco para su postre.</p>
                   <div>
                     <label className="text-xs text-divineCream/70 mb-1 block font-bold">Meta del Carrito ($)</label>
                     <input type="number" value={settingsForm.crossSellMeta} onChange={(e)=>setSettingsForm({...settingsForm, crossSellMeta: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-lg px-3 py-2 text-white outline-none focus:border-[#25D366]" />
                   </div>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div className="bg-[#060A17] border border-blue-500/50 rounded-2xl p-6 shadow-[0_0_15px_rgba(59,130,246,0.15)]">
                     <h3 className="text-sm tracking-[0.2em] text-blue-400 font-bold mb-2 border-b border-blue-500/30 pb-2">⏳ TIEMPO DE ENTREGA (ETA)</h3>
                     <input type="text" value={settingsForm.deliveryEta} onChange={(e)=>setSettingsForm({...settingsForm, deliveryEta: e.target.value})} placeholder="Ej: 35-45 min" className="w-full bg-[#0A1128] border border-divineLine2 rounded-lg px-3 py-2 text-white outline-none focus:border-blue-400 font-bold text-center" />
                  </div>
                  <div className="bg-[#060A17] border border-pink-500/50 rounded-2xl p-6 shadow-[0_0_15px_rgba(236,72,153,0.15)]">
                     <h3 className="text-sm tracking-[0.2em] text-pink-400 font-bold mb-2 border-b border-pink-500/30 pb-2">🎟️ CUPONES SECRETOS</h3>
                     <p className="text-[9px] text-divineCream/50 mb-2">Formato: CODIGO:DESCUENTO (Separados por coma)</p>
                     <input type="text" value={settingsForm.cupones} onChange={(e)=>setSettingsForm({...settingsForm, cupones: e.target.value})} placeholder="FLASH20:2, VIP:5" className="w-full bg-[#0A1128] border border-divineLine2 rounded-lg px-3 py-2 text-white outline-none focus:border-pink-400 font-mono text-xs" />
                  </div>
                </div>

                <button onClick={saveSettingsForm} className="btn-primary w-full py-4 text-sm font-bold tracking-widest shadow-glow mt-4">GUARDAR TODOS LOS AJUSTES</button>
              </div>
             ) : tab === 'loyalty' ? (
              <div className="max-w-xl mx-auto space-y-6">
                
                <div className="bg-[#060A17] border border-purple-500/40 rounded-2xl p-6 shadow-[0_0_15px_rgba(147,51,234,0.15)]">
                   <h3 className="text-sm tracking-[0.2em] text-purple-400 font-bold border-b border-purple-500/30 pb-2 mb-4">📈 TASA DE CONVERSIÓN</h3>
                   <div><label className="text-xs text-divineCream/70 mb-1 block font-bold">¿Cuántos Tokens (DT) gana el cliente por cada $1 gastado?</label><input type="number" value={settingsForm.loyaltyRate} onChange={(e)=>setSettingsForm({...settingsForm, loyaltyRate: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-white outline-none focus:border-purple-400" /></div>
                </div>

                <div className="bg-[#060A17] border border-purple-500/40 rounded-2xl p-6 shadow-[0_0_15px_rgba(147,51,234,0.15)]">
                   <h3 className="text-sm tracking-[0.2em] text-purple-400 font-bold border-b border-purple-500/30 pb-2 mb-4">🎡 PREMIOS DE LA RULETA</h3>
                   <p className="text-xs text-divineCream/50 mb-3">Escribe los montos en Tokens separados por comas. Ej: 10, 20, 50, 100, 200, 500</p>
                   <div><input type="text" value={settingsForm.loyaltyRoulette} onChange={(e)=>setSettingsForm({...settingsForm, loyaltyRoulette: e.target.value})} className="w-full bg-[#0A1128] border border-divineLine2 rounded-xl px-3 py-2 text-white outline-none focus:border-purple-400 font-mono tracking-widest" /></div>
                </div>

                <div className="bg-[#060A17] border border-divineGold/30 rounded-2xl p-6 shadow-glow">
                   <div className="flex justify-between items-center mb-4 border-b border-divineLine2 pb-2">
                     <h3 className="text-sm tracking-[0.2em] text-divineGold font-bold">🎁 TIENDA DE CANJES</h3>
                     <button onClick={addLoyaltyItem} className="text-xs bg-divineGold/20 text-divineGold px-3 py-1 rounded hover:bg-divineGold hover:text-black transition font-bold">+ AÑADIR PREMIO</button>
                   </div>
                   <div className="space-y-3">
                     {loyaltyCatalog.map(zone => (
                       <div key={zone.id} className="flex gap-2 items-center bg-black/40 p-2 rounded-xl border border-divineLine2/50">
                         <div className="flex-1"><input type="text" value={zone.name} onChange={(e) => updateLoyaltyItem(zone.id, 'name', e.target.value)} placeholder="Ej: 🍔 Burger Clásica" className="w-full bg-transparent border-none text-white text-sm outline-none px-2" /></div>
                         <div className="w-24"><input type="number" value={zone.cost} onChange={(e) => updateLoyaltyItem(zone.id, 'cost', e.target.value)} className="w-full bg-black/60 border border-divineLine2 rounded-lg px-2 py-1 text-divineGold font-bold text-sm outline-none text-center" /></div>
                         <button onClick={() => removeLoyaltyItem(zone.id)} className="w-8 h-8 flex items-center justify-center text-red-500 hover:bg-red-500/20 rounded-lg transition">✕</button>
                       </div>
                     ))}
                   </div>
                </div>
                <button onClick={saveSettingsForm} className="btn-primary w-full py-4 text-sm font-bold tracking-widest shadow-[0_0_20px_rgba(147,51,234,0.4)] bg-gradient-to-r from-purple-600 to-indigo-600 text-white !border-transparent hover:brightness-110">GUARDAR SISTEMA DE LEALTAD</button>
              </div>
             ) : tab === 'inventory' ? (
              <div className="space-y-8 relative">

                {/* Modal para Editar o Eliminar */}
